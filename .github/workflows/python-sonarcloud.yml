# ============================================================================
# Reusable SonarCloud Analysis Workflow
# ============================================================================
# Continuous code quality and security analysis for Python projects
#
# Usage from downstream repos:
#   jobs:
#     sonarcloud:
#       uses: ByronWilliamsCPA/.github/.github/workflows/python-sonarcloud.yml@d5cf99101d4150ae5832d154cb42993705a09e31 # v7.0.1
#       permissions:
#         contents: read
#         pull-requests: write   # REQUIRED for PR decoration -- see Known Limitations
#       secrets:
#         SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
#       with:
#         sonar-organization: 'byronwilliamscpa'
#         sonar-project-key: 'byronwilliamscpa_your-repo'
#
# Features:
#   - Code quality metrics (bugs, code smells, technical debt)
#   - Security vulnerability detection (OWASP Top 10)
#   - Test coverage tracking and reporting
#   - Quality gate enforcement with configurable thresholds
#   - Pull request decoration with inline comments
#   - Coverage artifact retention
#
# Requirements:
#   1. SonarCloud account at https://sonarcloud.io
#   2. Project configured in SonarCloud
#   3. SONAR_TOKEN secret configured in repository
#
# SonarCloud Setup:
#   1. Visit https://sonarcloud.io and sign in with GitHub
#   2. Import your repository
#   3. Generate token at https://sonarcloud.io/account/security
#   4. Add SONAR_TOKEN to repository secrets
#
# Known Limitations
# -----------------
# pull-requests: write MUST be granted by the caller job.
#
# Reusable workflows cannot escalate beyond the permissions the caller grants.
# The SonarCloud scan action posts inline comments on pull requests using the
# GITHUB_TOKEN. If the caller does not grant pull-requests: write, the
# decoration step silently succeeds but no comments appear on the PR. The
# analysis still runs and the quality gate still evaluates, but reviewers lose
# the inline feedback. Always add pull-requests: write to the calling job's
# permissions block.
#
# SONAR_TOKEN secret: must be explicitly passed via the secrets: block. Org
# secrets are not automatically forwarded to reusable workflows even when
# configured for the calling repository -- the caller must relay them.
# ============================================================================

name: SonarCloud Analysis (Reusable)

on:
  workflow_call:
    inputs:
      sonar-organization:
        description: 'SonarCloud organization name'
        type: string
        required: true

      sonar-project-key:
        description: 'SonarCloud project key (format: org_repo-name)'
        type: string
        required: true

      python-version:
        description: 'Python version for analysis'
        type: string
        required: false
        default: '3.12'

      source-directory:
        description: 'Source code directory to analyze (default: src)'
        type: string
        required: false
        default: 'src'

      coverage-paths:
        description: 'Coverage report paths (comma-separated)'
        type: string
        required: false
        default: 'coverage.xml'

      coverage-exclusions:
        description: 'Paths to exclude from coverage (comma-separated)'
        type: string
        required: false
        default: '**/tests/**,**/validation/**,**/benchmarks/**,**/scripts/**'

      test-exclusions:
        description: 'Paths to exclude from analysis (comma-separated)'
        type: string
        required: false
        default: ''

      extra-dependencies:
        description: 'Additional uv sync extras (e.g., "dev test"). Use "all" for --all-extras.'
        type: string
        required: false
        default: 'all'

      pytest-args:
        description: 'Additional pytest arguments'
        type: string
        required: false
        default: ''

      fail-on-quality-gate:
        description: 'Fail workflow if quality gate fails'
        type: boolean
        required: false
        default: false

      skip-if-no-token:
        description: 'Skip analysis gracefully if SONAR_TOKEN not configured'
        type: boolean
        required: false
        default: true

      timeout-minutes:
        description: 'Job timeout in minutes'
        type: number
        required: false
        default: 15

      sonar-scanner-version:
        description: 'SonarScanner CLI version (leave empty for latest)'
        type: string
        required: false
        default: ''

      additional-sonar-args:
        description: 'Additional SonarQube scanner arguments'
        type: string
        required: false
        default: ''

      coverage-artifact-retention:
        description: 'Days to retain coverage artifacts'
        type: number
        required: false
        default: 7
      no-build:
        description: 'Pass --no-build to uv sync/run commands (disable for projects with a build backend like hatchling)'
        required: false
        type: boolean
        default: true

    secrets:
      SONAR_TOKEN:
        description: 'SonarCloud authentication token'
        required: false

permissions: {}

jobs:
  # Check if SONAR_TOKEN is configured
  check-configuration:
    name: Check SonarCloud Configuration
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    outputs:
      has-token: ${{ steps.check.outputs.has-token }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - name: Check for SONAR_TOKEN
        id: check
        env:
          HAS_TOKEN: ${{ secrets.SONAR_TOKEN != '' }}
          SKIP_IF_NO_TOKEN: ${{ inputs.skip-if-no-token }}
        run: |
          if [ "$HAS_TOKEN" = "true" ]; then
            echo "has-token=true" >> $GITHUB_OUTPUT
            echo "::notice::SONAR_TOKEN is configured. SonarCloud analysis will run."
          else
            echo "has-token=false" >> $GITHUB_OUTPUT

            if [ "$SKIP_IF_NO_TOKEN" = "true" ]; then
              echo "::warning::SONAR_TOKEN is not configured. Skipping SonarCloud analysis."
              echo ""
              echo "To enable SonarCloud:"
              echo "1. Create a project at https://sonarcloud.io"
              echo "2. Generate a token at https://sonarcloud.io/account/security"
              echo "3. Add SONAR_TOKEN as a repository secret"
            else
              echo "::error::SONAR_TOKEN is required but not configured."
              echo "Set skip-if-no-token: false to require the token."
              exit 1
            fi
          fi

  sonarcloud-analysis:
    name: SonarCloud Code Analysis
    runs-on: ubuntu-latest
    needs: check-configuration
    if: needs.check-configuration.outputs.has-token == 'true'
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: ${{ inputs.timeout-minutes }}
    env:
      NO_BUILD_FLAG: ${{ inputs.no-build && '--no-build' || '' }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
        with:
          fetch-depth: 0  # Disable shallow clone for better analysis

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install UV
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true

      # Detect the repo state before attempting uv sync. The reusable workflow is uv-only
      # by org policy (poetry repos are being converted to uv in separate work), but it is
      # still called by some repos that don't have a pyproject.toml (template / docs-only
      # forks) and by uv-managed repos that haven't yet committed a uv.lock. Hardcoding
      # `uv sync --frozen` failed for both categories. Auto-detection skips cleanly when
      # pyproject is absent and drops --frozen when no lockfile exists yet. Poetry repos
      # are explicitly rejected with an actionable error.
      - name: Detect repo state
        id: detect
        run: |
          if [ ! -f pyproject.toml ]; then
            echo "state=skip" >> $GITHUB_OUTPUT
            echo "::notice::No pyproject.toml found at repo root; SonarCloud analysis will be skipped. Remove the python-sonarcloud.yml caller from this repo if it does not need SonarCloud coverage."
          elif [ -f poetry.lock ] || grep -qE '^\[tool\.poetry(\.|\])' pyproject.toml; then
            echo "state=poetry-not-supported" >> $GITHUB_OUTPUT
            echo "::error::This repo uses Poetry. The python-sonarcloud.yml reusable workflow is uv-only by org policy. Convert this repo to uv before re-enabling SonarCloud analysis."
            exit 1
          elif [ -f uv.lock ]; then
            echo "state=uv-locked" >> $GITHUB_OUTPUT
            echo "Detected: uv with lockfile"
          else
            echo "state=uv-no-lock" >> $GITHUB_OUTPUT
            echo "Detected: uv without lockfile (PEP 621 pyproject.toml only); will sync without --frozen"
          fi
        shell: bash

      # Resolve the extras flag once so each install step below is a clean single-line
      # `run:` that SonarCloud's githubactions rule set can pattern-match. Both
      # multi-line `run: |` blocks AND inline NOSONAR inside them are ignored for
      # S8541/S8544 (empirical anti-pattern from docs/sonarcloud-nosonar-patterns.md);
      # the single-line `run:` shape is the only reliable Pattern A position.
      # The downstream `if:` conditions on this and later steps use a positive disjunction
      # (state == 'uv-locked' || state == 'uv-no-lock') rather than the shorter negative
      # form (state != 'skip' && state != 'poetry-not-supported'). Keep the positive form:
      # if an earlier step fails, steps.detect.outputs.state is the empty string '', which
      # satisfies BOTH negative checks and would incorrectly run downstream steps.
      - name: Resolve extras flag
        id: extras
        if: steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock'
        env:
          EXTRA_DEPENDENCIES: ${{ inputs.extra-dependencies }}
        run: |
          if [ "$EXTRA_DEPENDENCIES" == "all" ]; then
            echo "flag=--all-extras" >> $GITHUB_OUTPUT
          elif [ -n "$EXTRA_DEPENDENCIES" ]; then
            FLAG=""
            for dep in $EXTRA_DEPENDENCIES; do
              FLAG="$FLAG --extra $dep"
            done
            # Strip the leading space added by the loop accumulator so the output value
            # is symmetric with the --all-extras and empty branches above.
            echo "flag=${FLAG# }" >> $GITHUB_OUTPUT
          else
            echo "flag=" >> $GITHUB_OUTPUT
          fi
        shell: bash

      # Install paths split by detect.outputs.state so SonarCloud sees literal `--frozen`
      # on the uv-locked path (S8544 cannot fire there). Both install lines still carry
      # NOSONAR(S8541) because $NO_BUILD_FLAG is a dynamic env var by design (the no-build:
      # workflow input lets PEP 517 callers opt-in to building). The uv-no-lock path also
      # carries NOSONAR(S8544) because no uv.lock exists at that point by design (uv sync
      # creates one). Empirically S8541 fires on the uv-locked path here even though it
      # does not in #156/#158/#160; the difference is that this workflow's install step
      # uses dynamic $NO_BUILD_FLAG, which the rule matches as a missing literal --no-build.
      #
      # #CRITICAL: steps.extras.outputs.flag derives from inputs.extra-dependencies, which
      # is caller-controlled. The flag MUST be passed through an env var (UV_EXTRAS) rather
      # than interpolated directly into the run: script via ${{ ... }} template expansion;
      # template expansion runs before bash sees the line, so unfiltered shell metacharacters
      # would become script text (CodeQL py/code-injection). #VERIFY: each install step uses
      # env: UV_EXTRAS: ${{ steps.extras.outputs.flag }} and references $UV_EXTRAS only.
      - name: Install dependencies (uv with lockfile)
        if: steps.detect.outputs.state == 'uv-locked'
        env:
          UV_EXTRAS: ${{ steps.extras.outputs.flag }}
        run: uv sync $UV_EXTRAS --frozen $NO_BUILD_FLAG  # NOSONAR(S8541): --no-build is opt-out via `no-build` workflow input
        shell: bash

      - name: Install dependencies (uv without lockfile)
        if: steps.detect.outputs.state == 'uv-no-lock'
        env:
          UV_EXTRAS: ${{ steps.extras.outputs.flag }}
        run: uv sync $UV_EXTRAS $NO_BUILD_FLAG  # NOSONAR(S8541,S8544): --no-build opt-out via `no-build` input; no uv.lock by design on this path (uv sync creates one)
        shell: bash

      - name: Skip notice (no pyproject.toml)
        if: steps.detect.outputs.state == 'skip'
        run: |
          echo "## SonarCloud Analysis Skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No pyproject.toml at repo root, nothing to analyze." >> $GITHUB_STEP_SUMMARY

      - name: Run tests with coverage
        id: coverage
        if: steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock'
        env:
          SOURCE_DIRECTORY: ${{ inputs.source-directory }}
          PYTEST_ARGS: ${{ inputs.pytest-args }}
        run: |
          echo "🧪 Running tests with coverage..."

          # Determine coverage source path
          if [ -d "$SOURCE_DIRECTORY" ]; then
            COV_SRC="$SOURCE_DIRECTORY"
          else
            echo "::warning::Source directory '$SOURCE_DIRECTORY' not found. Using project root."
            COV_SRC="."
          fi

          # The install step above (uv-locked or uv-no-lock) guaranteed `uv.lock` exists,
          # so literal `--frozen` here is safe on both detect-state branches.
          # NOSONAR(S8541): --no-build is opt-out via `no-build` workflow input
          uv run --frozen $NO_BUILD_FLAG pytest \
            --cov="$COV_SRC" \
            --cov-report=xml:coverage.xml \
            --cov-report=term \
            --cov-branch \
            -v \
            $PYTEST_ARGS || {
              echo "test_failed=true" >> $GITHUB_OUTPUT
              echo "::warning::Tests failed. Coverage may be incomplete."
            }
        continue-on-error: true

      - name: Verify coverage report
        if: steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock'
        run: |
          if [ ! -f coverage.xml ]; then
            echo "::warning::Coverage report not found. Tests may have failed completely."
            echo "SonarCloud will analyze code quality without coverage metrics."
            echo "# ⚠️ Coverage Report Missing" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Tests failed to generate coverage data. SonarCloud analysis will continue" >> $GITHUB_STEP_SUMMARY
            echo "without coverage metrics, focusing on code quality and security." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Coverage report generated successfully"
            ls -lh coverage.xml

            # Extract coverage percentage if available
            if command -v xmllint &> /dev/null; then
              COVERAGE_PCT=$(xmllint --xpath "string(//coverage/@line-rate)" coverage.xml 2>/dev/null || echo "N/A")
              if [ "$COVERAGE_PCT" != "N/A" ]; then
                COVERAGE_DISPLAY=$(echo "$COVERAGE_PCT * 100" | bc 2>/dev/null || echo "N/A")
                echo "📊 Coverage: ${COVERAGE_DISPLAY}%"
              fi
            fi
          fi

      - name: SonarCloud Scan
        if: steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock'
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f  # v8.2  # nosemgrep: detected-sonarqube-docs-api-key  # FP -- see #37
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ inputs.sonar-organization }}
            -Dsonar.projectKey=${{ inputs.sonar-project-key }}
            -Dsonar.python.version=${{ inputs.python-version }}
            -Dsonar.sources=${{ inputs.source-directory }}
            -Dsonar.python.coverage.reportPaths=${{ inputs.coverage-paths }}
            -Dsonar.coverage.exclusions=${{ inputs.coverage-exclusions }}
            ${{ inputs.test-exclusions != '' && format('-Dsonar.test.exclusions={0}', inputs.test-exclusions) || '' }}
            ${{ inputs.additional-sonar-args }}

      - name: Wait for SonarCloud Processing
        if: steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock'
        run: |
          echo "⏳ Waiting for SonarCloud to process results..."
          sleep 10

      - name: Check Quality Gate
        id: quality_gate
        if: steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock'
        uses: sonarsource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b  # v1.2.0  # nosemgrep: detected-sonarqube-docs-api-key  # FP -- see #37
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: ${{ !inputs.fail-on-quality-gate }}

      - name: Quality Gate Summary
        if: always() && (steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock')
        env:
          SONAR_PROJECT_KEY: ${{ inputs.sonar-project-key }}
        run: |
          echo "# 📊 SonarCloud Analysis Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          DASHBOARD_URL="https://sonarcloud.io/dashboard?id=$SONAR_PROJECT_KEY"
          echo "**Dashboard:** [$SONAR_PROJECT_KEY]($DASHBOARD_URL)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Quality gate status
          if [ "${{ steps.quality_gate.outcome }}" = "success" ]; then
            echo "## ✅ Quality Gate: PASSED" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.quality_gate.outcome }}" = "failure" ]; then
            echo "## ❌ Quality Gate: FAILED" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ⚠️ Quality Gate: UNKNOWN" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          # Metrics analyzed
          echo "**Metrics Analyzed:**" >> $GITHUB_STEP_SUMMARY
          echo "- 🐛 **Bugs**: Reliability issues" >> $GITHUB_STEP_SUMMARY
          echo "- 🔒 **Vulnerabilities**: Security issues (OWASP Top 10)" >> $GITHUB_STEP_SUMMARY
          echo "- 🔥 **Security Hotspots**: Security review points" >> $GITHUB_STEP_SUMMARY
          echo "- 💡 **Code Smells**: Maintainability issues" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 **Coverage**: Test coverage percentage" >> $GITHUB_STEP_SUMMARY
          echo "- 📋 **Duplications**: Code duplication" >> $GITHUB_STEP_SUMMARY
          echo "- ⏱️ **Technical Debt**: Estimated remediation time" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.coverage.outputs.test_failed }}" = "true" ]; then
            echo "⚠️ **Note**: Tests failed during coverage generation. Coverage metrics may be incomplete." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          echo "View detailed results at: $DASHBOARD_URL" >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage artifacts
        if: always() && (steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sonarcloud-coverage-${{ github.run_id }}
          path: |
            coverage.xml
            .coverage
          retention-days: ${{ inputs.coverage-artifact-retention }}
          if-no-files-found: warn

      - name: Fail on Quality Gate
        if: inputs.fail-on-quality-gate && steps.quality_gate.outcome == 'failure' && (steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock')
        env:
          SONAR_PROJECT_KEY: ${{ inputs.sonar-project-key }}
        run: |
          echo "::error::SonarCloud Quality Gate failed"
          echo "View issues at: https://sonarcloud.io/dashboard?id=$SONAR_PROJECT_KEY"
          exit 1
