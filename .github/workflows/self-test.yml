# ============================================================================
# Self-Test CI for ByronWilliamsCPA/.github
# ============================================================================
# Runs static analysis on this repo's own workflow files and shell scripts.
# Catches regressions in the org-level reusable workflows before they
# propagate to every consumer.
#
# Tools:
#   - actionlint  -- GitHub Actions workflow linter
#   - shellcheck  -- shell script static analyzer (preinstalled on runner)
#
# Triggers on PRs and push to main. Uses path filters so unrelated docs-only
# changes don't run the linters.
# ============================================================================

name: Self-Test (workflow + shell linting)

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'workflow-templates/**'
      - '**/*.sh'
      - '**/*.bash'
      - '.github/workflows/self-test.yml'
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'workflow-templates/**'
      - '**/*.sh'
      - '**/*.bash'
      - '.github/workflows/self-test.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  actionlint:
    name: Lint workflow files (actionlint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      ACTIONLINT_VERSION: '1.7.7'
      # SHELLCHECK_OPTS is read by shellcheck regardless of how it is
      # invoked, including from inside actionlint's integration. It
      # overrides any wrapper-imposed flags. .shellcheckrc on its own
      # is not reliably honored by actionlint's stdin-fed invocation,
      # so this env var is the authoritative severity filter for layer 2.
      SHELLCHECK_OPTS: '--severity=warning'

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Install actionlint
        run: |
          curl --proto '=https' --tlsv1.2 -fsSL \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            -o /tmp/actionlint.tar.gz
          echo "023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757  /tmp/actionlint.tar.gz" | sha256sum --check
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
          sudo mv /tmp/actionlint /usr/local/bin/actionlint
          actionlint -version

      # actionlint integrates shellcheck on every `run:` block. Severity is
      # filtered to warning+ via the SHELLCHECK_OPTS env above, so info and
      # style nits do not block CI; real warnings and errors still do.
      - name: Run actionlint on .github/workflows/
        run: actionlint -color .github/workflows/*.yml

      - name: Run actionlint on workflow-templates/
        run: actionlint -color workflow-templates/*.yml

  shellcheck:
    name: Lint shell scripts (shellcheck)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Run shellcheck
        run: |
          shellcheck --version
          # Find every shell script except submodules and git internals.
          mapfile -d '' files < <(find . \
            \( -name '*.sh' -o -name '*.bash' \) \
            -not -path './.git/*' \
            -not -path './tests/libs/*' \
            -not -path './node_modules/*' \
            -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No shell scripts found; nothing to lint."
            exit 0
          fi
          echo "Linting ${#files[@]} shell script(s):"
          printf '  %s\n' "${files[@]}"
          shellcheck --color=always --severity=warning "${files[@]}"

  python-version-policy:
    name: Enforce Python version policy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Check workflows match docs/python-versions.md
        run: scripts/check-python-versions.sh

  test-python-snyk:
    name: Self-test python-snyk
    uses: ./.github/workflows/python-snyk.yml
    permissions:
      contents: read
      security-events: write
    with:
      source-directory: 'scripts'
      run-code: true
      run-oss: false
      run-aibom: false
      fail-on-high: false
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  test-python-snyk-iac:
    name: Self-test python-snyk-iac
    uses: ./.github/workflows/python-snyk-iac.yml
    permissions:
      contents: read
      security-events: write
    with:
      terraform-dirs: 'scripts'
      fail-on-high: false
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # The org repo has no uv.lock or package.json, so detect-config reports
  # "no ecosystems scanned" and the report records a clean cycle. open-issue is
  # false here to avoid creating a self-test issue on every run; the artifact
  # path still exercises the report assembler end to end.
  test-python-dependency-provenance:
    name: Self-test python-dependency-provenance
    uses: ./.github/workflows/python-dependency-provenance.yml
    permissions:
      contents: read
      issues: write
    with:
      open-issue: false
