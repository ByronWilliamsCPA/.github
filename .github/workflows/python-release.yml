# ============================================================================
# Reusable Python Release Workflow
# ============================================================================
# Builds signed releases with SLSA provenance, SBOM generation, and semantic versioning
#
# Usage from downstream repos:
#   jobs:
#     release:
#       uses: ByronWilliamsCPA/.github/.github/workflows/python-release.yml@d5cf99101d4150ae5832d154cb42993705a09e31 # v7.0.1
#       with:
#         python-version: '3.12'
#         semantic-release: true
#         pypi-package-name: 'my-package'
#       permissions:
#         contents: write
#         id-token: write
#         attestations: write
#
# Features:
#   - Pre-release testing
#   - Semantic versioning with python-semantic-release
#   - Manual release mode (tag-based)
#   - PyPI publishing with OIDC trusted publishing
#   - Sigstore artifact signing
#   - SBOM generation
#
# Skipping pre-release tests:
#   The `run-tests: false` input opts out of the pre-release test gate. To
#   prevent accidental bypass, callers using `run-tests: false` MUST also
#   supply a non-empty `skip-tests-reason` input documenting why the tests
#   are safe to skip (e.g., "tests run in upstream pipeline X"). The release
#   job will fail fast if `run-tests: false` is used without a reason.
#
# Step ordering (semantic-release mode):
#   PSR runs first to determine the new version. With commit: "false" PSR
#   stamps the bumped version into pyproject.toml in the working tree
#   (uncommitted but staged) and pushes a tag that points at the pre-bump
#   HEAD commit. The build that follows reads the bumped version from that
#   working-tree edit, so dist/, the SBOM, the SLSA hashes, and the Sigstore
#   bundles all carry the correct version. Manual-tag mode is unaffected:
#   the build runs on the already-checked-out tagged commit.
# ============================================================================

name: Python Release (Reusable)

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to use'
        required: false
        type: string
        default: '3.12'
      coverage-threshold:
        description: 'Minimum code coverage percentage for pre-release tests'
        required: false
        type: number
        default: 80
      source-directory:
        description: 'Source code directory'
        required: false
        type: string
        default: 'src'
      semantic-release:
        description: 'Use semantic release (true) or manual tag-based (false)'
        required: false
        type: boolean
        default: true
      force-release:
        description: 'Force release type (empty for auto)'
        required: false
        type: string
        default: ''
      publish-to-pypi:
        description: 'Publish to PyPI after release'
        required: false
        type: boolean
        default: false
      pypi-package-name:
        description: 'PyPI package name'
        required: false
        type: string
        default: ''
      pypi-url:
        description: 'PyPI upload URL'
        required: false
        type: string
        default: 'https://upload.pypi.org/legacy/'
      run-tests:
        description: 'Run tests before release'
        required: false
        type: boolean
        default: true
      skip-tests-reason:
        description: 'Reason for skipping pre-release tests (REQUIRED when run-tests is false; e.g., "tests run in upstream pipeline X")'
        required: false
        type: string
        default: ''
      generate-sbom:
        description: 'Generate Software Bill of Materials'
        required: false
        type: boolean
        default: true
      sign-artifacts:
        description: 'Sign artifacts with Sigstore'
        required: false
        type: boolean
        default: true
      no-build:
        description: 'Pass --no-build to uv sync/run commands (disable for projects with a build backend like hatchling)'
        required: false
        type: boolean
        default: true
    outputs:
      released:
        description: 'Whether a release was created'
        value: ${{ jobs.release.outputs.released }}
      version:
        description: 'The released version'
        value: ${{ jobs.release.outputs.version }}
      tag:
        description: 'The release tag'
        value: ${{ jobs.release.outputs.tag }}

permissions: {}

jobs:
  # ============================================================================
  # Job 1: Run Tests Before Release
  # ============================================================================
  test:
    name: Pre-Release Tests
    runs-on: ubuntu-latest
    if: ${{ inputs.run-tests }}
    permissions:
      contents: read
    timeout-minutes: 15
    env:
      NO_BUILD_FLAG: ${{ inputs.no-build && '--no-build' || '' }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true

      - name: Set up Python
        env:
          PYTHON_VERSION: ${{ inputs.python-version }}
        run: uv python install "$PYTHON_VERSION"

      # Detect the repo state before attempting uv sync. The reusable workflow is uv-only
      # by org policy (poetry repos are being converted to uv in separate work), but it is
      # still called by some repos that don't have a pyproject.toml (template / docs-only
      # forks) and by uv-managed repos that haven't yet committed a uv.lock. Hardcoding
      # `uv sync --frozen` failed for both categories. Auto-detection skips cleanly when
      # pyproject is absent and drops --frozen when no lockfile exists yet. Poetry repos
      # are explicitly rejected with an actionable error.
      - name: Detect repo state
        id: detect
        run: |
          if [ ! -f pyproject.toml ]; then
            echo "state=skip" >> $GITHUB_OUTPUT
            echo "::notice::No pyproject.toml found at repo root; pre-release tests will be skipped. Remove the python-release.yml caller from this repo if it does not need Python release automation."
          elif [ -f poetry.lock ] || grep -qE '^\[tool\.poetry(\.|])' pyproject.toml; then
            echo "state=poetry-not-supported" >> $GITHUB_OUTPUT
            echo "::error::This repo uses Poetry. The python-release.yml reusable workflow is uv-only by org policy. Convert this repo to uv before re-enabling Python release automation."
            exit 1
          elif [ -f uv.lock ]; then
            echo "state=uv-locked" >> $GITHUB_OUTPUT
            echo "Detected: uv with lockfile"
          else
            echo "state=uv-no-lock" >> $GITHUB_OUTPUT
            echo "Detected: uv without lockfile (PEP 621 pyproject.toml only); will sync without --frozen"
          fi
        shell: bash

      - name: Install dependencies (uv with lockfile)
        if: steps.detect.outputs.state == 'uv-locked'
        run: uv sync --all-extras --frozen $NO_BUILD_FLAG
        shell: bash

      # SonarCloud cannot follow the $NO_BUILD_FLAG env-var indirection, and by design no
      # uv.lock exists yet on this path until this step generates one. Inline NOSONAR with
      # rationale; the uv-locked install step above keeps the literal --frozen visible.
      - name: Install dependencies (uv without lockfile)
        if: steps.detect.outputs.state == 'uv-no-lock'
        run: uv sync --all-extras $NO_BUILD_FLAG  # NOSONAR(S8541,S8544): --no-build opt-out via `no-build` input; no uv.lock by design on this path
        shell: bash

      - name: Skip notice (no pyproject.toml)
        if: steps.detect.outputs.state == 'skip'
        run: |
          echo "## Pre-Release Tests Skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No pyproject.toml at repo root, nothing to test." >> $GITHUB_STEP_SUMMARY

      - name: Run tests
        if: steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock'
        env:
          SRC_DIR: ${{ inputs.source-directory }}
          COVERAGE_THRESHOLD: ${{ inputs.coverage-threshold }}
        run: |
          # NOSONAR(S8541): --no-build is opt-out via `no-build` workflow input
          uv run --frozen $NO_BUILD_FLAG pytest \
            --cov="$SRC_DIR" \
            --cov-report=term-missing \
            --cov-fail-under="$COVERAGE_THRESHOLD" \
            -v

      - name: Run type checker
        if: steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock'
        env:
          SRC_DIR: ${{ inputs.source-directory }}
        run: uv run --frozen $NO_BUILD_FLAG basedpyright "$SRC_DIR/"  # NOSONAR(S8541): --no-build is opt-out via `no-build` workflow input

      - name: Run linter
        if: steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock'
        env:
          SRC_DIR: ${{ inputs.source-directory }}
        run: uv run --frozen $NO_BUILD_FLAG ruff check "$SRC_DIR/"  # NOSONAR(S8541): --no-build is opt-out via `no-build` workflow input

  # ============================================================================
  # Job 2: Build and Create Release
  # ============================================================================
  release:
    name: Build & Release
    needs: test
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NO_BUILD_FLAG: ${{ inputs.no-build && '--no-build' || '' }}
    permissions:
      contents: write
      id-token: write
      attestations: write
      issues: write        # semantic-release posts release notes to referenced issues
      pull-requests: write # semantic-release comments on merged PRs in release notes
    outputs:
      released: ${{ steps.semantic-release.outputs.released || steps.manual-release.outputs.released }}
      version: ${{ steps.semantic-release.outputs.version || steps.manual-release.outputs.version }}
      tag: ${{ steps.semantic-release.outputs.tag || steps.manual-release.outputs.tag }}
      # #EDGE Empty string when no release is produced (semantic-release mode
      # with no releasable commits): the hash step is gated on released == 'true'.
      # #VERIFY: callers consuming this output for SLSA provenance must gate
      # their provenance job on the released output, not on hashes alone.
      hashes: ${{ steps.hash.outputs.hashes }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - name: Verify trusted workflow_run source
        if: github.event_name == 'workflow_run'
        env:
          HEAD_OWNER: ${{ github.event.workflow_run.head_repository.owner.login }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          if [ "$HEAD_OWNER" != "$REPO_OWNER" ]; then
            echo "::error::Refusing: triggering workflow originated from a fork (owner: $HEAD_OWNER)"
            exit 1
          fi

      - name: Validate skip-tests opt-out
        if: ${{ !inputs.run-tests }}
        env:
          SKIP_TESTS_REASON: ${{ inputs.skip-tests-reason }}
        run: |
          if [ -z "$SKIP_TESTS_REASON" ]; then
            echo "::error::run-tests is false but skip-tests-reason is empty."
            echo "::error::Pre-release tests are a required quality gate. To opt out intentionally, supply a non-empty skip-tests-reason input documenting why (e.g., 'tests run in upstream pipeline X')."
            exit 1
          fi
          echo "Pre-release tests skipped intentionally. Reason: $SKIP_TESTS_REASON"

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0
          token: ${{ github.token }}
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Attach HEAD to branch
        if: github.event_name == 'workflow_run'
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          # Checking out a SHA leaves the repo in detached HEAD state.
          # PSR needs an attached branch to match against branches config.
          git checkout -B "$HEAD_BRANCH"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true

      # Detect the repo state before attempting uv sync. Mirrors the test job; same
      # rationale (callers may be uv-locked, uv-no-lock, poetry, or have no pyproject).
      # Release flow exits 1 on poetry-not-supported and skip states because a release
      # requires a buildable Python package.
      - name: Detect repo state
        id: detect
        run: |
          if [ ! -f pyproject.toml ]; then
            echo "state=skip" >> $GITHUB_OUTPUT
            echo "::error::No pyproject.toml found at repo root; python-release.yml requires a Python package to build and release. Remove the python-release.yml caller from this repo if it does not produce a Python package."
            exit 1
          elif [ -f poetry.lock ] || grep -qE '^\[tool\.poetry(\.|])' pyproject.toml; then
            echo "state=poetry-not-supported" >> $GITHUB_OUTPUT
            echo "::error::This repo uses Poetry. The python-release.yml reusable workflow is uv-only by org policy. Convert this repo to uv before re-enabling Python release automation."
            exit 1
          elif [ -f uv.lock ]; then
            echo "state=uv-locked" >> $GITHUB_OUTPUT
            echo "Detected: uv with lockfile"
          else
            echo "state=uv-no-lock" >> $GITHUB_OUTPUT
            echo "Detected: uv without lockfile (PEP 621 pyproject.toml only); will sync without --frozen"
          fi
        shell: bash

      - name: Install dependencies (uv with lockfile)
        if: steps.detect.outputs.state == 'uv-locked'
        run: uv sync --all-extras --frozen $NO_BUILD_FLAG
        shell: bash

      # SonarCloud cannot follow the $NO_BUILD_FLAG env-var indirection, and by design no
      # uv.lock exists yet on this path until this step generates one. Inline NOSONAR with
      # rationale; the uv-locked install step above keeps the literal --frozen visible.
      - name: Install dependencies (uv without lockfile)
        if: steps.detect.outputs.state == 'uv-no-lock'
        run: uv sync --all-extras $NO_BUILD_FLAG  # NOSONAR(S8541,S8544): --no-build opt-out via `no-build` input; no uv.lock by design on this path
        shell: bash

      # -----------------------------------------------------------------------
      # Semantic Release Mode: PSR runs BEFORE the build so the version bump
      # is reflected in dist/. PSR pushes a tag (commit: false so no branch
      # push is attempted against the ruleset-protected main) and stamps the
      # bumped version into the working tree without committing it. The build
      # reads the bumped version from that working-tree edit; the tag checkout
      # below is a same-commit guard, not the source of the bump.
      # -----------------------------------------------------------------------

      # Semantic Release Mode
      - name: Python Semantic Release
        if: ${{ inputs.semantic-release }}
        id: semantic-release
        # #ASSUME PSR v10.5.3 outputs released, version, tag as step outputs.
        # #VERIFY on PSR major upgrades: confirm output names are unchanged.
        # #CRITICAL commit: "false" means PSR pushes a tag but creates no branch
        # commit, so the tag points at the PRE-bump HEAD commit. PSR still stamps
        # and stages the bumped version in the working tree (PSR >= 10.1.0:
        # "Always stage version stamped files & changelog even with --no-commit").
        # #VERIFY: branch rulesets must allow tag-ref pushes from github-actions[bot].
        # #VERIFY on PSR upgrades: confirm version stamping still occurs in the
        # working tree when commit is disabled; the build below depends on it.
        # #ASSUME github.token has contents: write (granted at job level above).
        # #VERIFY: caller must pass contents: write in their permissions block.
        uses: python-semantic-release/python-semantic-release@39dd2052f2ce8282a5d932c31d58a2ca06d2550e  # v10.6.1
        with:
          github_token: ${{ github.token }}
          git_committer_name: "github-actions[bot]"
          git_committer_email: "github-actions[bot]@users.noreply.github.com"
          force_level: ${{ inputs.force-release }}
          # Branch ruleset blocks direct commits; tag refs are exempt. Skipping
          # the version-bump commit means PSR only pushes a tag, which succeeds
          # without any bypass actor.
          commit: "false"
          # PSR v10.5.3 serializes draft/prerelease as JSON strings ("false")
          # instead of booleans, which GitHub's Releases API rejects with 422.
          # Release creation is handled by the step below via gh, which types
          # booleans correctly.
          vcs_release: "false"

      # With commit: "false" PSR stamps and stages the bumped version in the
      # working tree (uncommitted) and tags the PRE-bump HEAD commit. This
      # checkout therefore targets the commit HEAD is already on: a tree-level
      # no-op that git permits while carrying the uncommitted bump forward.
      # uv build reads the bumped version from PSR's working-tree edit, not
      # from the tag's committed content (fix for issue #204). The version
      # guard below fails the job if the bump ever stops reaching the build.
      # #CRITICAL: never replace this step with a clean checkout of the tag
      # (actions/checkout with ref:, git reset --hard, or a fresh clone). The
      # tag's committed pyproject.toml carries the PREVIOUS version; a clean
      # checkout discards the uncommitted bump and silently rebuilds
      # mis-versioned artifacts (the exact issue #204 regression).
      # #VERIFY: the version guard below must stay in place and must compare
      # against steps.semantic-release.outputs.version.
      # Known limitation: the pushed tag's committed source carries the
      # previous version string; release artifacts are authoritative. Building
      # from the tag (pip install git+...@vX.Y.Z) reproduces the pre-bump
      # version. Accepted trade-off of commit: "false" under branch rulesets.
      # #CRITICAL: steps.detect.outputs.state was captured before PSR ran; safe
      # to reuse because PSR writes only version stamps, never lock files.
      # #VERIFY on PSR upgrades: confirm PSR leaves uv.lock untouched and
      # writes nothing beyond version stamps (else the synced venv goes stale).
      # #ASSUME PSR outputs.tag is the tag name (e.g. "v1.2.3") accepted by git checkout.
      # #VERIFY on PSR major upgrades: confirm outputs.tag format is unchanged.
      # #EDGE If PSR decides no release is needed (released == 'false') this step is
      # skipped and subsequent build/sign/release steps are also skipped via their
      # conditions, so the job exits cleanly with no artifacts.
      # #VERIFY: a run with no releasable commits must end green with no dist/.
      # Note: this checkout re-enters detached HEAD (inverse of the earlier
      # "Attach HEAD to branch" step). Safe here because PSR already ran and no
      # later step commits or pushes; re-attach before adding any step that does.
      - name: Checkout PSR tag (bumped version)
        if: ${{ inputs.semantic-release && steps.semantic-release.outputs.released == 'true' }}
        env:
          PSR_TAG: ${{ steps.semantic-release.outputs.tag }}
          PSR_VERSION: ${{ steps.semantic-release.outputs.version }}
        run: |
          git checkout "$PSR_TAG"
          echo "Checked out PSR tag: $PSR_TAG"
          VERSION_LINE=$(grep -E '^version\s*=' pyproject.toml || true)
          echo "pyproject.toml version line after checkout: $VERSION_LINE"
          if [ -z "$VERSION_LINE" ]; then
            echo "No static version line in pyproject.toml (dynamic versioning?); skipping version guard."
          elif ! printf '%s' "$VERSION_LINE" | grep -qF "$PSR_VERSION"; then
            echo "::error::pyproject.toml does not carry PSR version $PSR_VERSION after tag checkout. The uncommitted version stamp was lost; building now would repeat issue #204."
            exit 1
          fi

      # -----------------------------------------------------------------------
      # Build, SBOM, hashing: run after PSR (semantic mode) or directly on the
      # tagged commit (manual mode). Gated on detect state from the initial
      # checkout; the lock-file state is unchanged by the PSR tag checkout.
      # -----------------------------------------------------------------------

      - name: Build package
        if: |
          (steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock') &&
          (!inputs.semantic-release || steps.semantic-release.outputs.released == 'true')
        run: |
          uv build
          echo "Built packages:"
          ls -lh dist/

      - name: Generate SBOM
        if: |
          inputs.generate-sbom &&
          (steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock') &&
          (!inputs.semantic-release || steps.semantic-release.outputs.released == 'true')
        run: |
          echo "Generating Software Bill of Materials..."
          uv pip install --no-build 'cyclonedx-bom==7.3.0'
          uv export --format requirements-txt --output-file requirements-all.txt --no-hashes
          uv run cyclonedx-py requirements requirements-all.txt --of json --output-file dist/sbom.json
          rm -f requirements-all.txt
          echo "SBOM generated: dist/sbom.json"

      - name: Generate artifact hashes
        id: hash
        if: |
          (steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock') &&
          (!inputs.semantic-release || steps.semantic-release.outputs.released == 'true')
        working-directory: dist
        run: |
          echo "hashes=$(sha256sum ./* | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Sign artifacts with Sigstore
        if: |
          inputs.sign-artifacts &&
          (steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock') &&
          (!inputs.semantic-release || steps.semantic-release.outputs.released == 'true')
        # #ASSUME id-token: write (granted at job level) enables OIDC token issuance for Sigstore.
        # #VERIFY: caller must pass id-token: write; reusable workflows inherit caller permissions
        # only when the caller explicitly grants them.
        # #CRITICAL gh-action-sigstore-python needs id-token: write (OIDC) and, for the
        # release-signing-artifacts upload path, contents: write; both are granted above.
        # attestations: write is NOT used by this action (it belongs to GitHub's
        # actions/attest-build-provenance API) and is granted at job level only for
        # potential future provenance use.
        # #VERIFY: if Sigstore bundle uploads fail, check the id-token and contents
        # grants, not attestations.
        uses: sigstore/gh-action-sigstore-python@5b79a39c381910c090341a2c9b0bf022c8b387e1  # v3.4.0
        with:
          inputs: ./dist/*.tar.gz ./dist/*.whl
          release-signing-artifacts: true

      - name: Create GitHub Release
        if: ${{ inputs.semantic-release && steps.semantic-release.outputs.released == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.semantic-release.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --repo "$GITHUB_REPOSITORY" \
            dist/*

      # Manual Release Mode
      - name: Manual Release
        if: ${{ !inputs.semantic-release }}
        id: manual-release
        env:
          TAG_INPUT: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          TAG="$TAG_INPUT"
          VERSION="${TAG#v}"
          echo "released=true" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release (Manual)
        if: ${{ !inputs.semantic-release }}
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          tag_name: ${{ steps.manual-release.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.json
            dist/*.sig
            dist/*.crt
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Upload distribution artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: release-dist
          path: dist/
          retention-days: 5

      - name: Release Summary
        if: steps.semantic-release.outputs.released == 'true' || steps.manual-release.outputs.released == 'true'
        env:
          SIGN_ARTIFACTS: ${{ inputs.sign-artifacts }}
          GENERATE_SBOM: ${{ inputs.generate-sbom }}
          RELEASE_VERSION: ${{ steps.semantic-release.outputs.version || steps.manual-release.outputs.version }}
          RELEASE_TAG: ${{ steps.semantic-release.outputs.tag || steps.manual-release.outputs.tag }}
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** $RELEASE_VERSION" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** $RELEASE_TAG" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Security Features" >> $GITHUB_STEP_SUMMARY
          if [ "$SIGN_ARTIFACTS" == "true" ]; then
            echo "- Sigstore signing: enabled" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "$GENERATE_SBOM" == "true" ]; then
            echo "- SBOM generated: enabled" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- SHA256 hashes: available" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # Job 3: Publish to PyPI
  # ============================================================================
  publish-pypi:
    name: Publish to PyPI
    needs: release
    if: ${{ inputs.publish-to-pypi && (needs.release.outputs.released == 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/${{ inputs.pypi-package-name }}/
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: release-dist
          path: dist/

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2

      - name: Publish to PyPI
        # Uses trusted publishing (OIDC) - configure at pypi.org/manage/account/publishing/
        # #ASSUME id-token: write (granted at job level) enables OIDC token for uv publish.
        # #VERIFY: PyPI project must have a trusted publisher configured for this workflow.
        run: uv publish --trusted-publishing always dist/*.whl dist/*.tar.gz
        env:
          UV_PUBLISH_URL: ${{ inputs.pypi-url }}

      - name: PyPI Summary
        env:
          PYPI_PACKAGE: ${{ inputs.pypi-package-name }}
          RELEASE_VERSION: ${{ needs.release.outputs.version }}
        run: |
          echo "## PyPI Publication" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Published **$PYPI_PACKAGE** version **$RELEASE_VERSION** to PyPI" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View on PyPI](https://pypi.org/project/$PYPI_PACKAGE/$RELEASE_VERSION/)" >> $GITHUB_STEP_SUMMARY
