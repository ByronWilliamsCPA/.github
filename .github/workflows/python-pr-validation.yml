# ============================================================================
# DEPRECATED - Reusable PR Validation Workflow
# ============================================================================
#
# THIS WORKFLOW IS DEPRECATED AND WILL BE REMOVED IN A FUTURE RELEASE.
#
# IMPORTANT - startup_failure root cause:
#   Earlier versions of this workflow declared `checks: write` at the
#   workflow-level permissions block. GitHub requires every calling job to
#   explicitly grant any permission a reusable workflow declares, even if that
#   permission is never exercised. Callers that did not pass `checks: write`
#   received a startup_failure with no further diagnostic output.
#
#   This permission has been removed in the current version because no step in
#   this workflow actually creates or updates check runs. If you were previously
#   forced to add `checks: write` to your calling job as a workaround, you can
#   remove it after updating to the current version of this workflow.
#
#   The safest path forward is to migrate to python-ci.yml (see below).
#
# Migration Guide:
#   Replace usage of this workflow with `python-ci.yml` which provides:
#   - All code quality checks (formatting, linting, type checking)
#   - Dead code detection with Vulture
#   - Test execution with coverage
#   - Security scanning (Bandit, Safety)
#   - LLM governance checks
#   - Optional SonarCloud/Codecov integration
#   - Tiered matrix testing
#
# Before (deprecated):
#   jobs:
#     pr-validation:
#       uses: ByronWilliamsCPA/.github/.github/workflows/python-pr-validation.yml@main
#
# After (recommended):
#   jobs:
#     ci:
#       uses: ByronWilliamsCPA/.github/.github/workflows/python-ci.yml@main
#       with:
#         python-version: '3.12'
#         coverage-threshold: 80
#         enable-dead-code-check: true
#
# For PR size labeling, use the standalone action:
#   - name: PR Size Labels
#     uses: codelytv/pr-size-labeler@v1
#
# ============================================================================
# ORIGINAL DESCRIPTION (for reference):
# Comprehensive pull request validation ensuring code quality before merge
#
# Features (now in python-ci.yml):
#   - PR title and description validation  (removed, use semantic-release)
#   - Conventional commit checking          (removed, use semantic-release)
#   - Code formatting verification          (python-ci.yml)
#   - Linting and type checking             (python-ci.yml)
#   - Test execution                        (python-ci.yml)
#   - Breaking change detection             (removed, naive implementation)
#   - Size labeling                         (use standalone action)
# ============================================================================

name: PR Validation (Reusable)

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to use'
        type: string
        required: false
        default: '3.12'

      source-directory:
        description: 'Source code directory'
        type: string
        required: false
        default: 'src'

      test-directory:
        description: 'Test directory'
        type: string
        required: false
        default: 'tests'

      require-tests:
        description: 'Require tests to pass'
        type: boolean
        required: false
        default: true

      require-conventional-commits:
        description: 'Require conventional commit format in PR title'
        type: boolean
        required: false
        default: true

      require-description:
        description: 'Require PR description'
        type: boolean
        required: false
        default: true

      min-description-length:
        description: 'Minimum PR description length'
        type: number
        required: false
        default: 50

      check-breaking-changes:
        description: 'Check for potential breaking changes'
        type: boolean
        required: false
        default: true

      add-size-labels:
        description: 'Add size labels based on changes'
        type: boolean
        required: false
        default: true

      coverage-threshold:
        description: 'Minimum code coverage percentage'
        type: number
        required: false
        default: 80

      # Legacy inputs for backward compatibility (ignored but accepted)
      validate-requirements:
        description: 'DEPRECATED: This input is ignored. Use python-ci.yml instead.'
        type: boolean
        required: false
        default: false

      validate-lockfile:
        description: 'DEPRECATED: This input is ignored. Use python-ci.yml instead.'
        type: boolean
        required: false
        default: false

      check-security:
        description: 'DEPRECATED: This input is ignored. Use python-ci.yml instead.'
        type: boolean
        required: false
        default: false

# Permissions granted to this workflow.
# Note for callers: only `contents: read` and `pull-requests: write` are
# required. `checks: write` was previously included here but is not used by
# any step in this workflow; it has been removed to prevent startup_failure
# in callers that did not explicitly grant that permission.
permissions:
  contents: read
  pull-requests: write

jobs:
  # Deprecation notice job - runs first to warn users
  deprecation-notice:
    name: Deprecation Warning
    runs-on: ubuntu-latest
    steps:
      - name: Deprecation Warning
        run: |
          echo "::warning::This workflow (python-pr-validation.yml) is DEPRECATED."
          echo "::warning::Please migrate to python-ci.yml which includes all quality checks plus Vulture dead code detection."
          echo ""
          echo "============================================================"
          echo "DEPRECATION NOTICE"
          echo "============================================================"
          echo ""
          echo "python-pr-validation.yml is deprecated and will be removed."
          echo ""
          echo "Migration steps:"
          echo "  1. Replace your workflow call with python-ci.yml"
          echo "  2. Remove any separate PR validation workflow files"
          echo ""
          echo "Example migration:"
          echo "  Before:"
          echo "    uses: ByronWilliamsCPA/.github/.github/workflows/python-pr-validation.yml@main"
          echo ""
          echo "  After:"
          echo "    uses: ByronWilliamsCPA/.github/.github/workflows/python-ci.yml@main"
          echo "    with:"
          echo "      enable-dead-code-check: true"
          echo ""
          echo "============================================================"

  # PR metadata validation
  pr-metadata:
    name: PR Metadata Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      title-valid: ${{ steps.validate-title.outputs.valid }}
      description-valid: ${{ steps.validate-description.outputs.valid }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - name: Validate PR title (Conventional Commits)
        id: validate-title
        if: ${{ inputs.require-conventional-commits }}
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "PR Title: $PR_TITLE"

          # Conventional commit regex
          PATTERN="^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?(!)?: .+"

          if [[ "$PR_TITLE" =~ $PATTERN ]]; then
            echo "valid=true" >> $GITHUB_OUTPUT
            echo "PR title follows conventional commit format"
          else
            echo "valid=false" >> $GITHUB_OUTPUT
            echo "::error::PR title does not follow conventional commit format"
            echo ""
            echo "Expected format: <type>(<scope>): <description>"
            echo "Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
            echo "Example: feat(auth): add OAuth2 support"
            exit 1
          fi

      - name: Validate PR description
        id: validate-description
        if: ${{ inputs.require-description }}
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          MIN_LENGTH: ${{ inputs.min-description-length }}
        run: |
          if [ -z "$PR_BODY" ]; then
            echo "valid=false" >> $GITHUB_OUTPUT
            echo "::error::PR description is required"
            exit 1
          fi

          # Remove whitespace and check length
          CLEAN_BODY=$(echo "$PR_BODY" | tr -d '[:space:]')
          BODY_LENGTH=${#CLEAN_BODY}

          if [ "$BODY_LENGTH" -lt "$MIN_LENGTH" ]; then
            echo "valid=false" >> $GITHUB_OUTPUT
            echo "::error::PR description must be at least $MIN_LENGTH characters (current: $BODY_LENGTH)"
            exit 1
          fi

          echo "valid=true" >> $GITHUB_OUTPUT
          echo "PR description is valid (length: $BODY_LENGTH)"

      - name: PR Metadata Summary
        if: always()
        env:
          REQUIRE_CONVENTIONAL_COMMITS: ${{ inputs.require-conventional-commits }}
          REQUIRE_DESCRIPTION: ${{ inputs.require-description }}
        run: |
          echo "## PR Metadata Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$REQUIRE_CONVENTIONAL_COMMITS" == "true" ]; then
            if [ "${{ steps.validate-title.outputs.valid }}" == "true" ]; then
              echo "- Title: Valid (Conventional Commits)" >> $GITHUB_STEP_SUMMARY
            else
              echo "- Title: Invalid" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          if [ "$REQUIRE_DESCRIPTION" == "true" ]; then
            if [ "${{ steps.validate-description.outputs.valid }}" == "true" ]; then
              echo "- Description: Valid" >> $GITHUB_STEP_SUMMARY
            else
              echo "- Description: Invalid or too short" >> $GITHUB_STEP_SUMMARY
            fi
          fi

  # Code quality checks
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Check formatting (Ruff)
        env:
          SRC_DIR: ${{ inputs.source-directory }}
          TEST_DIR: ${{ inputs.test-directory }}
        run: |
          echo "Checking code formatting..."
          uv run ruff format --check "$SRC_DIR/" "$TEST_DIR/" || {
            echo "::error::Code formatting issues detected. Run 'ruff format' to fix."
            exit 1
          }

      - name: Run linter (Ruff)
        env:
          SRC_DIR: ${{ inputs.source-directory }}
          TEST_DIR: ${{ inputs.test-directory }}
        run: |
          echo "Running linter..."
          uv run ruff check "$SRC_DIR/" "$TEST_DIR/" --output-format=github

      - name: Run type checker (BasedPyright)
        env:
          SRC_DIR: ${{ inputs.source-directory }}
        run: |
          echo "Running type checker..."
          uv run basedpyright "$SRC_DIR/" || {
            echo "::warning::Type checking found issues"
          }

      - name: Code Quality Summary
        if: always()
        run: |
          echo "## Code Quality Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Formatting: Checked with Ruff" >> $GITHUB_STEP_SUMMARY
          echo "- Linting: Checked with Ruff" >> $GITHUB_STEP_SUMMARY
          echo "- Type Checking: Checked with BasedPyright" >> $GITHUB_STEP_SUMMARY

  # Test execution
  tests:
    name: Test Suite
    if: ${{ inputs.require-tests }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests with coverage
        env:
          SRC_DIR: ${{ inputs.source-directory }}
          COVERAGE_THRESHOLD: ${{ inputs.coverage-threshold }}
        run: |
          uv run pytest \
            --cov="$SRC_DIR" \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under="$COVERAGE_THRESHOLD" \
            -v

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: pr-coverage
          path: coverage.xml
          retention-days: 7

  # Breaking change detection
  breaking-changes:
    name: Breaking Change Detection
    if: ${{ inputs.check-breaking-changes }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Check for breaking change indicators
        id: breaking
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Check PR title for breaking change indicator
          if [[ "$PR_TITLE" =~ "!" ]] || [[ "$PR_TITLE" =~ "BREAKING" ]]; then
            echo "has_breaking=true" >> $GITHUB_OUTPUT
            echo "::warning::PR indicates breaking changes"
          else
            echo "has_breaking=false" >> $GITHUB_OUTPUT
          fi

          # Check for potentially breaking file changes
          BREAKING_PATTERNS=(
            "setup.py"
            "pyproject.toml"
            "__init__.py"
            "api/"
            "public/"
          )

          git diff --name-only origin/${{ github.base_ref }}...HEAD > changed_files.txt

          BREAKING_FILES=""
          for pattern in "${BREAKING_PATTERNS[@]}"; do
            if grep -q "$pattern" changed_files.txt; then
              BREAKING_FILES="$BREAKING_FILES $pattern"
            fi
          done

          if [ -n "$BREAKING_FILES" ]; then
            echo "::notice::Potentially breaking files changed:$BREAKING_FILES"
            echo "breaking_files=$BREAKING_FILES" >> $GITHUB_OUTPUT
          fi

      - name: Breaking Change Summary
        if: always()
        run: |
          echo "## Breaking Change Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.breaking.outputs.has_breaking }}" == "true" ]; then
            echo "**Breaking change indicator found in PR title**" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -n "${{ steps.breaking.outputs.breaking_files }}" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Potentially breaking files modified:**" >> $GITHUB_STEP_SUMMARY
            echo "${{ steps.breaking.outputs.breaking_files }}" >> $GITHUB_STEP_SUMMARY
          fi

  # PR size labeling
  size-labeling:
    name: PR Size Labeling
    if: ${{ inputs.add-size-labels }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - name: Calculate PR size and add labels
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const { additions, deletions } = context.payload.pull_request;
            const totalChanges = additions + deletions;

            // Define size thresholds
            const sizes = [
              { label: 'size/XS', max: 10 },
              { label: 'size/S', max: 50 },
              { label: 'size/M', max: 200 },
              { label: 'size/L', max: 500 },
              { label: 'size/XL', max: Infinity }
            ];

            // Determine size label
            const sizeLabel = sizes.find(s => totalChanges <= s.max).label;

            // Remove existing size labels
            const existingLabels = context.payload.pull_request.labels
              .filter(l => l.name.startsWith('size/'))
              .map(l => l.name);

            for (const label of existingLabels) {
              if (label !== sizeLabel) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    name: label
                  });
                } catch (e) {
                  // Label might not exist
                }
              }
            }

            // Add new size label
            if (!existingLabels.includes(sizeLabel)) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [sizeLabel]
              });
            }

            console.log(`PR size: ${totalChanges} changes (+${additions}/-${deletions}) - ${sizeLabel}`);

  # Validation summary
  validation-summary:
    name: Dependency & Standards Validation
    needs: [pr-metadata, code-quality, tests, breaking-changes, size-labeling]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Generate validation summary
        run: |
          echo "## Dependency & Standards Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| PR Metadata | ${{ needs.pr-metadata.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Breaking Changes | ${{ needs.breaking-changes.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Size Labeling | ${{ needs.size-labeling.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Check validation result
        run: |
          # Check critical jobs
          if [ "${{ needs.pr-metadata.result }}" == "failure" ] || \
             [ "${{ needs.code-quality.result }}" == "failure" ] || \
             [ "${{ needs.tests.result }}" == "failure" ]; then
            echo "::error::PR validation failed"
            exit 1
          fi

          echo "PR validation passed"
