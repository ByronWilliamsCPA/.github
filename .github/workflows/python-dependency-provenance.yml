# Dependency Provenance (Reusable)
# Deterministic, keyless transitive-provenance reporter. Makes Open-Source
# vulnerability findings actionable by showing which DIRECT dependency
# introduces each insecure TRANSITIVE package.
#
# Pipeline (no Anthropic API key, no hosted Snyk quota):
#   1. detect-config  -- detect ecosystem (Python uv.lock/requirements,
#                        frontend package.json) and whether to open an issue.
#   2. provenance     -- run osv-scanner (keyless) to list vulnerable packages,
#                        then trace each back to its introducing direct dep via
#                        `uv tree --invert` (Python) and `npm why` (frontend).
#                        Assemble a Markdown report and upload it as an artifact.
#   3. post-issue     -- post/update a sticky GitHub issue (marker-anchored)
#                        with the report, via the gh CLI.
#
# Interpretation (which fix to apply) runs locally on the operator's
# subscription, separately from CI. This workflow only produces the
# deterministic report. See docs/workflows/python-dependency-provenance.md and
# ByronWilliamsCPA/.claude ADR-009 for the role boundary.
#
# Usage from downstream repos:
#   jobs:
#     provenance:
#       uses: ByronWilliamsCPA/.github/.github/workflows/python-dependency-provenance.yml@d5cf99101d4150ae5832d154cb42993705a09e31 # v7.0.1
#       permissions:
#         contents: read
#         issues: write   # only the post-issue job needs this
#       with:
#         python-version: '3.12'
#         open-issue: true
#
# Caller permission contract:
# #CRITICAL: a called (reusable) workflow runs with a GITHUB_TOKEN bounded by
#   the CALLER job's permissions. Callers MUST grant issues: write (plus
#   contents: read) at the workflow or calling-job level, or the post-issue job
#   fails. A callee job that requests a scope the caller did not grant fails at
#   startup (startup_failure) before any job runs.
# #ASSUME: the default GITHUB_TOKEN is sufficient to open/update issues; no
#   external token is required. The workflow is token-optional in the sense that
#   it consumes no third-party API key.
# #VERIFY: after changing permissions, trigger one caller run and confirm
#   `gh run view <id> --json conclusion` is not "startup_failure" and the sticky
#   issue is created/updated.

name: Dependency Provenance (Reusable)

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version for dependency resolution'
        type: string
        required: false
        default: '3.12'
      source-directory:
        description: 'Source code directory hint (reserved; provenance reads the lockfile at repo root)'
        type: string
        required: false
        default: 'src'
      lockfile:
        description: 'Python lockfile hint relative to repo root (uv.lock or a requirements*.txt). Auto-detected when empty.'
        type: string
        required: false
        default: ''
      frontend-directory:
        description: 'Directory containing the frontend package.json (npm audit + npm why run here).'
        type: string
        required: false
        default: 'frontend'
      open-issue:
        description: 'Post/update the sticky GitHub issue with the report. When false, only the artifact is produced.'
        type: boolean
        required: false
        default: true
      artifact-retention-days:
        description: 'Days to retain the report artifact'
        type: number
        required: false
        default: 90
      no-build:
        description: 'Pass --no-build to uv sync (disable for projects with a build backend)'
        type: boolean
        required: false
        default: true

permissions: {}

jobs:
  # ============================================================================
  # Job 1: Detect ecosystem and configuration
  # ============================================================================
  detect-config:
    name: Detect Config
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      python-state: ${{ steps.detect.outputs.python-state }}
      frontend-state: ${{ steps.detect.outputs.frontend-state }}
      ecosystems: ${{ steps.detect.outputs.ecosystems }}
      any: ${{ steps.detect.outputs.any }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
      - name: Detect ecosystems
        id: detect
        env:
          LOCKFILE_HINT: ${{ inputs.lockfile }}
          FRONTEND_DIR: ${{ inputs.frontend-directory }}
        shell: bash
        run: |
          set -euo pipefail
          python_state=skip
          # Poetry is uv-only by org policy; reject it with an actionable error.
          if [ -f poetry.lock ] || { [ -f pyproject.toml ] && grep -qE '^\[tool\.poetry(\.|])' pyproject.toml; }; then
            echo "::error::This repo uses Poetry. python-dependency-provenance.yml is uv-only by org policy for the Python path."
            exit 1
          fi
          if [ -n "$LOCKFILE_HINT" ] && [ -f "$LOCKFILE_HINT" ]; then
            case "$LOCKFILE_HINT" in
              *uv.lock) python_state=uv-locked ;;
              *requirements*.txt) python_state=requirements ;;
              *) python_state=requirements ;;
            esac
          elif [ -f uv.lock ]; then
            python_state=uv-locked
          elif ls requirements*.txt >/dev/null 2>&1; then
            python_state=requirements
          fi

          frontend_state=skip
          if [ -f "$FRONTEND_DIR/package.json" ]; then
            frontend_state=npm
          elif [ -f package.json ]; then
            frontend_state=npm-root
          fi

          ecosystems=""
          [ "$python_state" != "skip" ] && ecosystems="python"
          if [ "$frontend_state" != "skip" ]; then
            if [ -n "$ecosystems" ]; then
              ecosystems="$ecosystems,frontend"
            else
              ecosystems="frontend"
            fi
          fi

          any=true
          [ -z "$ecosystems" ] && any=false

          {
            echo "python-state=$python_state"
            echo "frontend-state=$frontend_state"
            echo "ecosystems=$ecosystems"
            echo "any=$any"
          } >> "$GITHUB_OUTPUT"

          if [ "$any" = "false" ]; then
            echo "::notice::No Python lockfile or frontend package.json found; provenance report will note 'no ecosystems scanned'."
          else
            echo "::notice::Ecosystems detected: $ecosystems (python=$python_state, frontend=$frontend_state)"
          fi

  # ============================================================================
  # Job 2: Build the provenance report
  # ============================================================================
  provenance:
    name: Build Provenance Report
    needs: detect-config
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      has-findings: ${{ steps.assemble.outputs.has-findings }}
      finding-count: ${{ steps.assemble.outputs.finding-count }}
    env:
      NO_BUILD_FLAG: ${{ inputs.no-build && '--no-build' || '' }}
      PYTHON_STATE: ${{ needs.detect-config.outputs.python-state }}
      FRONTEND_STATE: ${{ needs.detect-config.outputs.frontend-state }}
      FRONTEND_DIR: ${{ inputs.frontend-directory }}
      LOCKFILE_HINT: ${{ inputs.lockfile }}
      ECOSYSTEMS: ${{ needs.detect-config.outputs.ecosystems }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install UV
        if: env.PYTHON_STATE != 'skip'
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      # Resolve the Python environment so `uv tree --invert` has a graph to walk.
      # uv-locked installs from the committed lockfile (no network resolve).
      - name: Sync Python environment (uv-locked)
        if: env.PYTHON_STATE == 'uv-locked'
        run: uv sync --frozen $NO_BUILD_FLAG  # NOSONAR(S8541): --no-build is opt-out via the `no-build` workflow input
        shell: bash

      # Choose the OSV-Scanner lockfile target. For uv-locked repos OSV-Scanner
      # reads uv.lock directly; the requirements path points at the chosen file.
      - name: Build Python OSV target
        if: env.PYTHON_STATE != 'skip'
        id: python-inputs
        shell: bash
        run: |
          set -euo pipefail
          if [ "$PYTHON_STATE" = "uv-locked" ]; then
            osv_target="uv.lock"
          else
            if [ -n "$LOCKFILE_HINT" ] && [ -f "$LOCKFILE_HINT" ]; then
              osv_target="$LOCKFILE_HINT"
            else
              osv_target="$(ls requirements*.txt | head -n1)"
            fi
          fi
          echo "Python OSV target: $osv_target"
          echo "osv-target=$osv_target" >> "$GITHUB_OUTPUT"

      # OSV-Scanner, keyless. --format=json so the assembler can parse it.
      # Non-gating here: this job reports, it does not block.
      - name: Run OSV-Scanner (Python)
        if: env.PYTHON_STATE != 'skip'
        continue-on-error: true
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2  # v2.3.8
        with:
          scan-args: |-
            --lockfile=${{ steps.python-inputs.outputs.osv-target }}
            --format=json
            --output=osv-python.json

      # Frontend path: npm audit --json to list vulnerable packages, then
      # `npm why <pkg>` for provenance. Runs in the frontend directory.
      - name: Set up Node (frontend)
        if: env.FRONTEND_STATE != 'skip'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: '20'

      # Merge the per-ecosystem OSV and provenance files into single inputs,
      # then run the deterministic report assembler. Both the assembler and the
      # tracer helper scripts are checked out from this reusable workflow's own
      # commit (SHA-pinned), so a caller pinned to @<sha> runs exactly that code.
      - name: Checkout provenance scripts
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          sparse-checkout: |
            scripts/dependency_provenance.py
            scripts/dependency_provenance_trace.py
          sparse-checkout-cone-mode: false
          path: _prov

      - name: Verify provenance scripts are present
        env:
          CHECKER_REF: ${{ job.workflow_sha }}
        shell: bash
        run: |
          for f in dependency_provenance.py dependency_provenance_trace.py; do
            if [ ! -f "_prov/scripts/$f" ]; then
              echo "::error::scripts/$f not found after sparse checkout of ByronWilliamsCPA/.github@${CHECKER_REF}."
              exit 1
            fi
          done

      - name: Trace Python provenance
        if: env.PYTHON_STATE == 'uv-locked'
        env:
          OSV_PYTHON: osv-python.json
          PROVENANCE_PYTHON_OUT: provenance-python.json
        shell: bash
        run: python3 _prov/scripts/dependency_provenance_trace.py python

      - name: Trace frontend provenance
        if: env.FRONTEND_STATE != 'skip'
        env:
          FRONTEND_STATE: ${{ env.FRONTEND_STATE }}
          FRONTEND_DIR: ${{ env.FRONTEND_DIR }}
          ROOT_DIR: ${{ github.workspace }}
          OSV_FRONTEND_OUT: osv-frontend.json
          PROVENANCE_FRONTEND_OUT: provenance-frontend.json
        shell: bash
        run: python3 _prov/scripts/dependency_provenance_trace.py frontend

      - name: Merge OSV and provenance inputs
        env:
          OSV_MERGED_OUT: osv-merged.json
          PROVENANCE_MERGED_OUT: provenance-merged.json
        shell: bash
        run: python3 _prov/scripts/dependency_provenance_trace.py merge

      - name: Assemble provenance report
        id: assemble
        env:
          OSV_RESULTS: osv-merged.json
          PROVENANCE_MAP: provenance-merged.json
          REPORT_OUT: dependency-provenance-report.md
          REPO_SLUG: ${{ github.repository }}
          ECOSYSTEMS: ${{ env.ECOSYSTEMS }}
        shell: bash
        run: python3 _prov/scripts/dependency_provenance.py

      - name: Upload provenance report artifact
        if: always() && hashFiles('dependency-provenance-report.md') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dependency-provenance-report
          path: dependency-provenance-report.md
          retention-days: ${{ inputs.artifact-retention-days }}
          if-no-files-found: warn

  # ============================================================================
  # Job 3: Post/update the sticky GitHub issue
  # ============================================================================
  # The report is anchored by an HTML-comment marker on its first line. The job
  # searches for an open issue containing that marker; it updates the existing
  # one when found, else creates a new one. Zero-vuln runs still post/update a
  # "no actionable transitive vulns this week" issue so the sticky issue stays
  # current and visible (chosen over skipping so the cadence is observable).
  post-issue:
    name: Post Sticky Issue
    needs: [detect-config, provenance]
    if: inputs.open-issue
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - name: Download provenance report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dependency-provenance-report

      # #CRITICAL: the report body embeds package names from the dependency
      # graph. It is passed to gh via --body-file, never interpolated into a
      # shell command, so no package name can break out into the shell. All
      # dynamic values reach the shell through the env: block, never via
      # ${{ }} interpolation inside run:.
      - name: Post or update sticky issue
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HAS_FINDINGS: ${{ needs.provenance.outputs.has-findings }}
          FINDING_COUNT: ${{ needs.provenance.outputs.finding-count }}
          RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          marker="<!-- dependency-provenance -->"
          report="dependency-provenance-report.md"
          if [ ! -f "$report" ]; then
            echo "::error::Report file $report missing; cannot post issue."
            exit 1
          fi
          if [ "${HAS_FINDINGS:-false}" = "true" ]; then
            title="Dependency provenance: ${FINDING_COUNT:-?} actionable transitive vuln(s)"
          else
            title="Dependency provenance: no actionable transitive vulns this week"
          fi

          # Find an existing open issue carrying the marker, then confirm the
          # marker is in the body to avoid a title-only coincidence.
          existing=""
          for num in $(gh issue list --repo "$REPO" --state open --search "$marker in:body" --json number --jq '.[].number'); do
            body="$(gh issue view "$num" --repo "$REPO" --json body --jq '.body')"
            case "$body" in
              *"$marker"*)
                existing="$num"
                break
                ;;
            esac
          done

          if [ -n "$existing" ]; then
            echo "Updating existing sticky issue #$existing"
            gh issue edit "$existing" --repo "$REPO" --title "$title" --body-file "$report"
            gh issue comment "$existing" --repo "$REPO" \
              --body "Report refreshed by the weekly dependency-provenance run ($RUN_ID)."
          else
            echo "Creating new sticky issue"
            gh issue create --repo "$REPO" --title "$title" --body-file "$report"
          fi

  # ============================================================================
  # Job 4: Gate (aggregation / status surface)
  # ============================================================================
  # The provenance workflow is a REPORTER, not a merge gate: it never fails on
  # the presence of vulnerabilities (the gating OSV-Scanner job in
  # python-sbom.yml owns that). This gate only fails when a job errored, so a
  # broken report pipeline is visible.
  provenance-gate:
    name: Provenance Gate
    needs: [detect-config, provenance, post-issue]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit
      - name: Validate job results
        env:
          R_DETECT: ${{ needs.detect-config.result }}
          R_PROV: ${{ needs.provenance.result }}
          R_ISSUE: ${{ needs.post-issue.result }}
        shell: bash
        run: |
          echo "Detect: $R_DETECT | Provenance: $R_PROV | Post-issue: $R_ISSUE"
          is_ok() { [[ "$1" == "success" || "$1" == "skipped" ]]; }
          if is_ok "$R_DETECT" && is_ok "$R_PROV" && is_ok "$R_ISSUE"; then
            echo "Provenance gate passed"
          else
            echo "Provenance gate failed - the report pipeline errored; review job logs"
            exit 1
          fi
