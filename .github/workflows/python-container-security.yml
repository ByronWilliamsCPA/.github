# ============================================================================
# Reusable Container Security Workflow
# ============================================================================
# Combines Trivy container image scanning with Hadolint Dockerfile linting
#
# Usage from downstream repos:
#   jobs:
#     container-security:
#       uses: ByronWilliamsCPA/.github/.github/workflows/python-container-security.yml@v1
#       with:
#         image-ref: 'myapp:latest'
#         dockerfile-path: './Dockerfile'
#
# Features:
#   - Trivy container image vulnerability scanning
#   - Hadolint Dockerfile best practices linting
#   - SARIF upload to GitHub Security tab
#   - Configurable severity thresholds
#   - Optional container SBOM generation
# ============================================================================

name: Container Security (Reusable)

on:
  workflow_call:
    inputs:
      # Image scanning configuration
      image-ref:
        description: 'Container image reference to scan (e.g., myapp:latest or ghcr.io/org/app:v1)'
        type: string
        required: false
        default: ''

      build-image:
        description: 'Build image from Dockerfile before scanning'
        type: boolean
        required: false
        default: true

      dockerfile-path:
        description: 'Path to Dockerfile'
        type: string
        required: false
        default: './Dockerfile'

      build-context:
        description: 'Docker build context path'
        type: string
        required: false
        default: '.'

      image-tag:
        description: 'Tag for built image (used when build-image is true)'
        type: string
        required: false
        default: 'security-scan:latest'

      # Scanning configuration
      severity-threshold:
        description: 'Minimum severity to report (CRITICAL, HIGH, MEDIUM, LOW)'
        type: string
        required: false
        default: 'CRITICAL,HIGH'

      fail-on-vulnerabilities:
        description: 'Fail workflow if vulnerabilities found at threshold'
        type: boolean
        required: false
        default: true

      # Hadolint configuration
      run-hadolint:
        description: 'Run Hadolint Dockerfile linting'
        type: boolean
        required: false
        default: true

      hadolint-failure-threshold:
        description: 'Hadolint failure threshold (error, warning, info, style, ignore, none)'
        type: string
        required: false
        default: 'error'

      # SBOM configuration
      generate-sbom:
        description: 'Generate container SBOM'
        type: boolean
        required: false
        default: false

      # Artifact configuration
      upload-sarif:
        description: 'Upload SARIF results to GitHub Security tab'
        type: boolean
        required: false
        default: true

      artifact-retention-days:
        description: 'Days to retain security artifacts'
        type: number
        required: false
        default: 30

      # DHI Registry
      enable-dhi-login:
        description: 'Enable login to Docker Hardened Images (dhi.io) registry'
        type: boolean
        required: false
        default: true

    secrets:
      DHI_USERNAME:
        description: 'Docker Hardened Images registry username'
        required: false
      DHI_PAT:
        description: 'Docker Hardened Images registry personal access token'
        required: false

permissions: {}

jobs:
  # Hadolint Dockerfile linting
  hadolint:
    name: Dockerfile Lint (Hadolint)
    if: ${{ inputs.run-hadolint }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    timeout-minutes: 10

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Check Dockerfile exists
        id: check-dockerfile
        env:
          DOCKERFILE_PATH: ${{ inputs.dockerfile-path }}
        run: |
          if [ -f "$DOCKERFILE_PATH" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::warning::Dockerfile not found at $DOCKERFILE_PATH"
          fi

      - name: Run Hadolint
        if: steps.check-dockerfile.outputs.exists == 'true'
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3.3.0
        with:
          dockerfile: ${{ inputs.dockerfile-path }}
          failure-threshold: ${{ inputs.hadolint-failure-threshold }}
          format: sarif
          output-file: hadolint-results.sarif

      - name: Upload Hadolint SARIF
        if: ${{ inputs.upload-sarif && steps.check-dockerfile.outputs.exists == 'true' }}
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e  # v4.35.4
        with:
          sarif_file: hadolint-results.sarif
          category: hadolint
        continue-on-error: true

      - name: Hadolint Summary
        if: always() && steps.check-dockerfile.outputs.exists == 'true'
        env:
          DOCKERFILE_PATH: ${{ inputs.dockerfile-path }}
          HADOLINT_FAILURE_THRESHOLD: ${{ inputs.hadolint-failure-threshold }}
        run: |
          echo "## Hadolint Dockerfile Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Dockerfile:** \`$DOCKERFILE_PATH\`" >> $GITHUB_STEP_SUMMARY
          echo "**Failure Threshold:** $HADOLINT_FAILURE_THRESHOLD" >> $GITHUB_STEP_SUMMARY

  # Trivy container image scanning
  trivy-scan:
    name: Container Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    timeout-minutes: 20

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: audit

      - name: Checkout repository
        if: ${{ inputs.build-image }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # Conditional DHI login: docker/login-action emits "##[error]Username and
      # password required" when secrets are absent, which clutters CI logs even
      # though continue-on-error suppresses the failure. This shell-based form
      # silently skips when credentials are unset, and uses --password-stdin so
      # the PAT never appears in process listings.
      - name: Login to DHI Registry
        if: inputs.enable-dhi-login
        env:
          DHI_USERNAME: ${{ secrets.DHI_USERNAME }}
          DHI_PAT: ${{ secrets.DHI_PAT }}
        run: |
          if [ -z "${DHI_USERNAME}" ] || [ -z "${DHI_PAT}" ]; then
            echo "::notice::DHI credentials not configured; skipping dhi.io login (unauthenticated public pulls only)"
            exit 0
          fi
          echo "${DHI_PAT}" | docker login dhi.io -u "${DHI_USERNAME}" --password-stdin
        continue-on-error: true

      - name: Check Dockerfile exists
        if: ${{ inputs.build-image }}
        id: check-dockerfile
        env:
          DOCKERFILE_PATH: ${{ inputs.dockerfile-path }}
        run: |
          if [ -f "$DOCKERFILE_PATH" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::warning::Dockerfile not found at $DOCKERFILE_PATH, skipping build"
          fi

      - name: Build container image
        if: ${{ inputs.build-image && steps.check-dockerfile.outputs.exists == 'true' }}
        env:
          DOCKERFILE_PATH: ${{ inputs.dockerfile-path }}
          IMAGE_TAG: ${{ inputs.image-tag }}
          BUILD_CONTEXT: ${{ inputs.build-context }}
        run: |
          echo "Building container image..."
          docker build \
            -f "$DOCKERFILE_PATH" \
            -t "$IMAGE_TAG" \
            "$BUILD_CONTEXT"

      - name: Determine image to scan
        id: image
        env:
          IMAGE_TAG: ${{ inputs.image-tag }}
          IMAGE_REF: ${{ inputs.image-ref }}
          BUILD_IMAGE: ${{ inputs.build-image }}
          EXISTS: ${{ steps.check-dockerfile.outputs.exists }}
        run: |
          if [ "$BUILD_IMAGE" == "true" ] && [ "$EXISTS" == "true" ]; then
            echo "ref=$IMAGE_TAG" >> $GITHUB_OUTPUT
          elif [ -n "$IMAGE_REF" ]; then
            echo "ref=$IMAGE_REF" >> $GITHUB_OUTPUT
          else
            echo "ref=" >> $GITHUB_OUTPUT
            echo "::warning::No image to scan"
          fi

      - name: Trivy vulnerability scan
        if: steps.image.outputs.ref != ''
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.ref }}
          format: 'table'
          severity: ${{ inputs.severity-threshold }}
          scanners: 'vuln'  # Only scan for vulnerabilities, not licenses
          exit-code: ${{ inputs.fail-on-vulnerabilities && '1' || '0' }}

      - name: Trivy SARIF report
        if: ${{ inputs.upload-sarif && steps.image.outputs.ref != '' }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.ref }}
          format: 'sarif'
          output: 'trivy-container-results.sarif'
          scanners: 'vuln'  # Only scan for vulnerabilities, not licenses

      - name: Upload Trivy SARIF
        if: ${{ inputs.upload-sarif && steps.image.outputs.ref != '' }}
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e  # v4.35.4
        with:
          sarif_file: trivy-container-results.sarif
          category: trivy-container
        continue-on-error: true

      - name: Generate container SBOM
        if: ${{ inputs.generate-sbom && steps.image.outputs.ref != '' }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.ref }}
          format: 'cyclonedx'
          output: 'container-sbom.json'

      - name: Upload container security artifacts
        if: always() && steps.image.outputs.ref != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: container-security-reports
          path: |
            trivy-container-results.sarif
            container-sbom.json
          retention-days: ${{ inputs.artifact-retention-days }}
          if-no-files-found: ignore

      - name: Container Security Summary
        if: always()
        env:
          SEVERITY_THRESHOLD: ${{ inputs.severity-threshold }}
          GENERATE_SBOM: ${{ inputs.generate-sbom }}
        run: |
          echo "## Container Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -n "${{ steps.image.outputs.ref }}" ]; then
            echo "**Image:** \`${{ steps.image.outputs.ref }}\`" >> $GITHUB_STEP_SUMMARY
            echo "**Severity Threshold:** $SEVERITY_THRESHOLD" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "$GENERATE_SBOM" == "true" ]; then
              echo "Container SBOM generated (CycloneDX format)" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "No container image was scanned." >> $GITHUB_STEP_SUMMARY
          fi

  # Summary job
  security-summary:
    name: Security Summary
    needs: [hadolint, trivy-scan]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: audit

      - name: Overall security summary
        run: |
          echo "## Container Security Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Hadolint | ${{ needs.hadolint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy Scan | ${{ needs.trivy-scan.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Check for failures
        if: ${{ needs.hadolint.result == 'failure' || needs.trivy-scan.result == 'failure' }}
        run: |
          echo "::error::Container security checks failed"
          exit 1
