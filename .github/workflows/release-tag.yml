# Cut a semver tag on every push to main.
#
# Bump rules (conventional commits):
#   BREAKING CHANGE footer or ! modifier: major bump
#   feat: prefix: minor bump
#   all other types (fix, chore, ci, docs, refactor, perf, test): patch bump
#
# Creates a single annotated immutable tag (vX.Y.Z) and pushes it via
# GITHUB_TOKEN. The tag is immutable: it is never updated or force-pushed,
# which satisfies the org-level ByronWilliamsCPA-tag-protection-semver
# ruleset that blocks update/non_fast_forward on refs/tags/v*.
#
# Consumers pin to the immutable point tag or a full 40-char SHA
# (CI-005 enforcement); no floating major tag is published.

name: Release Tag

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  tag:
    name: Cut semver release tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0

      - name: Compute next version and tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Fetch all tags so git describe works on a fresh checkout.
          git fetch --tags --quiet

          PREV=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          MAJOR=$(echo "${PREV#v}" | cut -d. -f1)
          MINOR=$(echo "${PREV#v}" | cut -d. -f2)
          PATCH=$(echo "${PREV#v}" | cut -d. -f3)

          MSG=$(git log -1 --pretty=%B)

          if echo "$MSG" | grep -qE "BREAKING[[:space:]]CHANGE|^[a-z]+(\(.+\))?!:"; then
            MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0
          elif echo "$MSG" | grep -qE "^feat(\(.+\))?:"; then
            MINOR=$((MINOR+1)); PATCH=0
          else
            PATCH=$((PATCH+1))
          fi

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"

          echo "Previous tag: $PREV"
          echo "New tag:      $NEW_TAG"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
          git push origin "$NEW_TAG"
