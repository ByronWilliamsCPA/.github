# Python PyPI Publishing - Reusable Workflow
# Publishes to PyPI using OIDC Trusted Publishing (no secrets needed!)
#
# OIDC Setup Instructions:
# 1. Go to https://pypi.org/manage/account/publishing/
# 2. Add GitHub Actions as Trusted Publisher:
#    - PyPI Project Name: your-package-name
#    - Owner: your-org
#    - Repository: your-repo-name
#    - Workflow: publish.yml (or your workflow name)
#    - Environment: (leave blank or use 'release')
# 3. For TestPyPI: https://test.pypi.org/manage/account/publishing/
#
# Usage from downstream repos:
#   jobs:
#     publish:
#       uses: ByronWilliamsCPA/.github/.github/workflows/python-publish-pypi.yml@d5cf99101d4150ae5832d154cb42993705a09e31 # v7.0.1
#       with:
#         package-name: 'my-package'
#       permissions:
#         id-token: write
#         contents: read

name: Publish to PyPI (Reusable)

on:
  workflow_call:
    inputs:
      package-name:
        description: 'PyPI package name (for summary display only)'
        type: string
        required: false
        default: 'your-package'

      use-testpypi:
        description: 'Publish to TestPyPI instead of PyPI'
        type: boolean
        required: false
        default: false

      python-version:
        description: 'Python version for building'
        type: string
        required: false
        default: '3.12'

      run-security-checks:
        description: 'Run security checks before publishing'
        type: boolean
        required: false
        default: true

      source-directory:
        description: 'Source directory for security scans'
        type: string
        required: false
        default: 'src'

permissions: {}

jobs:
  build:
    name: Build Distribution Packages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install UV
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true

      - name: Create virtual environment
        # #CRITICAL: uv pip install requires an existing .venv (issue #106). uv venv
        # creates a bare venv at .venv; setup-uv@v8 puts .venv/bin on PATH so the
        # installed tool binaries (pip-audit, bandit, twine) are callable directly.
        run: uv venv

      - name: Run security checks
        if: ${{ inputs.run-security-checks }}
        env:
          SRC_DIR: ${{ inputs.source-directory }}
        run: |
          echo "Running pre-publish security checks..."
          uv pip install --no-build 'pip-audit==2.10.0'
          pip-audit --strict
          uv pip install --no-build 'bandit[toml]==1.9.4'
          bandit -r "$SRC_DIR" -c pyproject.toml -ll

      - name: Build distribution packages
        run: |
          uv build
          echo "📦 Built packages:"
          ls -lh dist/

      - name: Verify package metadata
        run: |
          uv pip install --no-build 'twine==6.2.0'
          twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: python-package-distributions
          path: dist/
          retention-days: 5
          if-no-files-found: error

  publish-to-pypi:
    name: Publish to PyPI
    if: ${{ !inputs.use-testpypi }}
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write  # Required for OIDC

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Verify artifacts
        run: |
          echo "📦 Packages to publish to PyPI:"
          ls -lh dist/

          echo ""
          echo "🔒 Using OIDC Trusted Publishing (no secrets needed)"

      - name: Publish to PyPI
        # #VERIFY: v1.14.0 internally pins actions/setup-python v5.6.0 (node20).
        # Upstream already bumped to setup-python v6.2.0 (node24) on unstable/v1;
        # re-pin here when the next release ships. After GitHub's 2026-06-16
        # cutover, node20 actions execute on node24 automatically, so until then
        # this surfaces as a deprecation warning only, not a failure.
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247  # v1.14.1
        with:
          print-hash: true
          verbose: true

      - name: Publication summary
        env:
          PACKAGE_NAME: ${{ inputs.package-name }}
        run: |
          echo "## 🎉 Published to PyPI!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Project**: https://pypi.org/project/$PACKAGE_NAME/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Install**: \`pip install $PACKAGE_NAME\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔒 Security" >> $GITHUB_STEP_SUMMARY
          echo "- Published using OIDC Trusted Publishing" >> $GITHUB_STEP_SUMMARY
          echo "- No API tokens or passwords used" >> $GITHUB_STEP_SUMMARY
          echo "- Full audit trail at PyPI" >> $GITHUB_STEP_SUMMARY

  publish-to-testpypi:
    name: Publish to TestPyPI
    if: ${{ inputs.use-testpypi }}
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write  # Required for OIDC

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Verify artifacts
        run: |
          echo "📦 Test packages to publish to TestPyPI:"
          ls -lh dist/

          echo ""
          echo "🔒 Using OIDC Trusted Publishing (no secrets needed)"

      - name: Publish to TestPyPI
        # #VERIFY: see node20 note on the PyPI publish step above.
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247  # v1.14.1
        with:
          repository-url: https://test.pypi.org/legacy/
          print-hash: true
          verbose: true

      - name: Publication summary
        env:
          PACKAGE_NAME: ${{ inputs.package-name }}
        run: |
          echo "## 🧪 Published to TestPyPI!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Project**: https://test.pypi.org/project/$PACKAGE_NAME/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Test Install**:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "pip install --index-url https://test.pypi.org/simple/ $PACKAGE_NAME" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔒 Security" >> $GITHUB_STEP_SUMMARY
          echo "- Published using OIDC Trusted Publishing" >> $GITHUB_STEP_SUMMARY
          echo "- No API tokens or passwords used" >> $GITHUB_STEP_SUMMARY
          echo "- Full audit trail at TestPyPI" >> $GITHUB_STEP_SUMMARY
