# Python PyPI Publishing - Reusable Workflow
# Publishes to PyPI using OIDC Trusted Publishing (no secrets needed!)
#
# OIDC Setup Instructions:
# 1. Go to https://pypi.org/manage/account/publishing/
# 2. Add GitHub Actions as Trusted Publisher:
#    - PyPI Project Name: your-package-name
#    - Owner: your-org
#    - Repository: your-repo-name
#    - Workflow: publish.yml (or your workflow name)
#    - Environment: (leave blank or use 'release')
# 3. For TestPyPI: https://test.pypi.org/manage/account/publishing/
#
# Usage from downstream repos:
#   jobs:
#     publish:
#       uses: ByronWilliamsCPA/.github/.github/workflows/python-publish-pypi.yml@main
#       with:
#         package-name: 'my-package'
#       permissions:
#         id-token: write
#         contents: read

name: Publish to PyPI (Reusable)

on:
  workflow_call:
    inputs:
      package-name:
        description: 'PyPI package name (for summary display only)'
        type: string
        required: false
        default: 'your-package'

      use-testpypi:
        description: 'Publish to TestPyPI instead of PyPI'
        type: boolean
        required: false
        default: false

      python-version:
        description: 'Python version for building'
        type: string
        required: false
        default: '3.12'

      run-security-checks:
        description: 'Run security checks before publishing'
        type: boolean
        required: false
        default: true

      source-directory:
        description: 'Source directory for security scans'
        type: string
        required: false
        default: 'src'

# Cancel in-progress runs for same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write  # Required for OIDC

jobs:
  build:
    name: Build Distribution Packages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install UV
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          enable-cache: true

      - name: Run security checks
        if: ${{ inputs.run-security-checks }}
        run: |
          echo "🔒 Running pre-publish security checks..."

          # Install security tools
          pip install safety bandit

          # Check for known vulnerabilities in dependencies
          echo "📦 Checking dependencies for vulnerabilities..."
          safety check || echo "⚠️  Safety check found issues - review before publishing"

          # Scan source code for security issues
          echo "🔍 Scanning source code..."
          bandit -r ${{ inputs.source-directory }} -ll || echo "⚠️  Bandit found issues - review before publishing"

      - name: Build distribution packages
        run: |
          uv build
          echo "📦 Built packages:"
          ls -lh dist/

      - name: Verify package metadata
        run: |
          pip install twine==6.2.0
          twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: python-package-distributions
          path: dist/
          retention-days: 5
          if-no-files-found: error

  publish-to-pypi:
    name: Publish to PyPI
    if: ${{ !inputs.use-testpypi }}
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write  # Required for OIDC

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: audit

      - name: Download distribution artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: python-package-distributions
          path: dist/

      - name: Verify artifacts
        run: |
          echo "📦 Packages to publish to PyPI:"
          ls -lh dist/

          echo ""
          echo "🔒 Using OIDC Trusted Publishing (no secrets needed)"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          print-hash: true
          verbose: true

      - name: Publication summary
        run: |
          echo "## 🎉 Published to PyPI!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Project**: https://pypi.org/project/${{ inputs.package-name }}/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Install**: \`pip install ${{ inputs.package-name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔒 Security" >> $GITHUB_STEP_SUMMARY
          echo "- Published using OIDC Trusted Publishing" >> $GITHUB_STEP_SUMMARY
          echo "- No API tokens or passwords used" >> $GITHUB_STEP_SUMMARY
          echo "- Full audit trail at PyPI" >> $GITHUB_STEP_SUMMARY

  publish-to-testpypi:
    name: Publish to TestPyPI
    if: ${{ inputs.use-testpypi }}
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write  # Required for OIDC

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: audit

      - name: Download distribution artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: python-package-distributions
          path: dist/

      - name: Verify artifacts
        run: |
          echo "📦 Test packages to publish to TestPyPI:"
          ls -lh dist/

          echo ""
          echo "🔒 Using OIDC Trusted Publishing (no secrets needed)"

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          print-hash: true
          verbose: true

      - name: Publication summary
        run: |
          echo "## 🧪 Published to TestPyPI!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Project**: https://test.pypi.org/project/${{ inputs.package-name }}/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Test Install**:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "pip install --index-url https://test.pypi.org/simple/ ${{ inputs.package-name }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔒 Security" >> $GITHUB_STEP_SUMMARY
          echo "- Published using OIDC Trusted Publishing" >> $GITHUB_STEP_SUMMARY
          echo "- No API tokens or passwords used" >> $GITHUB_STEP_SUMMARY
          echo "- Full audit trail at TestPyPI" >> $GITHUB_STEP_SUMMARY
