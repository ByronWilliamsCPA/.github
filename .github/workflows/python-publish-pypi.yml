# Python PyPI Publishing - Reusable Workflow
# Publishes to PyPI using OIDC Trusted Publishing (no secrets needed!)
#
# OIDC Setup Instructions:
# 1. Go to https://pypi.org/manage/account/publishing/
# 2. Add GitHub Actions as Trusted Publisher:
#    - PyPI Project Name: your-package-name
#    - Owner: your-org
#    - Repository: your-repo-name
#    - Workflow: publish.yml (or your workflow name)
#    - Environment: (leave blank or use 'release')
# 3. For TestPyPI: https://test.pypi.org/manage/account/publishing/
#
# Usage from downstream repos:
#   jobs:
#     publish:
#       uses: ByronWilliamsCPA/.github/.github/workflows/python-publish-pypi.yml@v1
#       with:
#         package-name: 'my-package'
#       permissions:
#         id-token: write
#         contents: read

name: Publish to PyPI (Reusable)

on:
  workflow_call:
    inputs:
      package-name:
        description: 'PyPI package name (for summary display only)'
        type: string
        required: false
        default: 'your-package'

      use-testpypi:
        description: 'Publish to TestPyPI instead of PyPI'
        type: boolean
        required: false
        default: false

      python-version:
        description: 'Python version for building'
        type: string
        required: false
        default: '3.12'

      run-security-checks:
        description: 'Run security checks before publishing'
        type: boolean
        required: false
        default: true

      source-directory:
        description: 'Source directory for security scans'
        type: string
        required: false
        default: 'src'

jobs:
  build:
    name: Build Distribution Packages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true

      - name: Run security checks
        if: ${{ inputs.run-security-checks }}
        env:
          SRC_DIR: ${{ inputs.source-directory }}
        run: |
          echo "Running pre-publish security checks..."
          uv run --no-build --with pip-audit==2.10.0 pip-audit --strict
          uv run --no-build --with 'bandit[toml]==1.9.4' bandit -r "$SRC_DIR" -c pyproject.toml -ll

      - name: Build distribution packages
        run: |
          uv build
          echo "📦 Built packages:"
          ls -lh dist/

      - name: Verify package metadata
        run: |
          pip install --only-binary :all: twine==6.2.0
          twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: python-package-distributions
          path: dist/
          retention-days: 5
          if-no-files-found: error

  publish-to-pypi:
    name: Publish to PyPI
    if: ${{ !inputs.use-testpypi }}
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write  # Required for OIDC

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: audit

      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Verify artifacts
        run: |
          echo "📦 Packages to publish to PyPI:"
          ls -lh dist/

          echo ""
          echo "🔒 Using OIDC Trusted Publishing (no secrets needed)"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          print-hash: true
          verbose: true

      - name: Publication summary
        env:
          PACKAGE_NAME: ${{ inputs.package-name }}
        run: |
          echo "## 🎉 Published to PyPI!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Project**: https://pypi.org/project/$PACKAGE_NAME/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Install**: \`pip install $PACKAGE_NAME\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔒 Security" >> $GITHUB_STEP_SUMMARY
          echo "- Published using OIDC Trusted Publishing" >> $GITHUB_STEP_SUMMARY
          echo "- No API tokens or passwords used" >> $GITHUB_STEP_SUMMARY
          echo "- Full audit trail at PyPI" >> $GITHUB_STEP_SUMMARY

  publish-to-testpypi:
    name: Publish to TestPyPI
    if: ${{ inputs.use-testpypi }}
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write  # Required for OIDC

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: audit

      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Verify artifacts
        run: |
          echo "📦 Test packages to publish to TestPyPI:"
          ls -lh dist/

          echo ""
          echo "🔒 Using OIDC Trusted Publishing (no secrets needed)"

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          print-hash: true
          verbose: true

      - name: Publication summary
        env:
          PACKAGE_NAME: ${{ inputs.package-name }}
        run: |
          echo "## 🧪 Published to TestPyPI!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Project**: https://test.pypi.org/project/$PACKAGE_NAME/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Test Install**:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "pip install --index-url https://test.pypi.org/simple/ $PACKAGE_NAME" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔒 Security" >> $GITHUB_STEP_SUMMARY
          echo "- Published using OIDC Trusted Publishing" >> $GITHUB_STEP_SUMMARY
          echo "- No API tokens or passwords used" >> $GITHUB_STEP_SUMMARY
          echo "- Full audit trail at TestPyPI" >> $GITHUB_STEP_SUMMARY
