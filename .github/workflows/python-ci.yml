# ============================================================================
# Reusable Python CI/CD Workflow
# ============================================================================
# Comprehensive CI with UV, testing, linting, type checking, and LLM governance
#
# Usage from downstream repos:
#   jobs:
#     ci:
#       uses: ByronWilliamsCPA/.github/.github/workflows/python-ci.yml@v1
#       with:
#         python-version: '3.12'
#         coverage-threshold: 80
#         enable-matrix-testing: true  # Enable tiered testing strategy
#
# Features:
#   - Standard quality checks (tests, linting, type checking)
#   - Dead code detection with Vulture (configurable confidence)
#   - LLM governance and assumption tag verification
#   - Security scanning (Bandit, pip-audit)
#   - Tiered matrix testing (fast PRs, comprehensive main/schedule)
#
# Removed integrations (use dedicated reusable workflows instead):
#   - SonarCloud: use python-sonarcloud.yml directly
#   - Codecov: use python-codecov.yml directly
#
# Tiered Testing Strategy:
#   - PR events: Tests against python-versions-pr (default: ["3.11", "3.12"])
#   - Main/schedule: Tests against python-versions-comprehensive (default: ["3.10", "3.11", "3.12", "3.13"])
#   - Reduces PR CI time by 50% while maintaining comprehensive coverage
# ============================================================================

name: Python CI (Reusable)

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to use (primary version for quality checks)'
        required: false
        type: string
        default: '3.12'
      python-versions-pr:
        description: 'Python versions for PR testing (fast feedback)'
        type: string
        required: false
        default: '["3.11", "3.12"]'
      python-versions-comprehensive:
        description: 'Python versions for main/schedule testing (comprehensive)'
        type: string
        required: false
        default: '["3.10", "3.11", "3.12", "3.13"]'
      enable-matrix-testing:
        description: 'Enable multi-version matrix testing (uses tiered strategy)'
        type: boolean
        required: false
        default: false
      coverage-threshold:
        description: 'Minimum code coverage percentage'
        required: false
        type: number
        default: 80
      source-directory:
        description: 'Source code directory'
        required: false
        type: string
        default: 'src'
      test-directory:
        description: 'Test directory'
        required: false
        type: string
        default: 'tests'
      run-integration-tests:
        description: 'Run integration tests'
        required: false
        type: boolean
        default: true
      run-security-tests:
        description: 'Run security tests'
        required: false
        type: boolean
        default: true
      fail-on-llm-tags:
        description: 'Fail if LLM debt tags found'
        required: false
        type: boolean
        default: false
      enable-dead-code-check:
        description: 'Enable dead code detection with Vulture'
        required: false
        type: boolean
        default: true
      dead-code-confidence:
        description: 'Minimum confidence for dead code detection (60-100)'
        required: false
        type: number
        default: 80
      fail-on-dead-code:
        description: 'Fail CI if dead code is detected'
        required: false
        type: boolean
        default: false
      fail-on-security-findings:
        description: 'Fail CI when Bandit detects HIGH-severity issues or pip-audit reports a vulnerability'
        required: false
        type: boolean
        default: true

      no-build:
        description: 'Pass --no-build to uv sync/run commands (disable for projects with a build backend like hatchling)'
        required: false
        type: boolean
        default: true

permissions: {}

jobs:
  # ============================================================================
  # Job 1: Standard Quality Checks
  # ============================================================================
  quality-checks:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    env:
      NO_BUILD_FLAG: ${{ inputs.no-build && '--no-build' || '' }}

    outputs:
      coverage-artifact: coverage-reports

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Validate source layout
        shell: bash
        env:
          SRC_DIR: ${{ inputs.source-directory }}
          TEST_DIR: ${{ inputs.test-directory }}
        run: |
          missing=()
          [ -d "$SRC_DIR" ] || missing+=("$SRC_DIR")
          [ -d "$TEST_DIR" ] || missing+=("$TEST_DIR")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::python-ci.yml requires the following directories to exist: ${missing[*]}"
            echo "::error::This reusable workflow assumes a Python src/ layout. If your repo"
            echo "::error::is a configuration repo (no Python package), use a hand-rolled CI"
            echo "::error::workflow instead. See ByronWilliamsCPA/.github/docs/workflows/python-ci.md"
            echo "::error::for the full layout requirement and an alternative template."
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        env:
          PYTHON_VERSION: ${{ inputs.python-version }}
        run: uv python install "$PYTHON_VERSION"

      - name: Install dependencies
        run: |
          uv sync --all-extras --frozen $NO_BUILD_FLAG

      - name: Run Ruff formatter check
        env:
          SRC_DIR: ${{ inputs.source-directory }}
          TEST_DIR: ${{ inputs.test-directory }}
        run: |
          echo "::group::Ruff Formatting"
          uv run --frozen $NO_BUILD_FLAG ruff format --check "$SRC_DIR"/ "$TEST_DIR"/ || {
            echo "::error::Code formatting issues detected. Run: uv run --frozen $NO_BUILD_FLAG ruff format ${SRC_DIR}/ ${TEST_DIR}/"
            exit 1
          }
          echo "::endgroup::"

      - name: Run Ruff linter
        env:
          SRC_DIR: ${{ inputs.source-directory }}
          TEST_DIR: ${{ inputs.test-directory }}
        run: |
          echo "::group::Ruff Linting"
          uv run --frozen $NO_BUILD_FLAG ruff check "$SRC_DIR"/ "$TEST_DIR"/ --output-format=github
          echo "::endgroup::"

      - name: Run BasedPyright type checker
        env:
          SRC_DIR: ${{ inputs.source-directory }}
        run: |
          echo "::group::BasedPyright Type Checking"
          uv run --frozen $NO_BUILD_FLAG basedpyright "$SRC_DIR"/ || {
            echo "::warning::Type checking found issues"
          }
          echo "::endgroup::"

      - name: Dead code detection with Vulture
        if: inputs.enable-dead-code-check
        env:
          SRC_DIR: ${{ inputs.source-directory }}
          DEAD_CODE_CONFIDENCE: ${{ inputs.dead-code-confidence }}
          FAIL_ON_DEAD_CODE: ${{ inputs.fail-on-dead-code }}
        run: |
          echo "::group::Vulture Dead Code Detection"

          # Install vulture if not in dev dependencies
          uv pip install --no-build 'vulture==2.14' 2>/dev/null || true

          # Run vulture with configurable confidence threshold
          echo "Scanning for dead code (min confidence: $DEAD_CODE_CONFIDENCE%)..."

          # Capture output for reporting
          VULTURE_OUTPUT=$(uv run --frozen $NO_BUILD_FLAG vulture "$SRC_DIR"/ --min-confidence "$DEAD_CODE_CONFIDENCE" 2>&1) || true

          if [ -n "$VULTURE_OUTPUT" ]; then
            echo "$VULTURE_OUTPUT"

            # Count issues
            DEAD_CODE_COUNT=$(echo "$VULTURE_OUTPUT" | grep -c ":" || true)

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Dead Code Detection (Vulture)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Found $DEAD_CODE_COUNT potential dead code issue(s)** (confidence >=$DEAD_CODE_CONFIDENCE%)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$VULTURE_OUTPUT" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> **Note:** Review these findings. Some may be false positives (e.g., pytest fixtures, CLI entry points)." >> $GITHUB_STEP_SUMMARY
            echo "> Use a \`.vulture_whitelist.py\` file to suppress known false positives." >> $GITHUB_STEP_SUMMARY

            if [ "$FAIL_ON_DEAD_CODE" == "true" ]; then
              echo "::error::Dead code detected. Set 'fail-on-dead-code: false' to make this a warning."
              exit 1
            else
              echo "::warning::Potential dead code detected. Review vulture output above."
            fi
          else
            echo "No dead code detected at $DEAD_CODE_CONFIDENCE% confidence threshold."
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Dead Code Detection (Vulture)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No dead code detected (confidence >=$DEAD_CODE_CONFIDENCE%)" >> $GITHUB_STEP_SUMMARY
          fi

          echo "::endgroup::"

      - name: Run unit tests with coverage
        env:
          SRC_DIR: ${{ inputs.source-directory }}
        run: |
          echo "::group::Unit Test Execution"
          uv run --frozen $NO_BUILD_FLAG pytest \
            -m "unit or not (integration or security or slow)" \
            --cov="$SRC_DIR" \
            --cov-report=xml:coverage-unit.xml \
            --cov-report=term-missing \
            --cov-branch \
            --junitxml=junit-unit.xml \
            -o junit_family=xunit2 \
            -v
          echo "::endgroup::"

      - name: Run integration tests with coverage
        if: inputs.run-integration-tests
        env:
          SRC_DIR: ${{ inputs.source-directory }}
        run: |
          echo "::group::Integration Test Execution"
          set +e
          uv run --frozen $NO_BUILD_FLAG pytest \
            -m "integration" \
            --cov="$SRC_DIR" \
            --cov-report=xml:coverage-integration.xml \
            --cov-report=term-missing \
            --cov-branch \
            --cov-append \
            --junitxml=junit-integration.xml \
            -o junit_family=xunit2 \
            -v
          EXIT=$?
          set -e
          echo "::endgroup::"
          if [ $EXIT -ne 0 ] && [ $EXIT -ne 5 ]; then exit $EXIT; fi

      - name: Run security tests with coverage
        if: inputs.run-security-tests
        env:
          SRC_DIR: ${{ inputs.source-directory }}
        run: |
          echo "::group::Security Test Execution"
          set +e
          uv run --frozen $NO_BUILD_FLAG pytest \
            -m "security" \
            --cov="$SRC_DIR" \
            --cov-report=xml:coverage-security.xml \
            --cov-report=term-missing \
            --cov-branch \
            --cov-append \
            --junitxml=junit-security.xml \
            -o junit_family=xunit2 \
            -v
          EXIT=$?
          set -e
          echo "::endgroup::"
          if [ $EXIT -ne 0 ] && [ $EXIT -ne 5 ]; then exit $EXIT; fi

      - name: Generate combined coverage report
        env:
          COVERAGE_THRESHOLD: ${{ inputs.coverage-threshold }}
        run: |
          echo "::group::Combined Coverage"
          uv run --frozen $NO_BUILD_FLAG coverage combine --keep || true
          uv run --frozen $NO_BUILD_FLAG coverage xml -o coverage.xml
          uv run --frozen $NO_BUILD_FLAG coverage html
          uv run --frozen $NO_BUILD_FLAG coverage report --fail-under="$COVERAGE_THRESHOLD"
          echo "::endgroup::"

      - name: Security scan with Bandit
        env:
          SRC_DIR: ${{ inputs.source-directory }}
          FAIL_ON_FINDINGS: ${{ inputs.fail-on-security-findings }}
        run: |
          echo "::group::Bandit Security Scan"
          # -lll filters to HIGH severity only; non-zero exit on findings.
          if [ "$FAIL_ON_FINDINGS" = "true" ]; then
            uv run --frozen $NO_BUILD_FLAG bandit -r "$SRC_DIR"/ -c pyproject.toml -lll -f json -o bandit-report.json
          else
            uv run --frozen $NO_BUILD_FLAG bandit -r "$SRC_DIR"/ -c pyproject.toml -lll -f json -o bandit-report.json || {
              echo "::warning::HIGH-severity security issues detected (fail-on-security-findings=false; not failing CI)"
              cat bandit-report.json
            }
          fi
          echo "::endgroup::"

      - name: Dependency vulnerability scan
        env:
          FAIL_ON_FINDINGS: ${{ inputs.fail-on-security-findings }}
        run: |
          echo "::group::pip-audit Dependency Scan"
          # Read [tool.pip-audit].ignore-vuln from pyproject.toml if present.
          # Each listed ID is passed as --ignore-vuln to pip-audit, paired with
          # a dated entry in docs/known-vulnerabilities.md per project policy.
          IGNORE_ARGS=""
          if [ -f "pyproject.toml" ]; then
            IGNORE_ARGS=$(python3 -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); ids=d.get('tool',{}).get('pip-audit',{}).get('ignore-vuln',[]); print(' '.join('--ignore-vuln '+i for i in ids))" 2>/dev/null || true)
          fi
          if [ "$FAIL_ON_FINDINGS" = "true" ]; then
            uv run --frozen $NO_BUILD_FLAG pip-audit $IGNORE_ARGS
          else
            uv run --frozen $NO_BUILD_FLAG pip-audit $IGNORE_ARGS || echo "::warning::Vulnerable dependencies detected (fail-on-security-findings=false; not failing CI)"
          fi
          echo "::endgroup::"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-reports
          path: |
            coverage.xml
            coverage-*.xml
            junit-*.xml
            htmlcov/
          retention-days: 7

  # ============================================================================
  # Job 2: LLM Governance Checks
  # ============================================================================
  llm-governance:
    name: LLM Governance & Assumption Verification
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15

    outputs:
      rad-tags: ${{ steps.check-tags.outputs.rad_tags }}
      llm-tags: ${{ steps.check-tags.outputs.llm_tags }}
      total-tags: ${{ steps.check-tags.outputs.total_tags }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Check for unverified assumption tags
        id: check-tags
        env:
          SRC_DIR: ${{ inputs.source-directory }}
        run: |
          echo "::group::Scanning for Unverified Assumption Tags"

          # Check for RAD tags (Layer 1: Production Runtime Risks)
          CRITICAL_TAGS=$(grep -r "#CRITICAL" --include="*.py" "$SRC_DIR"/ 2>/dev/null | wc -l || echo "0")
          ASSUME_TAGS=$(grep -r "#ASSUME" --include="*.py" "$SRC_DIR"/ 2>/dev/null | wc -l || echo "0")
          EDGE_TAGS=$(grep -r "#EDGE" --include="*.py" "$SRC_DIR"/ 2>/dev/null | wc -l || echo "0")

          # Check for LLM debt tags (Layer 2: LLM Development Debt)
          LLM_MOCK=$(grep -r "#LLM-MOCK" --include="*.py" "$SRC_DIR"/ 2>/dev/null | wc -l || echo "0")
          LLM_PLACEHOLDER=$(grep -r "#LLM-PLACEHOLDER" --include="*.py" "$SRC_DIR"/ 2>/dev/null | wc -l || echo "0")
          LLM_LOGIC=$(grep -r "#LLM-LOGIC" --include="*.py" "$SRC_DIR"/ 2>/dev/null | wc -l || echo "0")
          LLM_SCAFFOLD=$(grep -r "#LLM-SCAFFOLD" --include="*.py" "$SRC_DIR"/ 2>/dev/null | wc -l || echo "0")
          LLM_INFERRED=$(grep -r "#LLM-INFERRED" --include="*.py" "$SRC_DIR"/ 2>/dev/null | wc -l || echo "0")
          LLM_TEST_FIRST=$(grep -r "#LLM-TEST-FIRST" --include="*.py" "$SRC_DIR"/ 2>/dev/null | wc -l || echo "0")

          TOTAL_RAD=$((CRITICAL_TAGS + ASSUME_TAGS))
          TOTAL_LLM=$((LLM_MOCK + LLM_PLACEHOLDER + LLM_LOGIC + LLM_SCAFFOLD + LLM_INFERRED + LLM_TEST_FIRST))
          TOTAL_TAGS=$((TOTAL_RAD + TOTAL_LLM))

          echo "rad_tags=$TOTAL_RAD" >> $GITHUB_OUTPUT
          echo "llm_tags=$TOTAL_LLM" >> $GITHUB_OUTPUT
          echo "total_tags=$TOTAL_TAGS" >> $GITHUB_OUTPUT

          echo "### Assumption Tag Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Layer 1 (Production Runtime Risks):**" >> $GITHUB_STEP_SUMMARY
          echo "- #CRITICAL tags: $CRITICAL_TAGS" >> $GITHUB_STEP_SUMMARY
          echo "- #ASSUME tags: $ASSUME_TAGS" >> $GITHUB_STEP_SUMMARY
          echo "- #EDGE tags: $EDGE_TAGS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Layer 2 (LLM Development Debt):**" >> $GITHUB_STEP_SUMMARY
          echo "- #LLM-MOCK: $LLM_MOCK" >> $GITHUB_STEP_SUMMARY
          echo "- #LLM-PLACEHOLDER: $LLM_PLACEHOLDER" >> $GITHUB_STEP_SUMMARY
          echo "- #LLM-LOGIC: $LLM_LOGIC" >> $GITHUB_STEP_SUMMARY
          echo "- #LLM-SCAFFOLD: $LLM_SCAFFOLD" >> $GITHUB_STEP_SUMMARY
          echo "- #LLM-INFERRED: $LLM_INFERRED" >> $GITHUB_STEP_SUMMARY
          echo "- #LLM-TEST-FIRST: $LLM_TEST_FIRST" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total unverified tags: $TOTAL_TAGS**" >> $GITHUB_STEP_SUMMARY

          if [ "$CRITICAL_TAGS" -gt 0 ]; then
            echo "::error::Found $CRITICAL_TAGS unverified #CRITICAL production risk tags"
          fi

          if [ "$ASSUME_TAGS" -gt 0 ]; then
            echo "::warning::Found $ASSUME_TAGS #ASSUME tags - intentional RAD annotations, review before merging"
          fi

          if [ "$TOTAL_LLM" -gt 0 ]; then
            echo "::warning::Found $TOTAL_LLM unverified LLM debt tags"
          fi

          echo "::endgroup::"

      - name: Block PR if critical tags found
        if: ${{ steps.check-tags.outputs.critical_tags > 0 }}
        env:
          SRC_DIR: ${{ inputs.source-directory }}
          CRITICAL_TAGS: ${{ steps.check-tags.outputs.critical_tags }}
        run: |
          echo "::error::PR blocked: Found $CRITICAL_TAGS unverified #CRITICAL production risk tags"
          echo ""
          echo "Please verify and remove these tags before merging:"
          grep -rn "#CRITICAL" --include="*.py" "$SRC_DIR"/ || true
          echo ""
          echo "See CLAUDE.md for verification workflow"
          exit 1

      - name: Fail on LLM tags (if configured)
        if: ${{ inputs.fail-on-llm-tags && fromJSON(steps.check-tags.outputs.llm_tags) > 0 }}
        env:
          SRC_DIR: ${{ inputs.source-directory }}
          LLM_TAGS: ${{ steps.check-tags.outputs.llm_tags }}
        run: |
          echo "::error::PR blocked: Found $LLM_TAGS LLM debt tags"
          echo ""
          echo "Please address LLM debt before merging:"
          grep -rn "#LLM-" --include="*.py" "$SRC_DIR"/ || true
          exit 1

      - name: Detect LLM anti-patterns
        env:
          SRC_DIR: ${{ inputs.source-directory }}
        run: |
          echo "::group::LLM Anti-Pattern Detection"

          # Hardcoded localhost/URLs
          echo "Checking for hardcoded localhost/URLs..."
          if grep -rE "(localhost|127\.0\.0\.1|http://|https://)" --include="*.py" "$SRC_DIR"/ | \
             grep -v "#LLM-PLACEHOLDER" | grep -v "^[[:space:]]*#"; then
            echo "::warning::Found hardcoded URLs without #LLM-PLACEHOLDER tag"
          fi

          # Hardcoded secrets patterns
          echo "Checking for potential hardcoded secrets..."
          if grep -rE "(api_key|password|secret|token)\s*=\s*[\"'][^\"']+[\"']" --include="*.py" "$SRC_DIR"/ | \
             grep -v "#LLM-PLACEHOLDER" | grep -v "^[[:space:]]*#"; then
            echo "::error::Potential hardcoded secret detected"
            exit 1
          fi

          # Magic numbers
          echo "Checking for magic numbers..."
          MAGIC_NUMBERS=$(grep -rE "\b[0-9]{2,}\b" --include="*.py" "$SRC_DIR"/ | \
                          grep -v "#LLM-PLACEHOLDER" | \
                          grep -v "^[[:space:]]*#" | \
                          wc -l || echo "0")

          if [ "$MAGIC_NUMBERS" -gt 10 ]; then
            echo "::warning::Found $MAGIC_NUMBERS potential magic numbers without constants"
          fi

          echo "::endgroup::"

  # ============================================================================
  # Job 4: Tiered Matrix Testing (Optional)
  # ============================================================================
  matrix-testing:
    name: Matrix Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    if: inputs.enable-matrix-testing
    permissions:
      contents: read
    timeout-minutes: 15
    env:
      NO_BUILD_FLAG: ${{ inputs.no-build && '--no-build' || '' }}

    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(github.event_name == 'pull_request' && inputs.python-versions-pr || inputs.python-versions-comprehensive) }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: uv python install "$PYTHON_VERSION"

      - name: Install dependencies
        run: uv sync --all-extras --frozen $NO_BUILD_FLAG

      - name: Run tests
        env:
          SRC_DIR: ${{ inputs.source-directory }}
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: |
          echo "::group::Testing on Python $PYTHON_VERSION"
          uv run --frozen $NO_BUILD_FLAG pytest \
            --cov="$SRC_DIR" \
            --cov-report=term-missing \
            -v
          echo "::endgroup::"

  # ============================================================================
  # CI Gate -- aggregates all upstream jobs; must pass for branch protection
  # ============================================================================
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [quality-checks, llm-governance, matrix-testing]
    if: always()
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Check CI results
        env:
          RESULT_QUALITY_CHECKS: ${{ needs.quality-checks.result }}
          RESULT_LLM_GOVERNANCE: ${{ needs.llm-governance.result }}
          RESULT_MATRIX_TESTING: ${{ needs.matrix-testing.result }}
        run: |
          is_acceptable() { [[ "$1" == "success" || "$1" == "skipped" ]]; }

          if ! is_acceptable "$RESULT_QUALITY_CHECKS"; then
            echo "::error::CI Gate failed: quality-checks is $RESULT_QUALITY_CHECKS"
            exit 1
          fi
          if ! is_acceptable "$RESULT_LLM_GOVERNANCE"; then
            echo "::error::CI Gate failed: llm-governance is $RESULT_LLM_GOVERNANCE"
            exit 1
          fi
          if ! is_acceptable "$RESULT_MATRIX_TESTING"; then
            echo "::error::CI Gate failed: matrix-testing is $RESULT_MATRIX_TESTING"
            exit 1
          fi
          echo "CI Gate passed"
