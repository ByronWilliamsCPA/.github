# ============================================================================
# Docs Site Deploy (GitHub Pages)
# ============================================================================
# Builds and deploys THIS repo's own MkDocs (mkdocs-material) documentation
# site to GitHub Pages.
#
# Deliberately separate from python-docs.yml: that file is a reusable
# `workflow_call` workflow other repos call to build/deploy their own docs
# sites. This workflow is a standalone, directly-triggered workflow that only
# ever runs against this repo's own docs/ + mkdocs.yml. Do not merge the two;
# python-docs.yml is a public contract consumed by many downstream repos.
# ============================================================================

name: Docs Site Deploy (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions: {}

jobs:
  build:
    name: Build docs site
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0

      # No pyproject.toml in this repo (docs-only site): run mkdocs-material
      # via uvx in an ephemeral environment rather than `uv sync`.
      - name: Build site with MkDocs (strict mode)
        run: uvx --no-build --from mkdocs-material==9.7.7 mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    # #CRITICAL: OIDC token behavior / permission scope: id-token: write grants
    # this job an OIDC token that actions/deploy-pages exchanges for a
    # short-lived deployment credential scoped to this repo via the trust
    # relationship configured under Settings > Pages (Source: GitHub Actions).
    # pages: write is the matching permission that authorizes the deployment
    # itself; neither permission is needed by the build job above, which only
    # produces the artifact.
    # #ASSUME: the `github-pages` deployment environment carries no protection
    # rules (required reviewers, wait timer) that would block this
    # direct push-triggered deploy from completing unattended.
    # #VERIFY: confirm in repo Settings > Pages that "Source" is set to
    # "GitHub Actions" before merging, and re-check after any future change to
    # the `github-pages` environment's protection rules.
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
