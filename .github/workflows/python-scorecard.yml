# ============================================================================
# Reusable OpenSSF Scorecard Workflow
# ============================================================================
# Evaluates repository security health using OpenSSF Scorecard
#
# Usage from downstream repos:
#   jobs:
#     scorecard:
#       uses: ByronWilliamsCPA/.github/.github/workflows/python-scorecard.yml@v1
#       permissions:
#         security-events: write
#         contents: read
#         actions: read
#       with:
#         min-score: 7             # Optional: gate fails if Branch-Protection, Code-Review,
#                                  # Dangerous-Workflow, Token-Permissions, or Pinned-Dependencies
#                                  # scores below this threshold (0 disables gate; default 0)
#       secrets:
#         SCORECARD_TOKEN: ${{ secrets.SCORECARD_TOKEN }}
#
# Features:
#   - OpenSSF Scorecard security analysis
#   - SARIF upload to GitHub Security tab
#   - Supply chain security assessment
#   - Branch protection verification
#
# Known Limitations
# -----------------
# publish-results is always treated as false regardless of what callers pass.
#
# When this workflow runs as a reusable callee, the OIDC token's `repository`
# claim resolves to the .github repo (where the workflow lives), not the
# calling repository. The scorecard-action uses that claim to publish results
# to securityscorecards.dev. With the wrong repo claim the publication fails
# and the job errors. The reusable workflow hard-codes false to prevent this;
# the publish-results input is accepted but ignored. SARIF upload to the
# Security tab still works correctly.
#
# SCORECARD_TOKEN secret: pass SCORECARD_TOKEN via the secrets: block so the
# Branch-Protection check can read admin-level branch protection fields
# (DismissStaleReviews, EnforceAdmins, RequireLastPushApproval, etc.).
# Without it, Branch-Protection always scores 0. The secret requires a
# fine-grained PAT with Administration:Read on the calling repository.
# ============================================================================

name: OpenSSF Scorecard (Reusable)

on:
  workflow_call:
    inputs:
      publish-results:
        description: 'Deprecated: accepted for backwards compatibility but always treated as false. See Known Limitations.'
        type: boolean
        required: false
        default: false

      min-score:
        description: 'Minimum acceptable score for gated checks (0-10). Set 0 to disable gate.'
        type: number
        required: false
        default: 0

      upload-sarif:
        description: 'Upload SARIF results to GitHub Security tab'
        type: boolean
        required: false
        default: true

      artifact-retention-days:
        description: 'Days to retain scorecard artifacts'
        type: number
        required: false
        default: 5

    secrets:
      SCORECARD_TOKEN:
        description: 'Fine-grained PAT with Administration:Read for Branch-Protection check'
        required: false

permissions: {}

jobs:
  scorecard:
    name: OpenSSF Scorecard Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Warn if SCORECARD_TOKEN is absent
        env:
          HAS_SCORECARD_TOKEN: ${{ secrets.SCORECARD_TOKEN }}  # pragma: allowlist secret
        run: |
          if [ -z "$HAS_SCORECARD_TOKEN" ]; then
            echo "::warning::SCORECARD_TOKEN not passed; Branch-Protection will score 0. Pass SCORECARD_TOKEN via the secrets: block; requires a fine-grained PAT with Administration:Read on the calling repository."  # pragma: allowlist secret
          fi

      - name: Warn on deprecated publish-results input
        if: ${{ inputs.publish-results == true }}
        run: |
          echo "::warning::The 'publish-results' input is deprecated and always treated as false. Remove it from your workflow to suppress this warning. See python-scorecard.yml Known Limitations for details."

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: false
          repo_token: ${{ secrets.SCORECARD_TOKEN }}

      - name: Upload Scorecard SARIF to Security tab
        if: ${{ inputs.upload-sarif }}
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e  # v4.35.4
        with:
          sarif_file: scorecard-results.sarif
          category: scorecard

      - name: Upload Scorecard artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: scorecard-results
          path: scorecard-results.sarif
          retention-days: ${{ inputs.artifact-retention-days }}

      - name: Evaluate Scorecard Scores
        if: ${{ inputs.min-score > 0 }}
        env:
          MIN_SCORE: ${{ inputs.min-score }}
        run: |
          python3 - <<'EOF'
          import json, os, sys

          with open('scorecard-results.sarif') as f:
              sarif = json.load(f)

          min_score = float(os.environ["MIN_SCORE"])
          if not 0 <= min_score <= 10:
              print(f"::error::min-score must be between 0 and 10, got {min_score}")
              sys.exit(1)
          gate_checks = {"Branch-Protection", "Code-Review", "Dangerous-Workflow",
                         "Token-Permissions", "Pinned-Dependencies"}
          failures = []

          for run in sarif.get("runs", []):
              for result in run.get("results", []):
                  rule_id = result.get("ruleId", "")
                  score = result.get("properties", {}).get("score", 0)
                  if rule_id in gate_checks and score < min_score:
                      failures.append(f"{rule_id}: {score}/10 (minimum {min_score})")

          if failures:
              print("::error::Scorecard score gate failed:")
              for f in failures:
                  print(f"  - {f}")
              sys.exit(1)
          else:
              print(f"Scorecard score gate passed (all gated checks >= {min_score}/10)")
          EOF

      - name: Scorecard Summary
        if: always()
        run: |
          echo "## OpenSSF Scorecard Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Scorecard evaluates the security posture of your repository." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Checks Performed" >> $GITHUB_STEP_SUMMARY
          echo "- Branch protection rules" >> $GITHUB_STEP_SUMMARY
          echo "- CI tests presence" >> $GITHUB_STEP_SUMMARY
          echo "- Code review practices" >> $GITHUB_STEP_SUMMARY
          echo "- Dependency pinning" >> $GITHUB_STEP_SUMMARY
          echo "- Fuzzing presence" >> $GITHUB_STEP_SUMMARY
          echo "- License detection" >> $GITHUB_STEP_SUMMARY
          echo "- Maintained status" >> $GITHUB_STEP_SUMMARY
          echo "- Packaging security" >> $GITHUB_STEP_SUMMARY
          echo "- SAST tool usage" >> $GITHUB_STEP_SUMMARY
          echo "- Security policy presence" >> $GITHUB_STEP_SUMMARY
          echo "- Signed releases" >> $GITHUB_STEP_SUMMARY
          echo "- Token permissions" >> $GITHUB_STEP_SUMMARY
          echo "- Vulnerability disclosure" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
