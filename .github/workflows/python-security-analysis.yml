# Python Security Analysis - Reusable Workflow
# Comprehensive security scanning with CodeQL, Bandit, Safety, OSV-Scanner, and OWASP
#
# Usage from downstream repos:
#   jobs:
#     security:
#       uses: ByronWilliamsCPA/.github/.github/workflows/python-security-analysis.yml@v1
#       with:
#         source-directory: 'src'
#         fail-on-high: true

name: Python Security Analysis (Reusable)

on:
  workflow_call:
    inputs:
      source-directory:
        description: 'Source code directory to scan'
        type: string
        required: false
        default: 'src'

      python-version:
        description: 'Python version for scanning'
        type: string
        required: false
        default: '3.12'

      fail-on-high:
        description: 'Fail build on HIGH/CRITICAL vulnerabilities'
        type: boolean
        required: false
        default: true

      fail-on-medium:
        description: 'Fail build on MEDIUM vulnerabilities'
        type: boolean
        required: false
        default: false

      run-codeql:
        description: 'Run CodeQL analysis'
        type: boolean
        required: false
        default: true

      run-dependency-review:
        description: 'Run dependency review (PRs only)'
        type: boolean
        required: false
        default: true

      run-bandit:
        description: 'Run Bandit static analysis'
        type: boolean
        required: false
        default: true

      run-safety:
        description: 'Run Safety vulnerability scan'
        type: boolean
        required: false
        default: true

      run-osv:
        description: 'Run OSV Scanner'
        type: boolean
        required: false
        default: true

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  # Detect security-relevant changes
  detect-changes:
    name: Detect Security Changes
    runs-on: ubuntu-latest
    outputs:
      security_files: ${{ steps.filter.outputs.security }}
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Check for security-relevant changes
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        with:
          filters: |
            security:
              - '**/*.py'
              - '.github/workflows/**'
              - 'pyproject.toml'
              - 'poetry.lock'
              - 'uv.lock'
              - 'requirements*.txt'

  # CodeQL Analysis
  # Gates on (a) caller opt-in via run-codeql AND (b) at least one security-
  # relevant file changed in the diff. The detect-changes filter checks Python
  # sources, workflow files, and dependency manifests; if none changed,
  # CodeQL is skipped to save CI minutes.
  codeql:
    name: CodeQL Analysis
    if: ${{ inputs.run-codeql && needs.detect-changes.outputs.security_files == 'true' }}
    runs-on: ubuntu-latest
    needs: detect-changes
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e46ed2cbd01164d986452f91f178727624ae40d7  # v4.35.3
        with:
          languages: python
          queries: security-extended,security-and-quality
          config: |
            paths:
              - ${{ inputs.source-directory }}
            paths-ignore:
              - tests
              - validation
              - scripts

      - name: Build CodeQL Database
        uses: github/codeql-action/autobuild@e46ed2cbd01164d986452f91f178727624ae40d7  # v4.35.3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@e46ed2cbd01164d986452f91f178727624ae40d7  # v4.35.3
        with:
          category: "/language:python"
          upload: true

  # Dependency Review (PRs only)
  dependency-review:
    name: Dependency Review
    if: ${{ inputs.run-dependency-review && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    needs: detect-changes
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
        with:
          fail-on-severity: moderate
          license-check: true
          comment-summary-in-pr: always
          deny-licenses: GPL-2.0, GPL-3.0

  # Python security scanning (Bandit + Safety)
  python-security:
    name: Python Security Scan
    if: ${{ inputs.run-bandit || inputs.run-safety }}
    runs-on: ubuntu-latest
    needs: detect-changes
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Bandit Static Analysis
        if: ${{ inputs.run-bandit }}
        env:
          SRC_DIR: ${{ inputs.source-directory }}
        run: |
          echo "🔒 Running Bandit security analysis..."
          uv run bandit -r "$SRC_DIR" \
            -f json -o bandit-report.json \
            -c pyproject.toml || true
          uv run bandit -r "$SRC_DIR" -c pyproject.toml

      - name: Safety Vulnerability Scan
        if: ${{ inputs.run-safety }}
        run: |
          echo "🛡️ Scanning dependencies for vulnerabilities..."
          uv export --format requirements-txt --no-hashes --output-file requirements-scan.txt
          uv run safety check \
            --file requirements-scan.txt \
            --json --output safety-report.json || true
          uv run safety check --file requirements-scan.txt

      - name: Upload Security Reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: python-security-reports
          path: |
            bandit-report.json
            safety-report.json
            requirements-scan.txt

  # OSV Scanner
  osv-scanner:
    name: OSV Vulnerability Scanner
    if: ${{ inputs.run-osv }}
    runs-on: ubuntu-latest
    needs: detect-changes
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run OSV Scanner
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2  # v2.3.8
        with:
          scan-args: |-
            --lockfile=uv.lock
            --format=json
            --output=osv-results.json

      - name: Analyze OSV Results
        env:
          FAIL_ON_HIGH: ${{ inputs.fail-on-high }}
          FAIL_ON_MEDIUM: ${{ inputs.fail-on-medium }}
        run: |
          echo "🔍 Analyzing OSV scan results..."
          python3 << 'EOF'
          import json
          import os
          import sys

          def extract_severity(vuln):
              """Extract severity from various possible locations in vulnerability data."""
              # Check direct severity field
              severity = vuln.get('severity')
              if severity:
                  return 'MEDIUM' if str(severity).upper() == 'MODERATE' else str(severity).upper()

              # Check database_specific
              db_specific = vuln.get('database_specific', {})
              if isinstance(db_specific, dict):
                  severity = db_specific.get('severity')
                  if severity:
                      return 'MEDIUM' if str(severity).upper() == 'MODERATE' else str(severity).upper()

              # Check severities array
              severities = vuln.get('severities', [])
              if isinstance(severities, list) and severities:
                  severity_levels = {'CRITICAL': 4, 'HIGH': 3, 'MEDIUM': 2, 'MODERATE': 2, 'LOW': 1}
                  max_severity = 'UNKNOWN'
                  max_level = 0
                  for sev_entry in severities:
                      sev = sev_entry.get('severity', '').upper() if isinstance(sev_entry, dict) else str(sev_entry).upper()
                      level = severity_levels.get(sev, 0)
                      if level > max_level:
                          max_level = level
                          max_severity = sev
                  return 'MEDIUM' if max_severity == 'MODERATE' else max_severity

              return 'UNKNOWN'

          fail_on_high = os.environ["FAIL_ON_HIGH"] == "true"
          fail_on_medium = os.environ["FAIL_ON_MEDIUM"] == "true"

          try:
              with open('osv-results.json', 'r') as f:
                  results = json.load(f)

              vulnerabilities = results.get('results', [])
              print(f'📋 Found {len(vulnerabilities)} vulnerability groups')

              if not vulnerabilities:
                  print('✅ No vulnerabilities found')
                  sys.exit(0)

              high_crit = []
              medium = []
              low = []

              for vuln_group in vulnerabilities:
                  if not isinstance(vuln_group, dict):
                      continue
                  for pkg in vuln_group.get('packages', []):
                      if not isinstance(pkg, dict):
                          continue
                      for vuln in pkg.get('vulnerabilities', []):
                          if not isinstance(vuln, dict):
                              continue
                          severity = extract_severity(vuln)
                          vuln_id = vuln.get('id', 'UNKNOWN')
                          if severity in ['HIGH', 'CRITICAL']:
                              high_crit.append(f"{vuln_id} ({severity})")
                          elif severity == 'MEDIUM':
                              medium.append(f"{vuln_id} ({severity})")
                          else:
                              low.append(f"{vuln_id} ({severity})")

              total = len(high_crit) + len(medium) + len(low)
              print(f'\n📊 OSV Results: {total} total vulnerabilities')

              if high_crit:
                  print(f'❌ HIGH/CRITICAL: {len(high_crit)} vulnerabilities')
                  for v in high_crit[:5]:
                      print(f'   - {v}')
                  if fail_on_high:
                      print('\n❌ Build FAILED: HIGH/CRITICAL vulnerabilities found')
                      sys.exit(1)

              if medium:
                  print(f'⚠️  MEDIUM: {len(medium)} vulnerabilities')
                  if fail_on_medium:
                      print('\n❌ Build FAILED: MEDIUM vulnerabilities found')
                      sys.exit(1)

              if low:
                  print(f'ℹ️  LOW: {len(low)} vulnerabilities')

              if not high_crit:
                  print('\n✅ No HIGH/CRITICAL vulnerabilities found')

          except Exception as e:
              print(f'❌ ERROR: {e}')
              import traceback
              traceback.print_exc()
              sys.exit(1)
          EOF

      - name: Upload OSV Report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: osv-scanner-results
          path: osv-results.json

  # Security gate
  security-gate:
    name: Security Gate Validation
    runs-on: ubuntu-latest
    needs: [detect-changes, codeql, dependency-review, python-security, osv-scanner]
    if: always()
    permissions:
      contents: read

    steps:
      - name: Validate Security Results
        env:
          RESULT_CODEQL: ${{ needs.codeql.result }}
          RESULT_DEP_REVIEW: ${{ needs.dependency-review.result }}
          RESULT_PYTHON_SECURITY: ${{ needs.python-security.result }}
          RESULT_OSV_SCANNER: ${{ needs.osv-scanner.result }}
        run: |
          echo "🔒 Security Analysis Results:"
          echo "CodeQL: $RESULT_CODEQL"
          echo "Dependency Review: $RESULT_DEP_REVIEW"
          echo "Python Security: $RESULT_PYTHON_SECURITY"
          echo "OSV Scanner: $RESULT_OSV_SCANNER"

          is_acceptable() {
            [[ "$1" == "success" || "$1" == "skipped" ]]
          }

          if is_acceptable "$RESULT_CODEQL" && \
             is_acceptable "$RESULT_DEP_REVIEW" && \
             is_acceptable "$RESULT_PYTHON_SECURITY" && \
             is_acceptable "$RESULT_OSV_SCANNER"; then
            echo "✅ Security gate passed"
            echo "🔐 All security checks completed successfully"
          else
            echo "❌ Security gate failed - review security scan results"
            exit 1
          fi
