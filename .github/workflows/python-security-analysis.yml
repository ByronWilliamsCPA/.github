# Python Security Analysis - Reusable Workflow
# Comprehensive security scanning with CodeQL, Bandit, OSV-Scanner, and Dependency-Review
#
# Usage from downstream repos:
#   jobs:
#     security:
#       uses: ByronWilliamsCPA/.github/.github/workflows/python-security-analysis.yml@v1
#       with:
#         source-directory: 'src'
#         fail-on-high: true

name: Python Security Analysis (Reusable)

on:
  workflow_call:
    inputs:
      source-directory:
        description: 'Source code directory to scan'
        type: string
        required: false
        default: 'src'

      python-version:
        description: 'Python version for scanning'
        type: string
        required: false
        default: '3.12'

      fail-on-high:
        description: 'Fail build on HIGH/CRITICAL vulnerabilities'
        type: boolean
        required: false
        default: true

      fail-on-medium:
        description: 'Fail build on MEDIUM vulnerabilities'
        type: boolean
        required: false
        default: false

      run-codeql:
        description: 'Run CodeQL analysis'
        type: boolean
        required: false
        default: true

      run-dependency-review:
        description: 'Run dependency review (PRs only)'
        type: boolean
        required: false
        default: true

      run-bandit:
        description: 'Run Bandit static analysis'
        type: boolean
        required: false
        default: true

      run-osv:
        description: 'Run OSV Scanner'
        type: boolean
        required: false
        default: true
      no-build:
        description: 'Pass --no-build to uv sync/run commands (disable for projects with a build backend like hatchling)'
        required: false
        type: boolean
        default: true

permissions: {}

jobs:
  # Detect security-relevant changes
  detect-changes:
    name: Detect Security Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      security_files: ${{ steps.filter.outputs.security }}
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Check for security-relevant changes
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        with:
          filters: |
            security:
              - '**/*.py'
              - '.github/workflows/**'
              - 'pyproject.toml'
              - 'poetry.lock'
              - 'uv.lock'
              - 'requirements*.txt'

  # CodeQL Analysis
  # Gates on (a) caller opt-in via run-codeql AND (b) at least one security-
  # relevant file changed in the diff. The detect-changes filter checks Python
  # sources, workflow files, and dependency manifests; if none changed,
  # CodeQL is skipped to save CI minutes.
  codeql:
    name: CodeQL Analysis
    if: ${{ inputs.run-codeql && needs.detect-changes.outputs.security_files == 'true' }}
    runs-on: ubuntu-latest
    needs: detect-changes
    timeout-minutes: 20
    env:
      NO_BUILD_FLAG: ${{ inputs.no-build && '--no-build' || '' }}
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install UV
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true

      # Detect the repo state before attempting uv sync. The reusable workflow is uv-only
      # by org policy (poetry repos are being converted to uv in separate work), but it is
      # still called by some repos that don't have a pyproject.toml (template / docs-only
      # forks like DeQA-Doc) and by uv-managed repos that haven't yet committed a uv.lock.
      # Hardcoding `uv sync --frozen` failed for both categories. Auto-detection skips
      # cleanly when pyproject is absent and drops --frozen when no lockfile exists yet.
      # Poetry repos are explicitly rejected with an actionable error.
      # Mirrored in the python-security job below; keep both blocks in sync.
      - name: Detect repo state
        id: detect
        run: |
          if [ ! -f pyproject.toml ]; then
            echo "state=skip" >> $GITHUB_OUTPUT
            echo "::notice::No pyproject.toml found at repo root; CodeQL analysis will be skipped. Remove the python-security-analysis.yml caller from this repo if it does not need Python security scanning."
          elif [ -f poetry.lock ] || grep -qE '^\[tool\.poetry(\.|])' pyproject.toml; then
            echo "state=poetry-not-supported" >> $GITHUB_OUTPUT
            echo "::error::This repo uses Poetry. The python-security-analysis.yml reusable workflow is uv-only by org policy. Convert this repo to uv before re-enabling Python security analysis."
            exit 1
          elif [ -f uv.lock ]; then
            echo "state=uv-locked" >> $GITHUB_OUTPUT
            echo "Detected: uv with lockfile"
          else
            echo "state=uv-no-lock" >> $GITHUB_OUTPUT
            echo "Detected: uv without lockfile (PEP 621 pyproject.toml only); will sync without --frozen"
          fi
        shell: bash

      - name: Install dependencies (uv with lockfile)
        if: steps.detect.outputs.state == 'uv-locked'
        run: uv sync --no-dev --frozen $NO_BUILD_FLAG
        shell: bash

      # SonarCloud cannot follow the $NO_BUILD_FLAG env-var indirection (set at the workflow
      # env from the `no-build` input per PR #112), and by design no uv.lock exists yet on
      # this path until this step generates one. S8541 (--no-build) and S8544 (lockfile) are
      # suppressed inline with rationale; the uv-locked install step above keeps the literal
      # --frozen so the scanner can see it.
      - name: Install dependencies (uv without lockfile)
        if: steps.detect.outputs.state == 'uv-no-lock'
        run: uv sync --no-dev $NO_BUILD_FLAG  # NOSONAR(S8541,S8544): --no-build opt-out via `no-build` input; no uv.lock by design on this path
        shell: bash

      - name: Skip notice (no pyproject.toml)
        if: steps.detect.outputs.state == 'skip'
        run: |
          echo "## CodeQL Analysis Skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No pyproject.toml at repo root, nothing to analyze." >> $GITHUB_STEP_SUMMARY

      - name: Initialize CodeQL
        if: steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock'
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          languages: python
          queries: security-extended,security-and-quality
          config: |
            paths:
              - ${{ inputs.source-directory }}
            paths-ignore:
              - tests
              - validation
              - scripts

      - name: Build CodeQL Database
        if: steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock'
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2

      - name: Perform CodeQL Analysis
        if: steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock'
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          category: "/language:python"
          upload: true

  # Dependency Review (PRs only)
  dependency-review:
    name: Dependency Review
    if: ${{ inputs.run-dependency-review && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: detect-changes
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
        with:
          fail-on-severity: moderate
          license-check: true
          comment-summary-in-pr: always
          deny-licenses: GPL-2.0, GPL-3.0

  # Python security scanning (Bandit)
  python-security:
    name: Python SAST (Bandit)
    if: ${{ inputs.run-bandit }}
    runs-on: ubuntu-latest
    needs: detect-changes
    timeout-minutes: 15
    env:
      NO_BUILD_FLAG: ${{ inputs.no-build && '--no-build' || '' }}
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install UV
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true

      # Detect repo state. Same logic as the codeql job above; each job runs
      # on its own runner so the detect step must be repeated per job.
      - name: Detect repo state
        id: detect
        run: |
          if [ ! -f pyproject.toml ]; then
            echo "state=skip" >> $GITHUB_OUTPUT
            echo "::notice::No pyproject.toml found at repo root; Bandit SAST will be skipped. Remove the python-security-analysis.yml caller from this repo if it does not need Python security scanning."
          elif [ -f poetry.lock ] || grep -qE '^\[tool\.poetry(\.|])' pyproject.toml; then
            echo "state=poetry-not-supported" >> $GITHUB_OUTPUT
            echo "::error::This repo uses Poetry. The python-security-analysis.yml reusable workflow is uv-only by org policy. Convert this repo to uv before re-enabling Python security analysis."
            exit 1
          elif [ -f uv.lock ]; then
            echo "state=uv-locked" >> $GITHUB_OUTPUT
            echo "Detected: uv with lockfile"
          else
            echo "state=uv-no-lock" >> $GITHUB_OUTPUT
            echo "Detected: uv without lockfile (PEP 621 pyproject.toml only); will sync without --frozen"
          fi
        shell: bash

      - name: Install dependencies (uv with lockfile)
        if: steps.detect.outputs.state == 'uv-locked'
        run: uv sync --all-extras --frozen $NO_BUILD_FLAG
        shell: bash

      # SonarCloud cannot follow the $NO_BUILD_FLAG env-var indirection, and by design no
      # uv.lock exists yet on this path until this step generates one. Inline NOSONAR with
      # rationale; the uv-locked install step above keeps the literal --frozen visible.
      - name: Install dependencies (uv without lockfile)
        if: steps.detect.outputs.state == 'uv-no-lock'
        run: uv sync --all-extras $NO_BUILD_FLAG  # NOSONAR(S8541,S8544): --no-build opt-out via `no-build` input; no uv.lock by design on this path
        shell: bash

      - name: Skip notice (no pyproject.toml)
        if: steps.detect.outputs.state == 'skip'
        run: |
          echo "## Bandit SAST Skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No pyproject.toml at repo root, nothing to scan." >> $GITHUB_STEP_SUMMARY

      # --frozen is safe in both detected states: the install step above always produces
      # uv.lock before this step runs. Hardcoding the literal eliminates SonarCloud S8544
      # on the uv run line below. S8541 is suppressed via the preceding-line NOSONAR.
      - name: Bandit Static Analysis
        if: ${{ inputs.run-bandit && (steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock') }}
        env:
          SRC_DIR: ${{ inputs.source-directory }}
        shell: bash
        run: |
          echo "🔒 Running Bandit security analysis..."
          # Single invocation: writes the JSON report and propagates the exit
          # code so real findings fail the job. Suppress false positives via a
          # .bandit config or inline `# nosec` with justification in source.
          # shellcheck disable=SC2086
          # NOSONAR(S8541): --no-build is opt-out via `no-build` workflow input
          uv run --frozen $NO_BUILD_FLAG bandit -r "$SRC_DIR" \
            -f json -o bandit-report.json \
            -c pyproject.toml

      - name: Upload Security Reports
        if: always() && (steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: python-security-reports
          path: bandit-report.json

  # OSV Scanner
  osv-scanner:
    name: OSV Vulnerability Scanner
    if: ${{ inputs.run-osv }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: detect-changes
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Run OSV Scanner
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2  # v2.3.8
        with:
          scan-args: |-
            --lockfile=uv.lock
            --format=json
            --output=osv-results.json

      - name: Analyze OSV Results
        env:
          FAIL_ON_HIGH: ${{ inputs.fail-on-high }}
          FAIL_ON_MEDIUM: ${{ inputs.fail-on-medium }}
        run: |
          echo "🔍 Analyzing OSV scan results..."
          python3 << 'EOF'
          import json
          import os
          import sys

          def extract_severity(vuln):
              """Extract severity from various possible locations in vulnerability data."""
              # Check direct severity field
              severity = vuln.get('severity')
              if severity:
                  return 'MEDIUM' if str(severity).upper() == 'MODERATE' else str(severity).upper()

              # Check database_specific
              db_specific = vuln.get('database_specific', {})
              if isinstance(db_specific, dict):
                  severity = db_specific.get('severity')
                  if severity:
                      return 'MEDIUM' if str(severity).upper() == 'MODERATE' else str(severity).upper()

              # Check severities array
              severities = vuln.get('severities', [])
              if isinstance(severities, list) and severities:
                  severity_levels = {'CRITICAL': 4, 'HIGH': 3, 'MEDIUM': 2, 'MODERATE': 2, 'LOW': 1}
                  max_severity = 'UNKNOWN'
                  max_level = 0
                  for sev_entry in severities:
                      sev = sev_entry.get('severity', '').upper() if isinstance(sev_entry, dict) else str(sev_entry).upper()
                      level = severity_levels.get(sev, 0)
                      if level > max_level:
                          max_level = level
                          max_severity = sev
                  return 'MEDIUM' if max_severity == 'MODERATE' else max_severity

              return 'UNKNOWN'

          fail_on_high = os.environ["FAIL_ON_HIGH"] == "true"
          fail_on_medium = os.environ["FAIL_ON_MEDIUM"] == "true"

          try:
              with open('osv-results.json', 'r') as f:
                  results = json.load(f)

              vulnerabilities = results.get('results', [])
              print(f'📋 Found {len(vulnerabilities)} vulnerability groups')

              if not vulnerabilities:
                  print('✅ No vulnerabilities found')
                  sys.exit(0)

              high_crit = []
              medium = []
              low = []

              for vuln_group in vulnerabilities:
                  if not isinstance(vuln_group, dict):
                      continue
                  for pkg in vuln_group.get('packages', []):
                      if not isinstance(pkg, dict):
                          continue
                      for vuln in pkg.get('vulnerabilities', []):
                          if not isinstance(vuln, dict):
                              continue
                          severity = extract_severity(vuln)
                          vuln_id = vuln.get('id', 'UNKNOWN')
                          if severity in ['HIGH', 'CRITICAL']:
                              high_crit.append(f"{vuln_id} ({severity})")
                          elif severity == 'MEDIUM':
                              medium.append(f"{vuln_id} ({severity})")
                          else:
                              low.append(f"{vuln_id} ({severity})")

              total = len(high_crit) + len(medium) + len(low)
              print(f'\n📊 OSV Results: {total} total vulnerabilities')

              if high_crit:
                  print(f'❌ HIGH/CRITICAL: {len(high_crit)} vulnerabilities')
                  for v in high_crit[:5]:
                      print(f'   - {v}')
                  if fail_on_high:
                      print('\n❌ Build FAILED: HIGH/CRITICAL vulnerabilities found')
                      sys.exit(1)

              if medium:
                  print(f'⚠️  MEDIUM: {len(medium)} vulnerabilities')
                  if fail_on_medium:
                      print('\n❌ Build FAILED: MEDIUM vulnerabilities found')
                      sys.exit(1)

              if low:
                  print(f'ℹ️  LOW: {len(low)} vulnerabilities')

              if not high_crit:
                  print('\n✅ No HIGH/CRITICAL vulnerabilities found')

          except Exception as e:
              print(f'❌ ERROR: {e}')
              import traceback
              traceback.print_exc()
              sys.exit(1)
          EOF

      - name: Upload OSV Report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: osv-scanner-results
          path: osv-results.json

  # Security gate
  security-gate:
    name: Security Gate Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [detect-changes, codeql, dependency-review, python-security, osv-scanner]
    if: always()
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Validate Security Results
        env:
          RESULT_CODEQL: ${{ needs.codeql.result }}
          RESULT_DEP_REVIEW: ${{ needs.dependency-review.result }}
          RESULT_PYTHON_SECURITY: ${{ needs.python-security.result }}
          RESULT_OSV_SCANNER: ${{ needs.osv-scanner.result }}
        run: |
          echo "🔒 Security Analysis Results:"
          echo "CodeQL: $RESULT_CODEQL"
          echo "Dependency Review: $RESULT_DEP_REVIEW"
          echo "Python Security: $RESULT_PYTHON_SECURITY"
          echo "OSV Scanner: $RESULT_OSV_SCANNER"

          is_acceptable() {
            [[ "$1" == "success" || "$1" == "skipped" ]]
          }

          if is_acceptable "$RESULT_CODEQL" && \
             is_acceptable "$RESULT_DEP_REVIEW" && \
             is_acceptable "$RESULT_PYTHON_SECURITY" && \
             is_acceptable "$RESULT_OSV_SCANNER"; then
            echo "✅ Security gate passed"
            echo "🔐 All security checks completed successfully"
          else
            echo "❌ Security gate failed - review security scan results"
            exit 1
          fi
