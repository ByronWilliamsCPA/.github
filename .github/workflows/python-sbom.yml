# ============================================================================
# Reusable Python SBOM & Security Scan Workflow
# ============================================================================
# Software Bill of Materials generation and vulnerability scanning
#
# Usage from downstream repos:
#   jobs:
#     sbom:
#       uses: ByronWilliamsCPA/.github/.github/workflows/python-sbom.yml@main
#       with:
#         python-version: '3.12'
#         fail-on-vulnerabilities: true
#
# Features:
#   - CycloneDX SBOM generation
#   - Trivy vulnerability scanning
#   - License compliance checking
#   - SARIF upload to GitHub Security tab
# ============================================================================

name: Python SBOM (Reusable)

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to use'
        required: false
        type: string
        default: '3.12'
      fail-on-vulnerabilities:
        description: 'Fail workflow on CRITICAL/HIGH vulnerabilities'
        required: false
        type: boolean
        default: true
      severity-threshold:
        description: 'Severity threshold (CRITICAL, HIGH, MEDIUM, LOW)'
        required: false
        type: string
        default: 'CRITICAL,HIGH'
      artifact-retention-days:
        description: 'Days to retain SBOM artifacts'
        required: false
        type: number
        default: 90
      forbidden-licenses:
        description: 'JSON array of forbidden SPDX license IDs'
        required: false
        type: string
        default: '["GPL-2.0-only", "GPL-2.0-or-later", "GPL-3.0-only", "GPL-3.0-or-later", "AGPL-3.0-only", "AGPL-3.0-or-later"]'
      fail-on-forbidden-licenses:
        description: 'Fail workflow on forbidden licenses'
        required: false
        type: boolean
        default: false
      trivyignore-path:
        description: 'Path to .trivyignore file for suppressing known CVEs (relative to repo root)'
        required: false
        type: string
        default: '.trivyignore'

    # Optional secrets - callers may pass these even if unused by this workflow
    # This prevents startup_failure when callers pass extra secrets
    secrets:
      INFISICAL_CLIENT_ID:
        description: 'Infisical client ID (optional, for future use)'
        required: false
      INFISICAL_CLIENT_SECRET:
        description: 'Infisical client secret (optional, for future use)'
        required: false
      DHI_USERNAME:
        description: 'Docker Hardened Images registry username (optional, for future use)'
        required: false
      DHI_PAT:
        description: 'Docker Hardened Images registry personal access token (optional, for future use)'
        required: false

permissions:
  contents: read
  security-events: write

jobs:
  # ============================================================================
  # Job 1: Generate SBOMs
  # ============================================================================
  generate-sbom:
    name: Generate SBOMs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install UV
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install cyclonedx-bom
        run: pip install cyclonedx-bom==4.6.1

      - name: Install dependencies
        run: uv sync --frozen

      - name: Generate runtime SBOM (production dependencies)
        run: |
          cyclonedx-py environment \
            --output-format JSON \
            --outfile sbom-runtime.json \
            .venv/bin/python3
          if [ ! -f sbom-runtime.json ]; then
            echo "::error::cyclonedx-py exited 0 but sbom-runtime.json was not created"
            exit 1
          fi
          echo "SBOM generated: $(wc -c < sbom-runtime.json) bytes"

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: sboms
          path: sbom-*.json
          retention-days: ${{ inputs.artifact-retention-days }}
          if-no-files-found: error

  # ============================================================================
  # Job 2: Scan Runtime Dependencies
  # ============================================================================
  scan-runtime:
    name: Scan Runtime Dependencies
    needs: generate-sbom
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write  # Required for SARIF upload
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: audit

      # Checkout to get .trivyignore and provide git context for SARIF upload
      - name: Checkout repository (for trivyignore and SARIF context)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          sparse-checkout: |
            .trivyignore
            .git

      - name: Download SBOM artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: sboms

      - name: Check for trivyignore file
        id: trivyignore
        run: |
          if [ -f "${{ inputs.trivyignore-path }}" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Found trivyignore at: ${{ inputs.trivyignore-path }}"
            cat "${{ inputs.trivyignore-path }}"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No trivyignore file found at: ${{ inputs.trivyignore-path }}"
          fi

      - name: Trivy SBOM scan (runtime)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          scan-type: sbom
          scan-ref: sbom-runtime.json
          format: table
          severity: ${{ inputs.severity-threshold }}
          exit-code: ${{ inputs.fail-on-vulnerabilities && '1' || '0' }}
          trivyignores: ${{ steps.trivyignore.outputs.exists == 'true' && inputs.trivyignore-path || '' }}

      - name: Trivy SBOM scan (runtime - detailed report)
        if: always()
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          scan-type: sbom
          scan-ref: sbom-runtime.json
          format: sarif
          output: trivy-runtime-results.sarif
          trivyignores: ${{ steps.trivyignore.outputs.exists == 'true' && inputs.trivyignore-path || '' }}

      - name: Upload Trivy results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699  # v3.35.1
        continue-on-error: true  # Don't fail if Code Scanning not enabled on repo
        with:
          sarif_file: trivy-runtime-results.sarif
          category: trivy-runtime-deps

  # ============================================================================
  # Job 3: License Compliance Check
  # ============================================================================
  license-compliance:
    name: License Compliance Check
    needs: generate-sbom
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: audit

      - name: Download SBOM artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: sboms

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Check licenses in runtime SBOM
        env:
          FORBIDDEN_LICENSES: ${{ inputs.forbidden-licenses }}
          FAIL_ON_FORBIDDEN: ${{ inputs.fail-on-forbidden-licenses }}
        run: |
          echo "Checking runtime dependency licenses..."
          python -c "
          import json
          import os
          import sys

          with open('sbom-runtime.json') as f:
              sbom = json.load(f)

          # Parse forbidden licenses from input
          forbidden_licenses = json.loads(os.environ.get('FORBIDDEN_LICENSES', '[]'))
          fail_on_forbidden = os.environ.get('FAIL_ON_FORBIDDEN', 'false').lower() == 'true'
          issues = []

          for component in sbom.get('components', []):
              licenses = component.get('licenses', [])
              for lic in licenses:
                  lic_id = lic.get('license', {}).get('id', '')
                  if lic_id in forbidden_licenses:
                      issues.append(f\"{component['name']}: {lic_id}\")

          if issues:
              print('WARNING: Found potentially incompatible licenses:')
              for issue in issues:
                  print(f'  - {issue}')
              if fail_on_forbidden:
                  sys.exit(1)
          else:
              print('All licenses compatible')
          "

      - name: License Summary
        run: |
          echo "### License Compliance Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Scanned runtime dependencies for license compliance." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Forbidden licenses checked:**" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo '${{ inputs.forbidden-licenses }}' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
