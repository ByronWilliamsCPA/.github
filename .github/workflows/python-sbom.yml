# ============================================================================
# Reusable Python SBOM & Security Scan Workflow
# ============================================================================
# Software Bill of Materials generation and vulnerability scanning
#
# Usage from downstream repos:
#   jobs:
#     sbom:
#       uses: ByronWilliamsCPA/.github/.github/workflows/python-sbom.yml@v1
#       with:
#         python-version: '3.12'
#         fail-on-vulnerabilities: true
#
# Features:
#   - CycloneDX SBOM generation
#   - Trivy vulnerability scanning
#   - License compliance checking
#   - SARIF upload to GitHub Security tab
# ============================================================================

name: Python SBOM (Reusable)

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to use'
        required: false
        type: string
        default: '3.12'
      fail-on-vulnerabilities:
        description: 'Fail workflow on CRITICAL/HIGH vulnerabilities'
        required: false
        type: boolean
        default: true
      severity-threshold:
        description: 'Severity threshold (CRITICAL, HIGH, MEDIUM, LOW)'
        required: false
        type: string
        default: 'CRITICAL,HIGH'
      artifact-retention-days:
        description: 'Days to retain SBOM artifacts'
        required: false
        type: number
        default: 90
      forbidden-licenses:
        description: 'JSON array of forbidden SPDX license IDs'
        required: false
        type: string
        default: '["GPL-2.0-only", "GPL-2.0-or-later", "GPL-3.0-only", "GPL-3.0-or-later", "AGPL-3.0-only", "AGPL-3.0-or-later"]'
      fail-on-forbidden-licenses:
        description: 'Fail workflow on forbidden licenses'
        required: false
        type: boolean
        default: false
      trivyignore-path:
        description: 'Path to .trivyignore file for suppressing known CVEs (relative to repo root)'
        required: false
        type: string
        default: '.trivyignore'
      no-build:
        description: 'Pass --no-build to uv sync/run commands (disable for projects with a build backend like hatchling)'
        required: false
        type: boolean
        default: true

    # Optional secrets - callers may pass these even if unused by this workflow
    # This prevents startup_failure when callers pass extra secrets
    secrets:
      INFISICAL_CLIENT_ID:
        description: 'Infisical client ID (optional, for future use)'
        required: false
      INFISICAL_CLIENT_SECRET:
        description: 'Infisical client secret (optional, for future use)'
        required: false
      DHI_USERNAME:
        description: 'Docker Hardened Images registry username (optional, for future use)'
        required: false
      DHI_PAT:
        description: 'Docker Hardened Images registry personal access token (optional, for future use)'
        required: false

permissions: {}

jobs:
  # ============================================================================
  # Job 1: Generate SBOMs
  # ============================================================================
  generate-sbom:
    name: Generate SBOMs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    env:
      NO_BUILD_FLAG: ${{ inputs.no-build && '--no-build' || '' }}
    outputs:
      state: ${{ steps.detect.outputs.state }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5  # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      # Detect the repo state before attempting uv sync. The reusable workflow is uv-only
      # by org policy (poetry repos are being converted to uv in separate work), but it is
      # still called by some repos that don't have a pyproject.toml (template / docs-only
      # forks) and by uv-managed repos that haven't yet committed a uv.lock. Hardcoding
      # `uv sync --frozen` failed for both categories. Auto-detection skips cleanly when
      # pyproject is absent and drops --frozen when no lockfile exists yet. Poetry repos
      # are explicitly rejected with an actionable error.
      - name: Detect repo state
        id: detect
        run: |
          if [ ! -f pyproject.toml ]; then
            echo "state=skip" >> $GITHUB_OUTPUT
            echo "::notice::No pyproject.toml found at repo root; SBOM generation will be skipped. Remove the python-sbom.yml caller from this repo if it does not need a Python SBOM."
          elif [ -f poetry.lock ] || grep -qE '^\[tool\.poetry(\.|])' pyproject.toml; then
            echo "state=poetry-not-supported" >> $GITHUB_OUTPUT
            echo "::error::This repo uses Poetry. The python-sbom.yml reusable workflow is uv-only by org policy. Convert this repo to uv before re-enabling Python SBOM automation."
            exit 1
          elif [ -f uv.lock ]; then
            echo "state=uv-locked" >> $GITHUB_OUTPUT
            echo "Detected: uv with lockfile"
          else
            echo "state=uv-no-lock" >> $GITHUB_OUTPUT
            echo "Detected: uv without lockfile (PEP 621 pyproject.toml only); will sync without --frozen"
          fi
        shell: bash

      - name: Install dependencies (uv with lockfile)
        if: steps.detect.outputs.state == 'uv-locked'
        run: uv sync --frozen $NO_BUILD_FLAG  # NOSONAR(S8541): --no-build is opt-out via `no-build` workflow input
        shell: bash

      # SonarCloud cannot follow the $NO_BUILD_FLAG env-var indirection, and by design no
      # uv.lock exists yet on this path until this step generates one. Inline NOSONAR with
      # rationale; the uv-locked install step above keeps the literal --frozen visible.
      - name: Install dependencies (uv without lockfile)
        if: steps.detect.outputs.state == 'uv-no-lock'
        run: uv sync $NO_BUILD_FLAG  # NOSONAR(S8541,S8544): --no-build opt-out via `no-build` input; no uv.lock by design on this path
        shell: bash

      - name: Skip notice (no pyproject.toml)
        if: steps.detect.outputs.state == 'skip'
        run: |
          echo "## SBOM Generation Skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No pyproject.toml at repo root, nothing to scan." >> $GITHUB_STEP_SUMMARY

      - name: Install cyclonedx-bom
        if: steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock'
        run: uv pip install --no-build 'cyclonedx-bom==7.3.0'
        shell: bash

      - name: Generate runtime SBOM (production dependencies)
        if: steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock'
        run: |
          .venv/bin/cyclonedx-py environment \
            --output-format JSON \
            --output-file "$GITHUB_WORKSPACE/sbom-runtime.json" \
            .venv/bin/python3
          if [ ! -s "$GITHUB_WORKSPACE/sbom-runtime.json" ]; then
            echo "::error::sbom-runtime.json is missing or empty in $GITHUB_WORKSPACE"
            echo "Workspace contents:"
            ls -la "$GITHUB_WORKSPACE"
            exit 1
          fi
          echo "SBOM generated: $(wc -c < "$GITHUB_WORKSPACE/sbom-runtime.json") bytes"

      - name: Verify SBOM files before upload
        if: steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock'
        run: |
          echo "Working directory : $(pwd)"
          echo "GITHUB_WORKSPACE  : $GITHUB_WORKSPACE"
          echo "sbom-*.json files :"
          find "$GITHUB_WORKSPACE" -maxdepth 1 -name "sbom-*.json" -ls

      - name: Upload SBOM artifacts
        if: steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sboms
          path: ${{ github.workspace }}/sbom-runtime.json
          retention-days: ${{ inputs.artifact-retention-days }}
          if-no-files-found: error

  # ============================================================================
  # Job 2: Scan Runtime Dependencies
  # ============================================================================
  scan-runtime:
    name: Scan Runtime Dependencies
    needs: generate-sbom
    if: needs.generate-sbom.outputs.state == 'uv-locked' || needs.generate-sbom.outputs.state == 'uv-no-lock'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write  # Required for SARIF upload
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5  # v2.19.3
        with:
          egress-policy: audit

      # Checkout to get .trivyignore and provide git context for SARIF upload
      - name: Checkout repository (for trivyignore and SARIF context)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          sparse-checkout: |
            .trivyignore
            .git

      - name: Download SBOM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: sboms

      - name: Check for trivyignore file
        id: trivyignore
        env:
          TRIVYIGNORE_PATH: ${{ inputs.trivyignore-path }}
        run: |
          if [ -f "$TRIVYIGNORE_PATH" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Found trivyignore at: $TRIVYIGNORE_PATH"
            cat "$TRIVYIGNORE_PATH"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No trivyignore file found at: $TRIVYIGNORE_PATH"
          fi

      - name: Trivy SBOM scan (runtime)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: sbom
          scan-ref: sbom-runtime.json
          format: table
          severity: ${{ inputs.severity-threshold }}
          exit-code: ${{ inputs.fail-on-vulnerabilities && '1' || '0' }}
          trivyignores: ${{ steps.trivyignore.outputs.exists == 'true' && inputs.trivyignore-path || '' }}

      - name: Trivy SBOM scan (runtime - detailed report)
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: sbom
          scan-ref: sbom-runtime.json
          format: sarif
          output: trivy-runtime-results.sarif
          trivyignores: ${{ steps.trivyignore.outputs.exists == 'true' && inputs.trivyignore-path || '' }}

      - name: Upload Trivy results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4.35.5
        continue-on-error: true  # Don't fail if Code Scanning not enabled on repo
        with:
          sarif_file: trivy-runtime-results.sarif
          category: trivy-runtime-deps

  # ============================================================================
  # Job 3: License Compliance Check
  # ============================================================================
  license-compliance:
    name: License Compliance Check
    needs: generate-sbom
    if: needs.generate-sbom.outputs.state == 'uv-locked' || needs.generate-sbom.outputs.state == 'uv-no-lock'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5  # v2.19.3
        with:
          egress-policy: audit

      - name: Download SBOM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: sboms

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Check licenses in runtime SBOM
        env:
          FORBIDDEN_LICENSES: ${{ inputs.forbidden-licenses }}
          FAIL_ON_FORBIDDEN: ${{ inputs.fail-on-forbidden-licenses }}
        run: |
          echo "Checking runtime dependency licenses..."
          python -c "
          import json
          import os
          import sys

          with open('sbom-runtime.json') as f:
              sbom = json.load(f)

          # Parse forbidden licenses from input
          forbidden_licenses = json.loads(os.environ.get('FORBIDDEN_LICENSES', '[]'))
          fail_on_forbidden = os.environ.get('FAIL_ON_FORBIDDEN', 'false').lower() == 'true'
          issues = []

          for component in sbom.get('components', []):
              licenses = component.get('licenses', [])
              for lic in licenses:
                  lic_id = lic.get('license', {}).get('id', '')
                  if lic_id in forbidden_licenses:
                      issues.append(f\"{component['name']}: {lic_id}\")

          if issues:
              print('WARNING: Found potentially incompatible licenses:')
              for issue in issues:
                  print(f'  - {issue}')
              if fail_on_forbidden:
                  sys.exit(1)
          else:
              print('All licenses compatible')
          "

      - name: License Summary
        env:
          FORBIDDEN_LICENSES: ${{ inputs.forbidden-licenses }}
        run: |
          echo "### License Compliance Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Scanned runtime dependencies for license compliance." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Forbidden licenses checked:**" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo "$FORBIDDEN_LICENSES" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
