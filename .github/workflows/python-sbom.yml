# ============================================================================
# Reusable Python SBOM & Security Scan Workflow
# ============================================================================
# Software Bill of Materials generation and vulnerability scanning
#
# Usage from downstream repos:
#   jobs:
#     sbom:
#       uses: ByronWilliamsCPA/.github/.github/workflows/python-sbom.yml@v1
#       with:
#         python-version: '3.12'
#         fail-on-vulnerabilities: true
#
# Features:
#   - CycloneDX SBOM generation
#   - Trivy vulnerability scanning (gating, SBOM-ingest)
#   - Grype vulnerability scanning (advisory parallel-run; see issue #152)
#   - OSV-Scanner vulnerability scanning (fast keyless gate, SBOM-ingest)
#   - License compliance checking
#   - SARIF upload to GitHub Security tab
# ============================================================================

name: Python SBOM (Reusable)

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to use'
        required: false
        type: string
        default: '3.12'
      fail-on-vulnerabilities:
        description: 'Fail workflow on CRITICAL/HIGH vulnerabilities. Parallel-run: applies to Trivy only; Grype always runs non-gating (see issue #152).'
        required: false
        type: boolean
        default: true
      severity-threshold:
        description: 'Severity threshold (CRITICAL, HIGH, MEDIUM, LOW)'
        required: false
        type: string
        default: 'CRITICAL,HIGH'
      artifact-retention-days:
        description: 'Days to retain SBOM artifacts'
        required: false
        type: number
        default: 90
      forbidden-licenses:
        description: 'JSON array of forbidden SPDX license IDs. The check also maps free-text license names to copyleft families (GPL, AGPL, LGPL, MPL) so packages declaring a license as a name rather than an SPDX id are still caught.'
        required: false
        type: string
        default: '["GPL-2.0-only", "GPL-2.0-or-later", "GPL-3.0-only", "GPL-3.0-or-later", "AGPL-3.0-only", "AGPL-3.0-or-later", "LGPL-2.0-only", "LGPL-2.0-or-later", "LGPL-2.1-only", "LGPL-2.1-or-later", "LGPL-3.0-only", "LGPL-3.0-or-later", "MPL-2.0"]'
      fail-on-forbidden-licenses:
        description: 'Fail workflow on forbidden licenses'
        required: false
        type: boolean
        default: false
      allowed-packages:
        description: 'JSON array of packages exempted from the license check. Each entry is either a bare package name (exempt from every copyleft family) or "name:FAMILY" (exempt only that family, e.g. "certifi:MPL", so a later license change is still caught). Seed with ubiquitous transitive dependencies whose copyleft classification is an accepted non-issue (e.g. certifi is MPL-2.0 but pulled by requests into virtually every Python project).'
        required: false
        type: string
        default: '["certifi:MPL"]'
      trivyignore-path:
        description: 'Path to .trivyignore file for suppressing known CVEs (relative to repo root). DEPRECATED: removed at Trivy cutover (see issue #152).'
        required: false
        type: string
        default: '.trivyignore'
      no-build:
        description: 'Pass --no-build to uv sync/run commands (disable for projects with a build backend like hatchling)'
        required: false
        type: boolean
        default: true
      grype-config-path:
        description: 'Path to Grype config file (CVE ignore rules etc.) relative to repo root.'
        required: false
        type: string
        default: '.grype.yaml'
      run-osv:
        description: 'Run OSV-Scanner against the SBOM artifact as a fast, keyless CI gate. No API key required; covers transitive dependencies.'
        required: false
        type: boolean
        default: true

    # Optional secrets - callers may pass these even if unused by this workflow
    # This prevents startup_failure when callers pass extra secrets
    secrets:
      INFISICAL_CLIENT_ID:
        description: 'Infisical client ID (optional, for future use)'
        required: false
      INFISICAL_CLIENT_SECRET:
        description: 'Infisical client secret (optional, for future use)'
        required: false
      DHI_USERNAME:
        description: 'Docker Hardened Images registry username (optional, for future use)'
        required: false
      DHI_PAT:
        description: 'Docker Hardened Images registry personal access token (optional, for future use)'
        required: false

permissions: {}

jobs:
  # ============================================================================
  # Job 1: Generate SBOMs
  # ============================================================================
  generate-sbom:
    name: Generate SBOMs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    env:
      NO_BUILD_FLAG: ${{ inputs.no-build && '--no-build' || '' }}
    outputs:
      state: ${{ steps.detect.outputs.state }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install UV
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      # Detect the repo state before attempting uv sync. The reusable workflow is uv-only
      # by org policy (poetry repos are being converted to uv in separate work), but it is
      # still called by some repos that don't have a pyproject.toml (template / docs-only
      # forks) and by uv-managed repos that haven't yet committed a uv.lock. Hardcoding
      # `uv sync --frozen` failed for both categories. Auto-detection skips cleanly when
      # pyproject is absent and drops --frozen when no lockfile exists yet. Poetry repos
      # are explicitly rejected with an actionable error.
      - name: Detect repo state
        id: detect
        run: |
          if [ ! -f pyproject.toml ]; then
            echo "state=skip" >> $GITHUB_OUTPUT
            echo "::notice::No pyproject.toml found at repo root; SBOM generation will be skipped. Remove the python-sbom.yml caller from this repo if it does not need a Python SBOM."
          elif [ -f poetry.lock ] || grep -qE '^\[tool\.poetry(\.|])' pyproject.toml; then
            echo "state=poetry-not-supported" >> $GITHUB_OUTPUT
            echo "::error::This repo uses Poetry. The python-sbom.yml reusable workflow is uv-only by org policy. Convert this repo to uv before re-enabling Python SBOM automation."
            exit 1
          elif [ -f uv.lock ]; then
            echo "state=uv-locked" >> $GITHUB_OUTPUT
            echo "Detected: uv with lockfile"
          else
            echo "state=uv-no-lock" >> $GITHUB_OUTPUT
            echo "Detected: uv without lockfile (PEP 621 pyproject.toml only); will sync without --frozen"
          fi
        shell: bash

      - name: Install dependencies (uv with lockfile)
        if: steps.detect.outputs.state == 'uv-locked'
        run: uv sync --frozen $NO_BUILD_FLAG  # NOSONAR(S8541): --no-build is opt-out via `no-build` workflow input
        shell: bash

      # SonarCloud cannot follow the $NO_BUILD_FLAG env-var indirection, and by design no
      # uv.lock exists yet on this path until this step generates one. Inline NOSONAR with
      # rationale; the uv-locked install step above keeps the literal --frozen visible.
      - name: Install dependencies (uv without lockfile)
        if: steps.detect.outputs.state == 'uv-no-lock'
        run: uv sync $NO_BUILD_FLAG  # NOSONAR(S8541,S8544): --no-build opt-out via `no-build` input; no uv.lock by design on this path
        shell: bash

      - name: Skip notice (no pyproject.toml)
        if: steps.detect.outputs.state == 'skip'
        run: |
          echo "## SBOM Generation Skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No pyproject.toml at repo root, nothing to scan." >> $GITHUB_STEP_SUMMARY

      - name: Install cyclonedx-bom
        if: steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock'
        run: uv pip install --no-build 'cyclonedx-bom==7.3.0'
        shell: bash

      - name: Generate runtime SBOM (production dependencies)
        if: steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock'
        run: |
          .venv/bin/cyclonedx-py environment \
            --output-format JSON \
            --output-file "$GITHUB_WORKSPACE/sbom-runtime.cdx.json" \
            .venv/bin/python3
          if [ ! -s "$GITHUB_WORKSPACE/sbom-runtime.cdx.json" ]; then
            echo "::error::sbom-runtime.cdx.json is missing or empty in $GITHUB_WORKSPACE"
            echo "Workspace contents:"
            ls -la "$GITHUB_WORKSPACE"
            exit 1
          fi
          echo "SBOM generated: $(wc -c < "$GITHUB_WORKSPACE/sbom-runtime.cdx.json") bytes"

      # cyclonedx-bom 7.3.0 emits no license entry for packages that declare their
      # license through the PEP 639 License-Expression field (for example hypothesis),
      # so those packages are invisible to an SBOM-only license check. pip-licenses
      # reads installed distribution metadata directly and closes that gap. The
      # license-compliance job cross-checks this inventory alongside the SBOM.
      - name: Generate pip-licenses inventory (PEP 639 coverage)
        if: steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock'
        run: |
          uv pip install --no-build 'pip-licenses==5.5.5'
          .venv/bin/pip-licenses --format=json --output-file "$GITHUB_WORKSPACE/pip-licenses.json"
          echo "pip-licenses inventory: $(wc -c < "$GITHUB_WORKSPACE/pip-licenses.json") bytes"

      - name: Verify SBOM files before upload
        if: steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock'
        run: |
          echo "Working directory : $(pwd)"
          echo "GITHUB_WORKSPACE  : $GITHUB_WORKSPACE"
          echo "sbom-*.json files :"
          find "$GITHUB_WORKSPACE" -maxdepth 1 -name "sbom-*.json" -ls

      - name: Upload SBOM artifacts
        if: steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sboms
          path: |
            ${{ github.workspace }}/sbom-runtime.cdx.json
            ${{ github.workspace }}/pip-licenses.json
          retention-days: ${{ inputs.artifact-retention-days }}
          if-no-files-found: error

  # ============================================================================
  # Job 2: Scan Runtime Dependencies
  # ============================================================================
  scan-runtime:
    name: Scan Runtime Dependencies
    needs: generate-sbom
    if: needs.generate-sbom.outputs.state == 'uv-locked' || needs.generate-sbom.outputs.state == 'uv-no-lock'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write  # Required for SARIF upload
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      # Checkout to get .trivyignore and provide git context for SARIF upload
      - name: Checkout repository (for trivyignore and SARIF context)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          sparse-checkout: |
            .trivyignore
            .git

      - name: Download SBOM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: sboms

      - name: Check for trivyignore file
        id: trivyignore
        env:
          TRIVYIGNORE_PATH: ${{ inputs.trivyignore-path }}
        run: |
          if [ -f "$TRIVYIGNORE_PATH" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Found trivyignore at: $TRIVYIGNORE_PATH"
            cat "$TRIVYIGNORE_PATH"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No trivyignore file found at: $TRIVYIGNORE_PATH"
          fi

      - name: Trivy SBOM scan (runtime)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: sbom
          scan-ref: sbom-runtime.cdx.json
          format: table
          severity: ${{ inputs.severity-threshold }}
          exit-code: ${{ inputs.fail-on-vulnerabilities && '1' || '0' }}
          trivyignores: ${{ steps.trivyignore.outputs.exists == 'true' && inputs.trivyignore-path || '' }}

      - name: Trivy SBOM scan (runtime - detailed report)
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: sbom
          scan-ref: sbom-runtime.cdx.json
          format: sarif
          output: trivy-runtime-results.sarif
          trivyignores: ${{ steps.trivyignore.outputs.exists == 'true' && inputs.trivyignore-path || '' }}

      - name: Upload Trivy results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        continue-on-error: true  # Don't fail if Code Scanning not enabled on repo
        with:
          sarif_file: trivy-runtime-results.sarif
          category: trivy-runtime-deps

      # Upload SARIF as a workflow artifact so the parity-summary job (added
      # 2026-05-25 for issue #152) can compare Trivy findings against Grype
      # findings. Removed at Trivy cutover along with the parity-summary job.
      - name: Upload Trivy SARIF artifact (for parity-summary)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: trivy-sarif
          path: trivy-runtime-results.sarif
          retention-days: 7
          if-no-files-found: warn

  # ============================================================================
  # Job 2b: Scan Runtime Dependencies (Grype - advisory, parallel-run)
  # ============================================================================
  # Added 2026-05-25 per issue #152. Runs alongside scan-runtime (Trivy) for a
  # 30-day parity window. Grype is non-gating via `continue-on-error: true` at
  # the JOB level (not step level): genuine action failures still surface as a
  # failed step in the logs, but the job result is `success` so the workflow
  # caller never blocks on Grype. `fail-build: false` on the action separately
  # prevents Grype from failing when it finds vulnerabilities. At Trivy cutover
  # this job is promoted to gating (remove the job-level continue-on-error) and
  # the Trivy job is removed in a separate PR.
  # ============================================================================
  scan-runtime-grype:
    name: Scan Runtime Dependencies (Grype - advisory)
    needs: generate-sbom
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true  # parallel-run: never block caller on Grype, but let individual steps fail visibly
    permissions:
      contents: read
      security-events: write  # Required for SARIF upload
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      # #CRITICAL: grype-config-path is a caller-supplied string that flows into
      # both sparse-checkout patterns and anchore/scan-action's `config:` arg.
      # Reject path traversal (`..`) and absolute paths before they reach either
      # sink. This is more portable than relying on git sparse-checkout cone-mode
      # default behavior, which varies across git versions.
      # #VERIFY: confirm during day-30 checkpoint that legitimate caller paths
      # (`.grype.yaml`, `configs/.grype.yaml`) still pass validation.
      - name: Validate grype-config-path input
        env:
          GRYPE_CONFIG_PATH: ${{ inputs.grype-config-path }}
        run: |
          set -euo pipefail
          case "$GRYPE_CONFIG_PATH" in
            /*)
              echo "::error::grype-config-path must be a relative path; got: $GRYPE_CONFIG_PATH"
              exit 1
              ;;
            *..*)
              echo "::error::grype-config-path must not contain '..' segments; got: $GRYPE_CONFIG_PATH"
              exit 1
              ;;
          esac
          echo "grype-config-path validated: $GRYPE_CONFIG_PATH"

      # Checkout to get the Grype config file and provide git context for SARIF upload.
      # The sparse-checkout uses the caller-configured grype-config-path so a custom
      # path (e.g., configs/.grype.yaml) is fetched too. Path is validated above.
      - name: Checkout repository (for grype config and SARIF context)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          sparse-checkout: |
            ${{ inputs.grype-config-path }}
            .git

      - name: Download SBOM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: sboms

      - name: Check for Grype config file
        id: grypeconfig
        env:
          GRYPE_CONFIG_PATH: ${{ inputs.grype-config-path }}
        run: |
          set -euo pipefail
          if [ -f "$GRYPE_CONFIG_PATH" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Found Grype config at: $GRYPE_CONFIG_PATH"
            cat "$GRYPE_CONFIG_PATH"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No Grype config file found at: $GRYPE_CONFIG_PATH"
          fi

      # Translate Trivy-style severity CSV to Grype's monotonic cutoff.
      # Grype's severity-cutoff fails at-or-above the named severity.
      # We pick the lowest severity in the CSV so the gate is equivalent to
      # the Trivy allowlist for the common contiguous-range case.
      # #ASSUME: callers use contiguous CSV ranges from the top (CRITICAL,HIGH).
      # #VERIFY: day-30 checkpoint spot-checks 3-5 callers for non-contiguous use.
      - name: Translate severity threshold for Grype
        id: severity
        env:
          INPUT_SEVERITY: ${{ inputs.severity-threshold }}
        run: |
          set -euo pipefail
          lowered=$(echo "$INPUT_SEVERITY" | tr '[:upper:]' '[:lower:]')
          cutoff=""
          for level in negligible low medium high critical; do
            if echo ",$lowered," | grep -q ",$level,"; then
              cutoff="$level"
              break
            fi
          done
          if [ -z "$cutoff" ]; then
            cutoff="high"
            echo "::warning::severity-threshold did not match known Grype severity; defaulting to 'high'"
          fi
          echo "cutoff=$cutoff" >> $GITHUB_OUTPUT
          echo "Translated '$INPUT_SEVERITY' -> Grype severity-cutoff '$cutoff'"

      # Non-gating semantic is now provided at the JOB level via
      # `continue-on-error: true` on `scan-runtime-grype`. Removing the
      # step-level `continue-on-error` here means a genuine action failure
      # (binary crash, DB download timeout, malformed SBOM input) surfaces
      # as a red step in the logs instead of being silently masked.
      - name: Grype SBOM scan (runtime)
        id: grype-table
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v7.4.0
        with:
          sbom: sbom-runtime.cdx.json
          fail-build: false  # parallel-run: do not fail on vulnerabilities found
          severity-cutoff: ${{ steps.severity.outputs.cutoff }}
          output-format: table
          config: ${{ steps.grypeconfig.outputs.exists == 'true' && inputs.grype-config-path || '' }}

      # #CRITICAL: SARIF upload category MUST differ from Trivy's `trivy-runtime-deps`
      # or codeql-action/upload-sarif overwrites the prior upload in the Security tab.
      # #VERIFY: after first run, confirm both `trivy-runtime-deps` and
      # `grype-runtime-deps` categories appear under Security > Code scanning alerts.
      - name: Grype SBOM scan (runtime - SARIF report)
        id: grype-sarif
        if: always()
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v7.4.0
        with:
          sbom: sbom-runtime.cdx.json
          fail-build: false
          severity-cutoff: ${{ steps.severity.outputs.cutoff }}
          output-format: sarif
          config: ${{ steps.grypeconfig.outputs.exists == 'true' && inputs.grype-config-path || '' }}

      - name: Upload Grype results to GitHub Security tab
        if: always() && steps.grype-sarif.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        continue-on-error: true  # Don't fail if Code Scanning not enabled on repo
        with:
          sarif_file: ${{ steps.grype-sarif.outputs.sarif }}
          category: grype-runtime-deps

      # Upload SARIF as a workflow artifact so the parity-summary job can
      # compare Grype findings against Trivy findings. `if-no-files-found: warn`
      # avoids failing the job if the scan step did not produce SARIF.
      - name: Upload Grype SARIF artifact (for parity-summary)
        if: always() && steps.grype-sarif.outputs.sarif != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: grype-sarif
          path: ${{ steps.grype-sarif.outputs.sarif }}
          retention-days: 7
          if-no-files-found: warn

  # ============================================================================
  # Job 2c: Scan Runtime Dependencies (OSV-Scanner - fast keyless gate)
  # ============================================================================
  # OSV-Scanner ingests the shared SBOM artifact produced by generate-sbom so
  # both tools share one source of truth and no second resolver pass occurs.
  # Benefits over Trivy/Grype for this slot: sub-second on typical Python
  # dependency graphs, no API key required, and cross-database coverage (OSV,
  # NVD, GitHub Advisory, PyPI Advisory) that catches transitives sometimes
  # missed by Snyk free tier. Gating by default; opt out with run-osv: false.
  #
  # #CRITICAL: security-events: write is required for upload-sarif. This
  # permission is inherited by the caller in a reusable workflow context.
  # #VERIFY: confirm `osv-sbom-runtime-deps` category appears separately in
  # Security > Code scanning alerts after the first run alongside Trivy and
  # Grype categories.
  # ============================================================================
  scan-runtime-osv:
    name: Scan Runtime Dependencies (OSV-Scanner)
    needs: generate-sbom
    if: inputs.run-osv && (needs.generate-sbom.outputs.state == 'uv-locked' || needs.generate-sbom.outputs.state == 'uv-no-lock')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository (for SARIF context)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          sparse-checkout: |
            .git

      - name: Download SBOM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: sboms

      # Primary gating scan: table format for readable log output.
      # continue-on-error mirrors fail-on-vulnerabilities so the gate is
      # consistent with Trivy's exit-code behavior.
      # #ASSUME: osv-scanner exits 1 when vulnerabilities are found, 0 for
      # clean, 127 for unexpected error. continue-on-error only suppresses
      # non-zero exits; step-level failure is still visible in the log.
      - name: OSV-Scanner SBOM scan (runtime)
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2  # v2.3.8
        continue-on-error: ${{ !inputs.fail-on-vulnerabilities }}
        with:
          scan-args: |-
            -L sbom-runtime.cdx.json

      # Secondary SARIF run: always non-gating; output written to file for
      # Security tab upload. Runs even if the gating step above failed.
      - name: OSV-Scanner SBOM scan (runtime - SARIF report)
        id: osv-sarif
        if: always()
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2  # v2.3.8
        continue-on-error: true
        with:
          scan-args: |-
            -L sbom-runtime.cdx.json
            --format=sarif
            --output=osv-sbom-runtime.sarif

      - name: Upload OSV-Scanner results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        continue-on-error: true
        with:
          sarif_file: osv-sbom-runtime.sarif
          category: osv-sbom-runtime-deps

      - name: Upload OSV-Scanner SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: osv-sbom-sarif
          path: osv-sbom-runtime.sarif
          retention-days: ${{ inputs.artifact-retention-days }}
          if-no-files-found: warn

  # ============================================================================
  # Job 3: License Compliance Check
  # ============================================================================
  license-compliance:
    name: License Compliance Check
    needs: generate-sbom
    if: needs.generate-sbom.outputs.state == 'uv-locked' || needs.generate-sbom.outputs.state == 'uv-no-lock'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Download SBOM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: sboms

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ inputs.python-version }}

      # Checkout only scripts/check_licenses.py from this reusable workflow repo
      # so the runner can invoke it directly. The SBOM artifacts were downloaded
      # above into the runner workspace root (the CWD at invocation time); the
      # script is checked out under _checker/ and reads its inputs from the CWD.
      # All workflow inputs reach the script via env vars (injection-safe pattern).
      #
      # #CRITICAL: ref MUST pin the script to the same commit as this workflow
      # file. job.workflow_sha is the commit SHA of the reusable workflow file
      # that defines this job, so a caller pinned to python-sbom.yml@<sha> gets
      # exactly that commit's check_licenses.py (job.workflow_repository is the
      # repo that workflow file lives in). Omitting ref would float to main
      # HEAD at run time, breaking the SHA-pin guarantee and opening a TOCTOU
      # window for every consumer. These job.* properties are newer than
      # actionlint 1.7.x's context model; see .github/actionlint.yaml.
      # #ASSUME: ByronWilliamsCPA/.github remains public; a private repo would
      # require callers' tokens to carry contents: read on this repo.
      # #VERIFY: on first caller run, confirm the checked-out script SHA matches
      # the called workflow ref in the job log.
      - name: Checkout license checker script
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          sparse-checkout: |
            scripts/check_licenses.py
          sparse-checkout-cone-mode: false
          path: _checker

      # sparse-checkout with cone-mode false exits 0 even when the requested
      # path does not exist in the ref; fail loudly here instead of letting the
      # python invocation die with a raw "can't open file" interpreter error.
      - name: Verify license checker script is present
        env:
          CHECKER_REF: ${{ job.workflow_sha }}
        run: |
          if [ ! -f "_checker/scripts/check_licenses.py" ]; then
            echo "::error::scripts/check_licenses.py not found after sparse checkout of ByronWilliamsCPA/.github@${CHECKER_REF}. Path mismatch or failed checkout."
            exit 1
          fi

      - name: Check licenses in runtime SBOM
        env:
          # #CRITICAL: workflow inputs MUST reach the script via env vars only.
          # Never interpolate inputs directly into run: commands; that opens a
          # script-injection path if callers pass attacker-controlled strings.
          # The env: block is the injection-safe boundary.
          # #ASSUME: the extracted script preserves the inline script's
          # advisory/gating exit-code behaviour exactly.
          # #VERIFY: confirm on first run that advisory/gating behaviour is preserved.
          FORBIDDEN_LICENSES: ${{ inputs.forbidden-licenses }}
          ALLOWED_PACKAGES: ${{ inputs.allowed-packages }}
          FAIL_ON_FORBIDDEN: ${{ inputs.fail-on-forbidden-licenses }}
        run: |
          echo "Checking runtime dependency licenses..."
          python _checker/scripts/check_licenses.py

      - name: License Summary
        env:
          FORBIDDEN_LICENSES: ${{ inputs.forbidden-licenses }}
          ALLOWED_PACKAGES: ${{ inputs.allowed-packages }}
          FAIL_ON_FORBIDDEN: ${{ inputs.fail-on-forbidden-licenses }}
        run: |
          # Single grouped redirect to a quoted target (avoids per-line SC2086 and SC2129).
          {
            echo "### License Compliance Check"
            echo ""
            echo "Scanned runtime dependencies (CycloneDX SBOM plus pip-licenses inventory) for license compliance."
            echo "Matching reads the SPDX id, name, and expression fields and maps free-text names to copyleft families."
            echo "Mode: $([ "$FAIL_ON_FORBIDDEN" = "true" ] && echo "gating (fails on forbidden)" || echo "advisory (warn only)")."
            echo ""
            echo "**Forbidden licenses checked:**"
            echo '```json'
            echo "$FORBIDDEN_LICENSES"
            echo '```'
            echo "**Packages allowlisted:**"
            echo '```json'
            echo "$ALLOWED_PACKAGES"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ============================================================================
  # Job 4: Parity Summary (Trivy vs Grype, parallel-run only)
  # ============================================================================
  # Removed at Trivy cutover. See issue #152.
  #
  # Compares the actual SARIF findings emitted by the two scanners, not just
  # the job results. Job results alone are insufficient because Grype is
  # configured as non-gating (continue-on-error at job level + fail-build:
  # false on the action) and therefore reports `success` regardless of
  # findings. Comparing job results would produce "match" 100% of the time
  # and defeat the purpose of the 30-day parity window.
  #
  # SARIF artifacts are uploaded by scan-runtime (`trivy-sarif`) and
  # scan-runtime-grype (`grype-sarif`). This job downloads both and runs
  # scripts/compare_scanner_parity.py, which joins findings by the affected
  # artifact (ecosystem, PEP 503 package name, version), NOT by advisory ID.
  #
  # #CRITICAL: the two scanners use different advisory namespaces (Trivy emits
  # CVE-* rule IDs, Grype emits GHSA-* rule IDs) for the same vulnerability, so
  # a raw rule-ID set-diff reports false divergence. The package-key join is the
  # only comparison that reflects true detection parity. The script also reads
  # SARIF by content rather than filename, because the Grype artifact downloads
  # without a .sarif extension.
  #
  # #EDGE: if either scan job is cancelled or its SARIF artifact is missing
  # (e.g., the scan action genuinely crashed), the corresponding side reports
  # zero SARIF files parsed and the verdict notes the gap rather than failing.
  # ============================================================================
  parity-summary:
    name: Trivy vs Grype Parity Summary
    needs: [scan-runtime, scan-runtime-grype]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read  # sparse-checkout of the comparison script from this repo
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Download Trivy SARIF artifact
        id: download-trivy
        if: always()
        continue-on-error: true  # Tolerate missing artifact; summary reports the gap
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: trivy-sarif
          path: trivy-sarif

      - name: Download Grype SARIF artifact
        id: download-grype
        if: always()
        continue-on-error: true  # Tolerate missing artifact; summary reports the gap
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: grype-sarif
          path: grype-sarif

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ inputs.python-version }}

      # Checkout only scripts/compare_scanner_parity.py from this reusable
      # workflow repo, pinned to the same commit as this workflow file. See the
      # license-compliance job for the full rationale on job.workflow_sha pinning
      # (it preserves the SHA-pin guarantee and avoids a TOCTOU window).
      - name: Checkout parity comparison script
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          sparse-checkout: |
            scripts/compare_scanner_parity.py
          sparse-checkout-cone-mode: false
          path: _checker
          # This checkout only reads one script; do not leave the auth token in
          # _checker/.git/config where it could be picked up by later steps.
          persist-credentials: false

      # sparse-checkout with cone-mode false exits 0 even when the requested
      # path does not exist in the ref; fail loudly instead of a raw python
      # "can't open file" error.
      - name: Verify parity comparison script is present
        env:
          CHECKER_REF: ${{ job.workflow_sha }}
        run: |
          if [ ! -f "_checker/scripts/compare_scanner_parity.py" ]; then
            echo "::error::scripts/compare_scanner_parity.py not found after sparse checkout of ByronWilliamsCPA/.github@${CHECKER_REF}. Path mismatch or failed checkout."
            exit 1
          fi

      - name: Compare findings and write parity summary
        # The script joins findings by affected artifact (ecosystem, package,
        # version), not by advisory ID, and reads SARIF by content. It is
        # advisory: it always exits 0 and never gates the build. All inputs
        # reach it via env vars (the injection-safe boundary).
        env:
          TRIVY_SARIF_DIR: trivy-sarif
          GRYPE_SARIF_DIR: grype-sarif
          TRIVY_RESULT: ${{ needs.scan-runtime.result }}
          GRYPE_RESULT: ${{ needs.scan-runtime-grype.result }}
        run: |
          python _checker/scripts/compare_scanner_parity.py
