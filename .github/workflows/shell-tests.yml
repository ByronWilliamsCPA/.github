# ============================================================================
# Shell Script Tests
# ============================================================================
# Runs bats tests for scripts/ whenever shell scripts or tests change.
#
# Requirements:
#   - bats-core, bats-support, bats-assert submodules in tests/libs/
#   - jq installed (used by stub helpers in tests)
#
# Run locally:
#   git submodule update --init --recursive
#   ./tests/libs/bats-core/bin/bats tests/update-pinned-actions.bats
# ============================================================================

name: Shell Tests

on:
  push:
    paths:
      - 'scripts/**'
      - 'tests/**'
      - '.github/workflows/shell-tests.yml'
  pull_request:
    paths:
      - 'scripts/**'
      - 'tests/**'
      - '.github/workflows/shell-tests.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  bats:
    name: Bats Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: recursive

      - name: Run bats tests
        run: ./tests/libs/bats-core/bin/bats tests/update-pinned-actions.bats
