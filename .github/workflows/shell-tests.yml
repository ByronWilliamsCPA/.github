# ============================================================================
# Shell Script Tests
# ============================================================================
# Runs bats tests for scripts/ whenever shell scripts or tests change.
#
# Requirements:
#   - bats-core, bats-support, bats-assert submodules in tests/libs/
#   - jq installed (used by stub helpers in tests)
#
# Run locally:
#   git submodule update --init --recursive
#   ./tests/libs/bats-core/bin/bats tests/*.bats
# ============================================================================

name: Shell Tests

on:
  push:
    paths:
      - 'scripts/**'
      - 'tests/**'
      - '.github/workflows/shell-tests.yml'
  pull_request:
    paths:
      - 'scripts/**'
      - 'tests/**'
      - '.github/workflows/shell-tests.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  bats:
    name: Bats Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          submodules: recursive

      - name: Run bats tests
        # Discover all .bats files under tests/ rather than naming a single
        # file. Naming tests/update-pinned-actions.bats hid a class of bugs:
        # tests added under tests/fleet-audit-sha-pins.bats (and any future
        # *.bats sibling) were never executed by CI, so STRICT_AUDIT and
        # REPO_LIMIT regressions could ship green. find + -print0/-exec keeps
        # this glob-injection-safe and POSIX-clean.
        run: |
          find tests -maxdepth 1 -name '*.bats' -print0 \
            | xargs -0 ./tests/libs/bats-core/bin/bats

  python:
    name: Python Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # #ASSUME: contents: read is sufficient; the job only checks out and runs
    # local tests, no secrets, artifacts, or id-token needed.
    # #VERIFY: revisit if a step is added that publishes results or comments.
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'

      - name: Install UV
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3  # v8.3.0
        with:
          enable-cache: true

      - name: Run pytest
        # pytest is pinned to an exact version (SonarCloud S8544: unpinned
        # installs resolve to whatever PyPI serves at run time).
        run: uvx --with 'pytest==9.0.3' pytest tests/python/ -v
