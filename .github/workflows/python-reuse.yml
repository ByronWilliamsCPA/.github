# ============================================================================
# Reusable REUSE Compliance Workflow
# ============================================================================
# Validates FSFE REUSE 3.0 specification compliance for license management
#
# Usage from downstream repos:
#   jobs:
#     reuse:
#       uses: ByronWilliamsCPA/.github/.github/workflows/python-reuse.yml@d5cf99101d4150ae5832d154cb42993705a09e31 # v7.0.1
#       with:
#         generate-spdx: true
#
# Features:
#   - FSFE REUSE 3.0 specification compliance checking
#   - SPDX SBOM generation (optional)
#   - License file verification
#   - Copyright header validation
# ============================================================================

name: REUSE Compliance (Reusable)

on:
  workflow_call:
    inputs:
      generate-spdx:
        description: 'Generate SPDX SBOM report'
        type: boolean
        required: false
        default: false

      fail-on-missing:
        description: 'Fail if files are missing licensing information'
        type: boolean
        required: false
        default: true

      artifact-retention-days:
        description: 'Days to retain compliance artifacts'
        type: number
        required: false
        default: 30

permissions: {}

jobs:
  reuse-compliance:
    name: REUSE Compliance Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Check for required license files
        id: license-check
        run: |
          echo "Checking for required license files..."

          if [ -f "LICENSE" ] || [ -f "LICENSE.txt" ] || [ -f "LICENSE.md" ] || \
             [ -f "COPYING" ] || [ -d "LICENSES" ]; then
            echo "license_found=true" >> "$GITHUB_OUTPUT"
            echo "License file(s) found"
          else
            echo "license_found=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No LICENSE file found in repository root"
          fi

      - name: REUSE Compliance Check
        uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5  # v6.0.0
        id: reuse
        continue-on-error: ${{ !inputs.fail-on-missing }}

      # #CRITICAL: SPDX generation reuses the fsfe/reuse Docker image rather than
      # installing reuse via `uv pip install --no-build`. Reason (issue #124): PyPI
      # publishes only one wheel per reuse release (e.g., 5.0.2 cp313-only, 6.2.0
      # cp310-only). The runner's `uv venv` defaults to system CPython 3.12, no
      # wheel matches, and `--no-build` (S8541/S8544 mitigation from PR #110)
      # forbids the sdist fallback. The Docker image already has reuse installed
      # for the matching Python ABI, so reusing it avoids the version mismatch
      # entirely while preserving the security posture (no pip install on host).
      # #VERIFY: confirm fsfe/reuse-action@v6 `args:` input passes through to the
      # reuse CLI and that output files written to /github/workspace persist.
      # #ASSUME: when callers pass `fail-on-missing: false`, the lint step is
      # marked continue-on-error and SPDX still runs against a possibly non-
      # compliant tree (best-effort SBOM). This is intentional: the SBOM is
      # for transparency, not for gating, and a partial inventory beats none.
      - name: Generate SPDX SBOM
        if: ${{ inputs.generate-spdx }}
        id: spdx
        uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5  # v6.0.0
        with:
          args: spdx -o reuse-spdx.spdx

      - name: Upload SPDX artifact
        if: ${{ inputs.generate-spdx && steps.spdx.outcome == 'success' }}
        id: upload-spdx
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: reuse-spdx-report
          path: reuse-spdx.spdx
          retention-days: ${{ inputs.artifact-retention-days }}

      - name: REUSE Compliance Summary
        if: always()
        env:
          # #ASSUME: steps.*.outcome values are constrained to success/failure/cancelled/skipped
          # by GitHub Actions; passing through env vars avoids ${{ }} shell interpolation
          # (workflow-injection guidance).
          GENERATE_SPDX: ${{ inputs.generate-spdx }}
          REUSE_OUTCOME: ${{ steps.reuse.outcome }}
          SPDX_OUTCOME: ${{ steps.spdx.outcome }}
          UPLOAD_OUTCOME: ${{ steps.upload-spdx.outcome }}
        run: |
          echo "## REUSE Compliance Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$REUSE_OUTCOME" = "success" ]; then
            echo "**Status:** Compliant" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "All files have proper licensing information according to the REUSE specification." >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status:** Non-compliant" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Some files are missing licensing information. See workflow logs for details." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### How to Fix" >> $GITHUB_STEP_SUMMARY
            echo "1. Add SPDX license identifiers to source files:" >> $GITHUB_STEP_SUMMARY
            echo '   ```' >> $GITHUB_STEP_SUMMARY
            # REUSE-IgnoreStart
            echo '   # SPDX-FileCopyrightText: 2024 Your Name' >> $GITHUB_STEP_SUMMARY
            echo '   # SPDX-License-Identifier: MIT' >> $GITHUB_STEP_SUMMARY
            # REUSE-IgnoreEnd
            echo '   ```' >> $GITHUB_STEP_SUMMARY
            echo "2. Or create a \`.reuse/dep5\` file for bulk declarations" >> $GITHUB_STEP_SUMMARY
            echo "3. Install reuse tool: \`pip install reuse\`" >> $GITHUB_STEP_SUMMARY
            echo "4. Run \`reuse lint\` locally to check compliance" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Resources" >> $GITHUB_STEP_SUMMARY
          echo "- [REUSE Specification](https://reuse.software/spec/)" >> $GITHUB_STEP_SUMMARY
          echo "- [REUSE Tutorial](https://reuse.software/tutorial/)" >> $GITHUB_STEP_SUMMARY
          echo "- [SPDX License List](https://spdx.org/licenses/)" >> $GITHUB_STEP_SUMMARY

          if [ "$GENERATE_SPDX" = "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            # SPDX status is reported as the cross product of generation outcome
            # and upload outcome so operators can distinguish:
            #   - generated and uploaded (the happy path)
            #   - generated but upload failed (the artifact is missing)
            #   - never attempted because an earlier step failed (skipped)
            #   - attempted and failed (the step ran and errored)
            if [ "$SPDX_OUTCOME" = "success" ] && [ "$UPLOAD_OUTCOME" = "success" ]; then
              echo "SPDX SBOM generated and uploaded as artifact." >> $GITHUB_STEP_SUMMARY
            elif [ "$SPDX_OUTCOME" = "success" ]; then
              echo "SPDX SBOM generated but artifact upload did not succeed (upload outcome: $UPLOAD_OUTCOME). See workflow logs for details." >> $GITHUB_STEP_SUMMARY
            elif [ "$SPDX_OUTCOME" = "skipped" ]; then
              echo "SPDX SBOM generation was skipped (an earlier step did not succeed). No SPDX failure to investigate." >> $GITHUB_STEP_SUMMARY
            else
              echo "SPDX SBOM generation failed (outcome: $SPDX_OUTCOME). See workflow logs for details." >> $GITHUB_STEP_SUMMARY
            fi
          fi
