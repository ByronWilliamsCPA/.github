# OpenSSF Scorecard for ByronWilliamsCPA/.github
# Delegates to the org-level reusable Scorecard workflow.
#
# Dashboard: https://securityscorecards.dev/viewer/?uri=github.com/ByronWilliamsCPA/.github
# Documentation: https://github.com/ossf/scorecard
name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    # Weekly on Tuesdays at 21:21 UTC
    - cron: '21 21 * * 2'
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions: {}

jobs:
  scorecard:
    name: Scorecard Analysis
    permissions:
      security-events: write
      contents: read
      actions: read
    uses: ByronWilliamsCPA/.github/.github/workflows/python-scorecard.yml@6f71aecae2c91214ca0a0a2206a36cf912aa31ac  # v1
