# ============================================================================
# Reusable FIPS Compatibility Workflow
# ============================================================================
# Checks code and dependencies for FIPS 140-2/140-3 compliance issues
#
# Usage from downstream repos:
#   jobs:
#     fips-check:
#       uses: ByronWilliamsCPA/.github/.github/workflows/python-fips-compatibility.yml@v1
#       with:
#         strict-mode: false
#         include-tests: true
#
# FIPS (Federal Information Processing Standards) mode restricts cryptographic
# algorithms to NIST-approved ones. This is required for:
#   - US Government systems
#   - Healthcare (HIPAA)
#   - Financial services
#   - Ubuntu LTS with fips-updates package
#
# Features:
#   - Static analysis for non-FIPS crypto usage
#   - Dependency scanning for problematic packages
#   - Optional strict mode for zero-tolerance
#   - PR comment integration
#   - Artifact retention
# ============================================================================

name: FIPS Compatibility (Reusable)

on:
  workflow_call:
    inputs:
      strict-mode:
        description: 'Treat warnings as errors'
        type: boolean
        required: false
        default: false

      include-tests:
        description: 'Include test files in FIPS analysis'
        type: boolean
        required: false
        default: true

      fix-hints:
        description: 'Show fix hints in output'
        type: boolean
        required: false
        default: true

      artifact-retention-days:
        description: 'Days to retain FIPS compliance artifacts'
        type: number
        required: false
        default: 30

      python-version:
        description: 'Python version to use for checks'
        type: string
        required: false
        default: '3.12'

      script-path:
        description: 'Path to FIPS check script (default: scripts/check_fips_compatibility.py)'
        type: string
        required: false
        default: 'scripts/check_fips_compatibility.py'

      enable-runtime-test:
        description: 'Enable runtime FIPS compatibility test'
        type: boolean
        required: false
        default: false
      no-build:
        description: 'Pass --no-build to uv sync/run commands (disable for projects with a build backend like hatchling)'
        required: false
        type: boolean
        default: true

permissions: {}

jobs:
  fips-check:
    name: FIPS Compliance Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 15
    env:
      NO_BUILD_FLAG: ${{ inputs.no-build && '--no-build' || '' }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        env:
          PYTHON_VERSION: ${{ inputs.python-version }}
        run: uv python install "$PYTHON_VERSION"

      # Detect repo state for the uv sync/run commands below. Same logic as
      # python-compatibility.yml; the reusable workflow is uv-only by org policy.
      - name: Detect repo state
        id: detect
        run: |
          if [ ! -f pyproject.toml ]; then
            echo "state=skip" >> $GITHUB_OUTPUT
            echo "::notice::No pyproject.toml found at repo root; FIPS compatibility check will be skipped."
          elif [ -f poetry.lock ] || grep -qE '^\[tool\.poetry(\.|])' pyproject.toml; then
            echo "state=poetry-not-supported" >> $GITHUB_OUTPUT
            echo "::error::This repo uses Poetry. python-fips-compatibility.yml is uv-only by org policy. Convert to uv before re-enabling FIPS compatibility testing."
            exit 1
          elif [ -f uv.lock ]; then
            echo "state=uv-locked" >> $GITHUB_OUTPUT
          else
            echo "state=uv-no-lock" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Verify FIPS check script exists
        id: script-check
        env:
          SCRIPT_PATH: ${{ inputs.script-path }}
        run: |
          # Allowlist pattern: relative path of letters, digits, underscore, dash,
          # dot, forward slash; must end in .py; no traversal, whitespace, or
          # shell metacharacters.
          if [[ ! "$SCRIPT_PATH" =~ ^[a-zA-Z0-9_./-]+\.py$ ]] \
              || [[ "$SCRIPT_PATH" == *..* ]] \
              || [[ "$SCRIPT_PATH" == /* ]]; then
            echo "::error::script-path rejected by allowlist: $SCRIPT_PATH"
            echo "Expected a relative .py path matching ^[a-zA-Z0-9_./-]+\\.py$ with no '..' or leading '/'."
            exit 1
          fi
          # Symlink-escape guard: if the file exists, resolve it and confirm
          # the canonical path stays inside GITHUB_WORKSPACE. A symlink at
          # scripts/legit.py pointing to /etc/passwd passes the regex above
          # but is blocked here. Missing files fall through to the existence
          # check below, which handles them as a soft warning per the
          # workflow's contract.
          # #CRITICAL realpath -e fails if any path component is missing;
          # gate on [ -e ] so the soft-warning branch still fires for missing files.
          if [ -e "$SCRIPT_PATH" ]; then
            RESOLVED=$(realpath -e "$SCRIPT_PATH")
            case "$RESOLVED" in
              "$GITHUB_WORKSPACE"/*) ;;
              *)
                echo "::error::script-path resolves outside the workspace: $SCRIPT_PATH -> $RESOLVED"
                exit 1
                ;;
            esac
          fi
          if [ -f "$SCRIPT_PATH" ]; then
            echo "script_exists=true" >> $GITHUB_OUTPUT
            echo "FIPS check script found at $SCRIPT_PATH"
          else
            echo "script_exists=false" >> $GITHUB_OUTPUT
            echo "::warning::FIPS check script not found at $SCRIPT_PATH"
          fi

      - name: Install dependencies (uv with lockfile)
        if: steps.script-check.outputs.script_exists == 'true' && steps.detect.outputs.state == 'uv-locked'
        run: uv sync --all-extras --frozen $NO_BUILD_FLAG
        shell: bash

      # SonarCloud cannot follow the $NO_BUILD_FLAG env-var indirection (set at the workflow
      # env from the `no-build` input per PR #112), and by design no uv.lock exists yet on
      # this path until this step generates one. S8541 (--no-build) and S8544 (lockfile) are
      # suppressed inline with rationale; the uv-locked install step above keeps the literal
      # --frozen so the scanner can see it.
      - name: Install dependencies (uv without lockfile)
        if: steps.script-check.outputs.script_exists == 'true' && steps.detect.outputs.state == 'uv-no-lock'
        run: uv sync --all-extras $NO_BUILD_FLAG  # NOSONAR(S8541,S8544): --no-build opt-out via `no-build` input; no uv.lock by design on this path
        shell: bash

      # --frozen is safe in both detected states: the install step above always produces
      # uv.lock before this step runs (the uv-no-lock path generates one during `uv sync`;
      # uv-locked has one committed). Hardcoding the literal eliminates SonarCloud S8544 on
      # the uv run lines below. S8541 (--no-build) remains suppressed inline because
      # `--no-build` is opt-out via the `no-build` workflow input and SonarCloud cannot
      # follow the env-var indirection statically.
      # #ASSUME steps.detect runs before the install steps above; #VERIFY the if: condition
      # on every install step references steps.detect.outputs.state.
      - name: Run FIPS compatibility check
        if: steps.script-check.outputs.script_exists == 'true' && (steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock')
        id: fips-check
        env:
          SCRIPT_PATH: ${{ inputs.script-path }}
          STRICT_MODE: ${{ inputs.strict-mode }}
          FIX_HINTS: ${{ inputs.fix-hints }}
          INCLUDE_TESTS: ${{ inputs.include-tests }}
        shell: bash
        run: |
          # Build command arguments
          STRICT_FLAG=""
          if [[ "$STRICT_MODE" == "true" ]]; then
            STRICT_FLAG="--strict"
          fi

          FIX_HINTS_FLAG=""
          if [[ "$FIX_HINTS" == "true" ]]; then
            FIX_HINTS_FLAG="--fix-hints"
          fi

          INCLUDE_TESTS_FLAG=""
          if [[ "$INCLUDE_TESTS" == "true" ]]; then
            INCLUDE_TESTS_FLAG="--include-tests"
          fi

          # Run check and capture output
          set +e
          # NOSONAR(S8541): --no-build is opt-out via `no-build` workflow input
          uv run --frozen $NO_BUILD_FLAG python "$SCRIPT_PATH" \
            $FIX_HINTS_FLAG \
            $INCLUDE_TESTS_FLAG \
            $STRICT_FLAG \
            2>&1 | tee fips-report.txt
          EXIT_CODE=$?
          set -e

          # Also generate JSON report
          # NOSONAR(S8541): --no-build is opt-out via `no-build` workflow input
          uv run --frozen $NO_BUILD_FLAG python "$SCRIPT_PATH" \
            --json \
            $INCLUDE_TESTS_FLAG \
            > fips-report.json 2>/dev/null || true

          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          # Extract summary for PR comment
          if [ -f fips-report.json ]; then
            ERRORS=$(jq -r '.summary.errors' fips-report.json)
            WARNINGS=$(jq -r '.summary.warnings' fips-report.json)
            INFO=$(jq -r '.summary.info' fips-report.json)
            echo "errors=$ERRORS" >> $GITHUB_OUTPUT
            echo "warnings=$WARNINGS" >> $GITHUB_OUTPUT
            echo "info=$INFO" >> $GITHUB_OUTPUT
          else
            echo "errors=0" >> $GITHUB_OUTPUT
            echo "warnings=0" >> $GITHUB_OUTPUT
            echo "info=0" >> $GITHUB_OUTPUT
          fi

      # Gate on detect state too so docs-only callers (state=skip) and poetry-not-supported
      # callers don't emit upload-artifact "No files were found" warnings when the FIPS
      # check step was skipped and produced no report files.
      - name: Upload FIPS report
        if: always() && steps.script-check.outputs.script_exists == 'true' && (steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: fips-compatibility-report
          path: |
            fips-report.txt
            fips-report.json
          retention-days: ${{ inputs.artifact-retention-days }}
          if-no-files-found: warn

      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.script-check.outputs.script_exists == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const errors = parseInt('${{ steps.fips-check.outputs.errors }}') || 0;
            const warnings = parseInt('${{ steps.fips-check.outputs.warnings }}') || 0;
            const info = parseInt('${{ steps.fips-check.outputs.info }}') || 0;

            let status = '✅ PASSED';
            let emoji = '✅';
            if (errors > 0) {
              status = '❌ FAILED';
              emoji = '❌';
            } else if (warnings > 0) {
              status = '⚠️ NEEDS REVIEW';
              emoji = '⚠️';
            }

            const body = `## ${emoji} FIPS Compatibility Check

            | Metric | Count |
            |--------|-------|
            | Errors | ${errors} |
            | Warnings | ${warnings} |
            | Info | ${info} |

            **Status:** ${status}

            ${errors > 0 ?
              '⚠️ This PR introduces FIPS-incompatible code or dependencies. ' +
              'Please review the [workflow run](' +
              '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}' +
              ') for details.' : ''}
            ${warnings > 0 && errors === 0 ?
              'ℹ️ Some packages may need verification for FIPS compliance. ' +
              'See the workflow artifacts for details.' : ''}

            <details>
            <summary>What is FIPS?</summary>

            FIPS 140-2/140-3 is a US government standard for cryptographic modules.
            Systems running Ubuntu LTS with \`fips-updates\` or similar configurations
            restrict cryptographic algorithms to NIST-approved ones.

            **Common issues:**
            - Using \`hashlib.md5()\` without \`usedforsecurity=False\`
            - Dependencies using non-approved algorithms (bcrypt, DES, RC4)
            - Weak cipher configurations

            **How to fix:**
            1. Use \`hashlib.md5(b'data', usedforsecurity=False)\` for non-security purposes
            2. Replace MD5/SHA1 with SHA-256 or SHA-512 for security contexts
            3. Audit dependencies for FIPS-approved alternatives
            4. Test on FIPS-enabled systems if targeting government/healthcare

            </details>
            `;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('FIPS Compatibility Check')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

      - name: FIPS Compliance Summary
        if: always()
        env:
          SCRIPT_PATH: ${{ inputs.script-path }}
        run: |
          echo "## FIPS Compatibility Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.script-check.outputs.script_exists }}" != "true" ]; then
            echo "**Status:** ⚠️ Skipped" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "FIPS check script not found at \`$SCRIPT_PATH\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "To enable FIPS checking:" >> $GITHUB_STEP_SUMMARY
            echo "1. Ensure the FIPS compatibility script exists in your repository" >> $GITHUB_STEP_SUMMARY
            echo "2. Or specify the correct path via the \`script-path\` input" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          ERRORS="${{ steps.fips-check.outputs.errors }}"
          WARNINGS="${{ steps.fips-check.outputs.warnings }}"
          INFO="${{ steps.fips-check.outputs.info }}"

          if [ "$ERRORS" == "0" ]; then
            if [ "$WARNINGS" == "0" ]; then
              echo "**Status:** ✅ Compliant" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "No FIPS compatibility issues detected." >> $GITHUB_STEP_SUMMARY
            else
              echo "**Status:** ⚠️ Needs Review" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "Found $WARNINGS warning(s) that may need attention." >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "**Status:** ❌ Non-compliant" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Found $ERRORS error(s) and $WARNINGS warning(s)." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Errors | $ERRORS |" >> $GITHUB_STEP_SUMMARY
          echo "| Warnings | $WARNINGS |" >> $GITHUB_STEP_SUMMARY
          echo "| Info | $INFO |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Resources" >> $GITHUB_STEP_SUMMARY
          echo "- [FIPS 140-2 Overview](https://csrc.nist.gov/pubs/fips/140-2/upd2/final)" >> $GITHUB_STEP_SUMMARY
          echo "- [FIPS 140-3 Standard](https://csrc.nist.gov/pubs/fips/140-3/final)" >> $GITHUB_STEP_SUMMARY
          echo "- [Python FIPS Mode](https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/8/html/security_hardening/using-the-system-wide-cryptographic-policies_security-hardening#proc_enabling-fips-mode-in-a-system_using-the-system-wide-cryptographic-policies)" >> $GITHUB_STEP_SUMMARY

      # Gate on detect state to avoid a false failure when the fips-check step was skipped
      # (state=skip or poetry-not-supported). When fips-check is skipped, its exit_code
      # output is empty; `empty != '0'` evaluates true and would otherwise trigger this step
      # as a false-failure for docs-only callers.
      - name: Check result
        if: steps.script-check.outputs.script_exists == 'true' && (steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock') && steps.fips-check.outputs.exit_code != '0'
        run: |
          echo "::error::FIPS compatibility issues found. See the report for details."
          exit 1

  # Optional: Test on actual FIPS-enabled environment
  fips-runtime-test:
    name: FIPS Runtime Test
    runs-on: ubuntu-latest
    if: inputs.enable-runtime-test
    needs: fips-check
    permissions:
      contents: read
    timeout-minutes: 10
    env:
      NO_BUILD_FLAG: ${{ inputs.no-build && '--no-build' || '' }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        env:
          PYTHON_VERSION: ${{ inputs.python-version }}
        run: uv python install "$PYTHON_VERSION"

      # Detect repo state. Same logic as the fips-check job above.
      - name: Detect repo state
        id: detect
        run: |
          if [ ! -f pyproject.toml ]; then
            echo "state=skip" >> $GITHUB_OUTPUT
            echo "::notice::No pyproject.toml found at repo root; FIPS runtime test will be skipped."
          elif [ -f poetry.lock ] || grep -qE '^\[tool\.poetry(\.|])' pyproject.toml; then
            echo "state=poetry-not-supported" >> $GITHUB_OUTPUT
            echo "::error::This repo uses Poetry. python-fips-compatibility.yml is uv-only by org policy. Convert to uv before re-enabling FIPS runtime test."
            exit 1
          elif [ -f uv.lock ]; then
            echo "state=uv-locked" >> $GITHUB_OUTPUT
          else
            echo "state=uv-no-lock" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Install dependencies (uv with lockfile)
        if: steps.detect.outputs.state == 'uv-locked'
        run: uv sync --all-extras --frozen $NO_BUILD_FLAG
        shell: bash

      # SonarCloud cannot follow the $NO_BUILD_FLAG env-var indirection (set at the workflow
      # env from the `no-build` input per PR #112), and by design no uv.lock exists yet on
      # this path until this step generates one. S8541 (--no-build) and S8544 (lockfile) are
      # suppressed with rationale; the uv-locked install step above keeps the literal
      # --frozen so the scanner can see it.
      - name: Install dependencies (uv without lockfile)
        if: steps.detect.outputs.state == 'uv-no-lock'
        run: uv sync --all-extras $NO_BUILD_FLAG  # NOSONAR(S8541,S8544): --no-build opt-out via `no-build` input; no uv.lock by design on this path
        shell: bash

      # --frozen is safe in both detected states: the install step above always produces
      # uv.lock before this step runs (the uv-no-lock path generates one during `uv sync`;
      # uv-locked has one committed). Hardcoding the literal eliminates SonarCloud S8544.
      # S8541 (--no-build) remains suppressed below because `--no-build` is opt-out via the
      # `no-build` workflow input and SonarCloud cannot follow the env-var indirection.
      - name: Test crypto imports in simulated FIPS mode
        if: steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock'
        shell: bash
        run: |
          # This tests if the code can import without using non-FIPS algorithms
          # Note: Full FIPS testing requires an actual FIPS-enabled kernel
          # NOSONAR(S8541): --no-build is opt-out via `no-build` workflow input
          uv run --frozen $NO_BUILD_FLAG python -c "
          import os
          import sys

          # Simulate FIPS mode check
          print('Testing crypto imports...')

          # Test hashlib with usedforsecurity parameter
          import hashlib
          try:
              # This should work - non-security use
              h = hashlib.md5(b'test', usedforsecurity=False)
              print('✓ hashlib.md5 with usedforsecurity=False works')
          except Exception as e:
              print(f'✗ hashlib.md5 error: {e}')
              sys.exit(1)

          # Test that SHA-256 works (FIPS approved)
          try:
              h = hashlib.sha256(b'test')
              print('✓ hashlib.sha256 works')
          except Exception as e:
              print(f'✗ hashlib.sha256 error: {e}')
              sys.exit(1)

          print('\\nBasic FIPS compatibility: PASSED')
          "

      - name: Runtime Test Summary
        if: always()
        run: |
          echo "## FIPS Runtime Test" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status == 'success' && '✅ Passed' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This test simulates FIPS mode by checking basic cryptographic operations." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Note:** Full FIPS validation requires testing on a system with FIPS mode enabled at the kernel level." >> $GITHUB_STEP_SUMMARY
