# ============================================================================
# Supply Chain Consume Verify (Reusable)
# ============================================================================
# Consumer-side gate of the container supply chain. A downstream deployer
# (e.g. a Portainer/compose repo) calls this BEFORE deploying a GHCR image to
# prove that the image:
#   1. is recorded in the applicable approved-lock (when a lock file is given),
#      and
#   2. carries a valid cosign signature / attestation from the EXPECTED signer
#      identity, never merely "a" signature.
#
# Verifying the EXPECTED identity (never a wildcard) is the whole point: this
# is the half that catches trust-laundering, where an attacker presents a
# technically-valid signature from an identity you never approved.
#
# This workflow is INERT until a caller wires it; it ships no caller of its own.
#
# Usage from a caller repo:
#   jobs:
#     verify-image:
#       uses: ByronWilliamsCPA/.github/.github/workflows/supply-chain-consume-verify.yml@v1
#       with:
#         image_ref: 'ghcr.io/byronwilliamscpa/dhi-postgres@sha256:abc...def'
#         expected_identity_regexp: '^https://github\.com/ByronWilliamsCPA/.+$'
#         lock_file: 'approved-images.lock'
#         require_attestation: true
#         enforce: false   # WARN mode first, flip to true to fail closed
#
# Rollout pattern (warn -> bake -> enforce):
#   - enforce: false reports failures but always exits 0 (bake period).
#   - enforce: true fails the job closed on any verification failure.
# ============================================================================

name: Supply Chain Consume Verify (Reusable)

on:
  workflow_call:
    inputs:
      image_ref:
        description: 'GHCR reference INCLUDING digest (e.g. ghcr.io/org/app@sha256:...)'
        type: string
        required: true

      expected_identity_regexp:
        description: 'Regexp the signer certificate identity MUST match (never empty, never .*)'
        type: string
        required: true

      expected_issuer_regexp:
        description: 'Regexp the OIDC issuer MUST match'
        type: string
        required: false
        # #CRITICAL: anchored and dot-escaped; a bare dot matches any character.
        # #VERIFY update when wiring non-GitHub-Actions image signers.
        default: '^https://token\.actions\.githubusercontent\.com$'

      lock_file:
        description: 'Optional path to an approved-lock the digest must appear in (empty to skip)'
        type: string
        required: false
        default: ''

      require_attestation:
        description: 'Also require a valid cosign attestation (cyclonedx)'
        type: boolean
        required: false
        default: true

      enforce:
        description: 'Fail closed on verification failure when true; WARN mode (exit 0) when false'
        type: boolean
        required: false
        default: false

    outputs:
      verified:
        description: 'true when all checks passed, false otherwise'
        value: ${{ jobs.verify.outputs.verified }}

permissions: {}

jobs:
  verify:
    name: Verify image provenance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    outputs:
      verified: ${{ steps.verify.outputs.verified }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      # Checkout is needed only to read lock_file when one is provided.
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          persist-credentials: false

      - name: Shape-guard image reference
        env:
          IMAGE_REF: ${{ inputs.image_ref }}
        run: |
          # A tag-only ref cannot be verified by digest; require @sha256:<64hex>.
          if ! printf '%s' "$IMAGE_REF" | grep -Eq '@sha256:[0-9a-f]{64}$'; then
            echo "::error::image_ref must include a @sha256:<64hex> digest; got '$IMAGE_REF'"
            exit 1
          fi
          echo "image_ref shape OK: $IMAGE_REF"

      - name: Lock membership
        id: lock-check
        if: ${{ inputs.lock_file != '' }}
        env:
          IMAGE_REF: ${{ inputs.image_ref }}
          LOCK_FILE: ${{ inputs.lock_file }}
          ENFORCE: ${{ inputs.enforce }}
        run: |
          # Extract the bare digest and assert it appears in the lock file.
          DIGEST="$(printf '%s' "$IMAGE_REF" | grep -Eo 'sha256:[0-9a-f]{64}$')"
          if [ ! -f "$LOCK_FILE" ]; then
            if [ "$ENFORCE" = "true" ]; then
              echo "::error::lock_file '$LOCK_FILE' not found"
              exit 1
            fi
            echo "::warning::lock_file '$LOCK_FILE' not found (WARN mode, continuing)"
            echo "lock_passed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if grep -Fq "$DIGEST" "$LOCK_FILE"; then
            echo "Digest $DIGEST present in $LOCK_FILE"
            echo "lock_passed=true" >> "$GITHUB_OUTPUT"
          else
            if [ "$ENFORCE" = "true" ]; then
              echo "::error::digest $DIGEST not found in approved-lock $LOCK_FILE"
              exit 1
            fi
            echo "::warning::digest $DIGEST not found in approved-lock $LOCK_FILE (WARN mode, continuing)"
            echo "lock_passed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Verify signature/attestation (fail-closed when enforce)
        id: verify
        env:
          IMAGE_REF: ${{ inputs.image_ref }}
          IDENTITY: ${{ inputs.expected_identity_regexp }}
          ISSUER: ${{ inputs.expected_issuer_regexp }}
          REQUIRE_ATTESTATION: ${{ inputs.require_attestation }}
          ENFORCE: ${{ inputs.enforce }}
          # 'true' when the lock-check step was skipped (lock_file='') or passed;
          # 'false' when the lock check failed in WARN mode.
          LOCK_PASSED: ${{ steps.lock-check.outputs.lock_passed || 'true' }}
        run: |
          set -u

          # Reject an identity regexp that would prove nothing. An empty or
          # match-everything pattern (.* or its anchored forms) accepts any
          # signer, defeating trust-laundering detection.
          case "$IDENTITY" in
            ""|".*"|"^.*$"|"^.*"|".*$")
              echo "::error::expected_identity_regexp must be a specific pattern, not empty or '.*'"
              exit 1
              ;;
          esac

          failed=0

          echo "Verifying cosign signature for $IMAGE_REF"
          if cosign verify \
            --certificate-identity-regexp="$IDENTITY" \
            --certificate-oidc-issuer-regexp="$ISSUER" \
            "$IMAGE_REF"; then
            echo "Signature verification passed"
          else
            echo "Signature verification failed"
            failed=1
          fi

          if [ "$REQUIRE_ATTESTATION" = "true" ]; then
            echo "Verifying cosign attestation (cyclonedx) for $IMAGE_REF"
            if cosign verify-attestation \
              --type cyclonedx \
              --certificate-identity-regexp="$IDENTITY" \
              --certificate-oidc-issuer-regexp="$ISSUER" \
              "$IMAGE_REF"; then
              echo "Attestation verification passed"
            else
              echo "Attestation verification failed"
              failed=1
            fi
          fi

          if [ "$failed" -eq 0 ]; then
            if [ "${LOCK_PASSED}" = "false" ]; then
              echo "verified=false" >> "$GITHUB_OUTPUT"
              echo "::warning::cosign verification passed but lock membership check failed (WARN mode)"
              exit 0
            fi
            echo "verified=true" >> "$GITHUB_OUTPUT"
            echo "All verification checks passed."
            exit 0
          fi

          # Verification failed. WARN mode reports but never fails the job
          # (bake period); enforce mode fails closed.
          echo "verified=false" >> "$GITHUB_OUTPUT"
          if [ "$ENFORCE" = "true" ]; then
            echo "::error::image provenance verification failed for $IMAGE_REF (enforce mode)"
            exit 1
          fi
          echo "::warning::image provenance verification failed for $IMAGE_REF (WARN mode, exit 0)"
          exit 0

      - name: Verification summary
        if: always()
        env:
          IMAGE_REF: ${{ inputs.image_ref }}
          VERIFIED: ${{ steps.verify.outputs.verified }}
          ENFORCE: ${{ inputs.enforce }}
        run: |
          echo "## Supply Chain Consume Verify" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Image:** \`$IMAGE_REF\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Verified:** $VERIFIED" >> "$GITHUB_STEP_SUMMARY"
          echo "**Mode:** $([ "$ENFORCE" = "true" ] && echo enforce || echo warn)" >> "$GITHUB_STEP_SUMMARY"
