# Python Documentation - Reusable Workflow
# Builds MkDocs documentation with validation and optional GitHub Pages deployment
#
# Usage from downstream repos:
#   jobs:
#     docs:
#       uses: ByronWilliamsCPA/.github/.github/workflows/python-docs.yml@d5cf99101d4150ae5832d154cb42993705a09e31 # v7.0.1
#       with:
#         deploy-to-pages: true
#       permissions:
#         contents: read
#         pages: write
#         id-token: write

name: Python Documentation (Reusable)

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version for building docs'
        type: string
        required: false
        default: '3.12'

      docs-directory:
        description: 'Documentation source directory'
        type: string
        required: false
        default: 'docs'

      source-directory:
        description: 'Source code directory for docstring extraction'
        type: string
        required: false
        default: 'src'

      deploy-to-pages:
        description: 'Deploy to GitHub Pages (main branch only)'
        type: boolean
        required: false
        default: false

      docstring-threshold:
        description: 'Minimum docstring coverage percentage'
        type: number
        required: false
        default: 80
      no-build:
        description: 'Pass --no-build to uv sync/run commands (disable for projects with a build backend like hatchling)'
        required: false
        type: boolean
        default: true

permissions: {}

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NO_BUILD_FLAG: ${{ inputs.no-build && '--no-build' || '' }}
    permissions:
      contents: read
    # Expose the detected state so the deploy job can gate on it. Without this,
    # the deploy job sees `needs: build` succeed even when state=skip (only the
    # skip-notice step runs) and then fails at download-artifact lookup time.
    outputs:
      state: ${{ steps.detect.outputs.state }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
        with:
          fetch-depth: 0  # Full history for git-based dates

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install UV
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      # Detect the repo state before attempting uv sync. The reusable workflow is uv-only
      # by org policy (poetry repos are being converted to uv in separate work), but it is
      # still called by some repos that don't have a pyproject.toml (template / docs-only
      # forks) and by uv-managed repos that haven't yet committed a uv.lock. Hardcoding
      # `uv sync --frozen` failed for both categories. Auto-detection skips cleanly when
      # pyproject is absent and drops --frozen when no lockfile exists yet. Poetry repos
      # are explicitly rejected with an actionable error.
      - name: Detect repo state
        id: detect
        run: |
          if [ ! -f pyproject.toml ]; then
            echo "state=skip" >> $GITHUB_OUTPUT
            echo "::notice::No pyproject.toml found at repo root; documentation build will be skipped. Remove the python-docs.yml caller from this repo if it does not need documentation."
          elif [ -f poetry.lock ] || grep -qE '^\[tool\.poetry(\.|])' pyproject.toml; then
            echo "state=poetry-not-supported" >> $GITHUB_OUTPUT
            echo "::error::This repo uses Poetry. The python-docs.yml reusable workflow is uv-only by org policy. Convert this repo to uv before re-enabling documentation builds."
            exit 1
          elif [ -f uv.lock ]; then
            echo "state=uv-locked" >> $GITHUB_OUTPUT
            echo "Detected: uv with lockfile"
          else
            echo "state=uv-no-lock" >> $GITHUB_OUTPUT
            echo "Detected: uv without lockfile (PEP 621 pyproject.toml only); will sync without --frozen"
          fi
        shell: bash

      - name: Install dependencies (uv with lockfile)
        if: steps.detect.outputs.state == 'uv-locked'
        run: uv sync --all-extras --frozen $NO_BUILD_FLAG  # NOSONAR(S8541): --no-build is opt-out via `no-build` workflow input
        shell: bash

      # SonarCloud cannot follow the $NO_BUILD_FLAG env-var indirection, and by design no
      # uv.lock exists yet on this path until this step generates one. Inline NOSONAR with
      # rationale; the uv-locked install step above keeps the literal --frozen visible.
      - name: Install dependencies (uv without lockfile)
        if: steps.detect.outputs.state == 'uv-no-lock'
        run: uv sync --all-extras $NO_BUILD_FLAG  # NOSONAR(S8541,S8544): --no-build opt-out via `no-build` input; no uv.lock by design on this path
        shell: bash

      - name: Skip notice (no pyproject.toml)
        if: steps.detect.outputs.state == 'skip'
        run: |
          echo "## Documentation Build Skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No pyproject.toml at repo root, nothing to build." >> $GITHUB_STEP_SUMMARY

      # The install step above (uv-locked or uv-no-lock) guaranteed uv.lock exists, so
      # literal --frozen here is safe on both detect-state branches. Single-line run:
      # shape so SonarCloud's githubactions ruleset can pattern-match Pattern A inline
      # NOSONAR (per docs/sonarcloud-nosonar-patterns.md strengthened 2026-05-26).
      - name: Check docstring coverage
        if: steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock'
        env:
          SRC_DIR: ${{ inputs.source-directory }}
          DOCSTRING_THRESHOLD: ${{ inputs.docstring-threshold }}
        run: uv run --frozen $NO_BUILD_FLAG interrogate "$SRC_DIR" --fail-under="$DOCSTRING_THRESHOLD" --verbose || echo "Docstring coverage below threshold"  # NOSONAR(S8541): --no-build is opt-out via `no-build` workflow input
        shell: bash

      - name: Build MkDocs site
        if: steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock'
        run: uv run --frozen $NO_BUILD_FLAG mkdocs build --strict --verbose  # NOSONAR(S8541): --no-build is opt-out via `no-build` workflow input
        shell: bash

      - name: Upload documentation artifacts
        if: steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: documentation-site
          path: site/
          retention-days: 7

  deploy:
    name: Deploy to GitHub Pages
    # #EDGE: deploy must explicitly require build to have produced artifacts. The build
    # job succeeds even when state=skip (only the skip-notice step runs), so a plain
    # `needs: build` is not enough to block deploy from calling download-artifact
    # against a `documentation-site` artifact that was never uploaded.
    if: ${{ inputs.deploy-to-pages && github.ref == 'refs/heads/main' && needs.build.outputs.state != 'skip' }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - name: Download documentation artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: documentation-site
          path: site/

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
