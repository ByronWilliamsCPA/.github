# Python Documentation - Reusable Workflow
# Builds MkDocs documentation with validation and optional GitHub Pages deployment
#
# Usage from downstream repos:
#   jobs:
#     docs:
#       uses: ByronWilliamsCPA/.github/.github/workflows/python-docs.yml@main
#       with:
#         deploy-to-pages: true
#       permissions:
#         contents: read
#         pages: write
#         id-token: write

name: Python Documentation (Reusable)

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version for building docs'
        type: string
        required: false
        default: '3.12'

      docs-directory:
        description: 'Documentation source directory'
        type: string
        required: false
        default: 'docs'

      source-directory:
        description: 'Source code directory for docstring extraction'
        type: string
        required: false
        default: 'src'

      deploy-to-pages:
        description: 'Deploy to GitHub Pages (main branch only)'
        type: boolean
        required: false
        default: false

      docstring-threshold:
        description: 'Minimum docstring coverage percentage'
        type: number
        required: false
        default: 80

# Cancel in-progress runs for same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0  # Full history for git-based dates

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install UV
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/uv.lock') }}-docs

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Check docstring coverage
        run: |
          echo "📝 Checking docstring coverage..."
          uv run interrogate ${{ inputs.source-directory }} \
            --fail-under=${{ inputs.docstring-threshold }} \
            --verbose || echo "⚠️  Docstring coverage below threshold"

      - name: Build MkDocs site
        run: |
          echo "🏗️  Building documentation site..."
          uv run mkdocs build --strict --verbose

      - name: Upload documentation artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: documentation-site
          path: site/
          retention-days: 7

  deploy:
    name: Deploy to GitHub Pages
    if: ${{ inputs.deploy-to-pages && github.ref == 'refs/heads/main' }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download documentation artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: documentation-site
          path: site/

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b  # v5.0.0

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3.0.1
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4.0.5
