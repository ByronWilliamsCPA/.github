# Python Documentation - Reusable Workflow
# Builds MkDocs documentation with validation and optional GitHub Pages deployment
#
# Usage from downstream repos:
#   jobs:
#     docs:
#       uses: ByronWilliamsCPA/.github/.github/workflows/python-docs.yml@v1
#       with:
#         deploy-to-pages: true
#       permissions:
#         contents: read
#         pages: write
#         id-token: write

name: Python Documentation (Reusable)

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version for building docs'
        type: string
        required: false
        default: '3.12'

      docs-directory:
        description: 'Documentation source directory'
        type: string
        required: false
        default: 'docs'

      source-directory:
        description: 'Source code directory for docstring extraction'
        type: string
        required: false
        default: 'src'

      deploy-to-pages:
        description: 'Deploy to GitHub Pages (main branch only)'
        type: boolean
        required: false
        default: false

      docstring-threshold:
        description: 'Minimum docstring coverage percentage'
        type: number
        required: false
        default: 80
      no-build:
        description: 'Pass --no-build to uv sync/run commands (disable for projects with a build backend like hatchling)'
        required: false
        type: boolean
        default: true

permissions: {}

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NO_BUILD_FLAG: ${{ inputs.no-build && '--no-build' || '' }}
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # Full history for git-based dates

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras --frozen $NO_BUILD_FLAG

      - name: Check docstring coverage
        env:
          SRC_DIR: ${{ inputs.source-directory }}
          DOCSTRING_THRESHOLD: ${{ inputs.docstring-threshold }}
        run: |
          echo "📝 Checking docstring coverage..."
          uv run --frozen $NO_BUILD_FLAG interrogate "$SRC_DIR" \
            --fail-under="$DOCSTRING_THRESHOLD" \
            --verbose || echo "⚠️  Docstring coverage below threshold"

      - name: Build MkDocs site
        run: |
          echo "🏗️  Building documentation site..."
          uv run --frozen $NO_BUILD_FLAG mkdocs build --strict --verbose

      - name: Upload documentation artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: documentation-site
          path: site/
          retention-days: 7

  deploy:
    name: Deploy to GitHub Pages
    if: ${{ inputs.deploy-to-pages && github.ref == 'refs/heads/main' }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Download documentation artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: documentation-site
          path: site/

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
