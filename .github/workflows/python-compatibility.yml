# ============================================================================
# Reusable Python Compatibility Matrix Workflow
# ============================================================================
# Matrix testing across Python versions and operating systems
#
# Usage from downstream repos:
#   jobs:
#     compatibility:
#       uses: ByronWilliamsCPA/.github/.github/workflows/python-compatibility.yml@v1
#       with:
#         python-versions: '["3.10", "3.11", "3.12", "3.13"]'
#         operating-systems: '["ubuntu-latest", "macos-latest", "windows-latest"]'
#         skip-on-draft: true  # Skip matrix on draft PRs (92% cost reduction)
#
# Features:
#   - Matrix testing across multiple Python versions
#   - Cross-platform testing (Linux, macOS, Windows)
#   - System dependency installation (apt, brew, choco)
#   - Configurable test commands
#   - Artifact collection per matrix combination
#   - Draft PR awareness (skips expensive matrix during development)
#
# Cost Optimization:
#   - Draft PRs: Skips matrix testing by default (92% reduction)
#   - Ready PRs: Runs full matrix for comprehensive validation
#   - Override: Set skip-on-draft: false to force matrix on drafts
#
# System Dependencies Example (for packages like python-magic):
#   jobs:
#     compatibility:
#       uses: ByronWilliamsCPA/.github/.github/workflows/python-compatibility.yml@v1
#       with:
#         system-deps-macos: 'libmagic'
#         system-deps-ubuntu: 'libmagic-dev'
#         system-deps-windows: 'file'
#         include-macos: true
#         include-windows: true
# ============================================================================

name: Python Compatibility (Reusable)

on:
  workflow_call:
    inputs:
      python-versions:
        description: 'JSON array of Python versions to test'
        type: string
        required: false
        default: '["3.10", "3.11", "3.12", "3.13"]'

      operating-systems:
        description: 'JSON array of operating systems to test'
        type: string
        required: false
        default: '["ubuntu-latest"]'

      include-windows:
        description: 'Include Windows in the matrix'
        type: boolean
        required: false
        default: false

      include-macos:
        description: 'Include macOS in the matrix'
        type: boolean
        required: false
        default: false

      source-directory:
        description: 'Source code directory'
        type: string
        required: false
        default: 'src'

      test-command:
        description: 'Test command to run (uses uv run prefix)'
        type: string
        required: false
        default: 'pytest -v'

      coverage-report:
        description: 'Generate coverage reports'
        type: boolean
        required: false
        default: true

      fail-fast:
        description: 'Fail immediately on first matrix failure'
        type: boolean
        required: false
        default: false

      skip-on-draft:
        description: 'Skip expensive matrix on draft PRs (reduces cost by 92%)'
        type: boolean
        required: false
        default: true

      timeout-minutes:
        description: 'Timeout for each matrix job'
        type: number
        required: false
        default: 30

      system-deps-ubuntu:
        description: 'APT packages to install on Ubuntu (space-separated, e.g., "libmagic-dev libffi-dev")'
        type: string
        required: false
        default: ''

      system-deps-macos:
        description: 'Homebrew packages to install on macOS (space-separated, e.g., "libmagic")'
        type: string
        required: false
        default: ''

      system-deps-windows:
        description: 'Chocolatey packages to install on Windows (space-separated)'
        type: string
        required: false
        default: ''
      no-build:
        description: 'Pass --no-build to uv sync/run commands (disable for projects with a build backend like hatchling)'
        required: false
        type: boolean
        default: true

    outputs:
      matrix-result:
        description: 'Overall matrix test result'
        value: ${{ jobs.compatibility-summary.outputs.result }}

permissions: {}

jobs:
  # Build dynamic matrix based on inputs
  build-matrix:
    name: Build Test Matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Build matrix configuration
        id: set-matrix
        env:
          OS_INPUT: ${{ inputs.operating-systems }}
          PYTHON_INPUT: ${{ inputs.python-versions }}
          INCLUDE_WINDOWS: ${{ inputs.include-windows }}
          INCLUDE_MACOS: ${{ inputs.include-macos }}
        run: |
          # Start with the provided operating systems
          OS_LIST="$OS_INPUT"

          # Add additional platforms if requested
          if [ "$INCLUDE_WINDOWS" == "true" ]; then
            OS_LIST=$(echo "$OS_LIST" | jq '. + ["windows-latest"] | unique')
          fi

          if [ "$INCLUDE_MACOS" == "true" ]; then
            OS_LIST=$(echo "$OS_LIST" | jq '. + ["macos-latest"] | unique')
          fi

          # Build the full matrix (use -c for compact single-line JSON)
          MATRIX=$(jq -c -n \
            --argjson python "$PYTHON_INPUT" \
            --argjson os "$OS_LIST" \
            '{python: $python, os: $os}')

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "Generated matrix: $MATRIX"

  test-matrix:
    name: Test (Python ${{ matrix.python }}, ${{ matrix.os }})
    needs: build-matrix
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    env:
      NO_BUILD_FLAG: ${{ inputs.no-build && '--no-build' || '' }}
    permissions:
      contents: read
    # Skip expensive matrix on draft PRs unless explicitly disabled
    if: ${{ !(inputs.skip-on-draft && github.event.pull_request.draft) }}

    strategy:
      fail-fast: ${{ inputs.fail-fast }}
      matrix: ${{ fromJson(needs.build-matrix.outputs.matrix) }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python }}

      - name: Install UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux' && inputs.system-deps-ubuntu != ''
        env:
          SYSTEM_DEPS_UBUNTU: ${{ inputs.system-deps-ubuntu }}
        run: |
          PKGS="$SYSTEM_DEPS_UBUNTU"
          pkg_pattern='^[a-zA-Z0-9_. -]+$'
          if [[ "$PKGS" =~ $pkg_pattern ]]; then
            echo "Installing system dependencies: $PKGS"
            sudo apt-get update
            # shellcheck disable=SC2086
            sudo apt-get install -y $PKGS
          else
            echo "::error::Invalid package name characters in system-deps-ubuntu"
            exit 1
          fi

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS' && inputs.system-deps-macos != ''
        env:
          SYSTEM_DEPS_MACOS: ${{ inputs.system-deps-macos }}
        run: |
          PKGS="$SYSTEM_DEPS_MACOS"
          pkg_pattern='^[a-zA-Z0-9_. -]+$'
          if [[ "$PKGS" =~ $pkg_pattern ]]; then
            echo "Installing system dependencies: $PKGS"
            # shellcheck disable=SC2086
            brew install $PKGS
          else
            echo "::error::Invalid package name characters in system-deps-macos"
            exit 1
          fi

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows' && inputs.system-deps-windows != ''
        env:
          SYSTEM_DEPS_WINDOWS: ${{ inputs.system-deps-windows }}
        run: |
          $Pkgs = $env:SYSTEM_DEPS_WINDOWS
          if ($Pkgs -match '^[a-zA-Z0-9_\-\. ]+$') {
            Write-Output "Installing system dependencies: $Pkgs"
            choco install $Pkgs.Split(' ') -y
          } else {
            Write-Output "::error::Invalid package name characters in system-deps-windows"
            exit 1
          }
        shell: pwsh

      # Detect the repo state before attempting uv sync. The reusable workflow is uv-only
      # by org policy (poetry repos are being converted to uv in separate work), but it is
      # still called by some repos that don't have a pyproject.toml (template / docs-only
      # forks like DeQA-Doc) and by uv-managed repos that haven't yet committed a uv.lock.
      # Hardcoding `uv sync --frozen` failed for both categories. Auto-detection skips
      # cleanly when pyproject is absent and drops --frozen when no lockfile exists yet.
      # Poetry repos are explicitly rejected with an actionable error.
      - name: Detect repo state
        id: detect
        run: |
          if [ ! -f pyproject.toml ]; then
            echo "state=skip" >> $GITHUB_OUTPUT
            echo "::notice::No pyproject.toml found at repo root; Python compatibility test will be skipped. Remove the python-compatibility.yml caller from this repo if it does not need Python compatibility testing."
          elif [ -f poetry.lock ] || grep -qE '^\[tool\.poetry(\.|])' pyproject.toml; then
            echo "state=poetry-not-supported" >> $GITHUB_OUTPUT
            echo "::error::This repo uses Poetry. The python-compatibility.yml reusable workflow is uv-only by org policy. Convert this repo to uv before re-enabling Python compatibility testing."
            exit 1
          elif [ -f uv.lock ]; then
            echo "state=uv-locked" >> $GITHUB_OUTPUT
            echo "Detected: uv with lockfile"
          else
            echo "state=uv-no-lock" >> $GITHUB_OUTPUT
            echo "Detected: uv without lockfile (PEP 621 pyproject.toml only); will sync without --frozen"
          fi
        shell: bash

      - name: Install dependencies (uv with lockfile)
        if: steps.detect.outputs.state == 'uv-locked'
        run: uv sync --all-extras --frozen $NO_BUILD_FLAG
        shell: bash

      # SonarCloud cannot follow the $NO_BUILD_FLAG env-var indirection (set at line 187 from
      # the `no-build` workflow input per PR #112), and by design no uv.lock exists yet on this
      # path until this step generates one. S8541 (--no-build) and S8544 (lockfile) are
      # suppressed with rationale; the existing uv-locked install step (above) uses the same
      # env-var pattern and is accepted by SonarCloud because it predates the new-code window.
      - name: Install dependencies (uv without lockfile)
        if: steps.detect.outputs.state == 'uv-no-lock'
        run: uv sync --all-extras $NO_BUILD_FLAG  # NOSONAR(S8541,S8544): --no-build opt-out via `no-build` input; no uv.lock by design on this path
        shell: bash

      - name: Skip notice (no pyproject.toml)
        if: steps.detect.outputs.state == 'skip'
        env:
          MATRIX_PYTHON: ${{ matrix.python }}
          MATRIX_OS: ${{ matrix.os }}
        run: |
          echo "## Python Compatibility Skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No pyproject.toml at repo root, nothing to test on Python $MATRIX_PYTHON / $MATRIX_OS." >> $GITHUB_STEP_SUMMARY
        shell: bash

      # --frozen is safe in both detected states: the install step above always produces
      # uv.lock before this step runs (the uv-no-lock path generates one during `uv sync`,
      # the uv-locked path has one committed). Hardcoding the literal eliminates SonarCloud
      # S8544 here. S8541 (--no-build) remains suppressed below because `--no-build` is
      # opt-out via the `no-build` workflow input (NO_BUILD_FLAG env at line 187) and
      # SonarCloud cannot follow the env-var indirection statically.
      - name: Run tests
        if: steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock'
        id: tests
        env:
          COVERAGE_REPORT: ${{ inputs.coverage-report }}
          TEST_COMMAND: ${{ inputs.test-command }}
          SRC_DIR: ${{ inputs.source-directory }}
          MATRIX_PYTHON: ${{ matrix.python }}
          MATRIX_OS: ${{ matrix.os }}
        run: |
          echo "Running tests on Python $MATRIX_PYTHON ($MATRIX_OS)..."

          if [ "$COVERAGE_REPORT" == "true" ]; then
            # shellcheck disable=SC2086
            # NOSONAR(S8541): --no-build is opt-out via `no-build` workflow input
            uv run --frozen $NO_BUILD_FLAG $TEST_COMMAND \
              --cov="$SRC_DIR" \
              --cov-report=xml:coverage-${MATRIX_PYTHON}-${MATRIX_OS}.xml \
              --cov-report=term-missing
          else
            # shellcheck disable=SC2086
            # NOSONAR(S8541): --no-build is opt-out via `no-build` workflow input
            uv run --frozen $NO_BUILD_FLAG $TEST_COMMAND
          fi
        shell: bash

      # Gate on the same install/test states so docs-only callers (state=skip, e.g. DeQA-Doc)
      # and poetry-not-supported callers don't emit "No files were found" warnings from
      # upload-artifact when no coverage XML was produced. Matches the Run tests step's
      # if: condition exactly. (Addresses Copilot review comment on PR #156.)
      - name: Upload coverage artifact
        if: ${{ inputs.coverage-report && (steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock') && always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-${{ matrix.python }}-${{ matrix.os }}
          path: coverage-*.xml
          retention-days: 7

  # Summary job
  compatibility-summary:
    name: Compatibility Summary
    needs: [build-matrix, test-matrix]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    permissions:
      contents: read
    outputs:
      result: ${{ steps.result.outputs.result }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Set result output
        id: result
        env:
          TEST_MATRIX_RESULT: ${{ needs.test-matrix.result }}
        run: echo "result=$TEST_MATRIX_RESULT" >> $GITHUB_OUTPUT

      - name: Generate compatibility matrix summary
        env:
          SKIP_ON_DRAFT: ${{ inputs.skip-on-draft }}
          GH_PR_DRAFT: ${{ github.event.pull_request.draft }}
          BUILD_MATRIX: ${{ needs.build-matrix.outputs.matrix }}
          TEST_MATRIX_RESULT: ${{ needs.test-matrix.result }}
        run: |
          echo "## Python Compatibility Matrix Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check if matrix was skipped due to draft PR
          if [ "$SKIP_ON_DRAFT" == "true" ] && [ "$GH_PR_DRAFT" == "true" ]; then
            echo "### Draft PR Mode" >> $GITHUB_STEP_SUMMARY
            echo "Matrix testing skipped to reduce costs during development." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Status:** Skipped (92% cost reduction)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> Mark this PR as 'Ready for review' to run full compatibility matrix" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          MATRIX="$BUILD_MATRIX"
          PYTHON_VERSIONS=$(echo "$MATRIX" | jq -r '.python | join(", ")')
          OS_LIST=$(echo "$MATRIX" | jq -r '.os | join(", ")')

          echo "### Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- **Python Versions:** $PYTHON_VERSIONS" >> $GITHUB_STEP_SUMMARY
          echo "- **Operating Systems:** $OS_LIST" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Results" >> $GITHUB_STEP_SUMMARY
          if [ "$TEST_MATRIX_RESULT" == "success" ]; then
            echo "**Status:** All matrix combinations passed" >> $GITHUB_STEP_SUMMARY
          elif [ "$TEST_MATRIX_RESULT" == "failure" ]; then
            echo "**Status:** Some matrix combinations failed" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status:** $TEST_MATRIX_RESULT" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check matrix result
        if: ${{ needs.test-matrix.result == 'failure' }}
        run: |
          echo "::error::Compatibility matrix tests failed"
          exit 1
