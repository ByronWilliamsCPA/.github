# ============================================================================
# Reusable Mutation Testing Workflow
# ============================================================================
# Validates test effectiveness using mutation testing with mutmut
#
# ⚠️  RECOMMENDED USAGE: Schedule-Only (Weekly/Monthly)
# Mutation testing is computationally expensive and best suited for:
# - Weekly/monthly scheduled runs on main branch
# - Pre-release validation gates
# - Quality metrics dashboards
#
# NOT recommended for:
# - Per-PR validation (too slow, blocks development)
# - CI pipelines with tight time constraints
#
# Usage from downstream repos:
#   # RECOMMENDED: Schedule-only
#   on:
#     schedule:
#       - cron: '0 2 * * 0'  # Weekly on Sunday at 2 AM
#   jobs:
#     mutation:
#       uses: ByronWilliamsCPA/.github/.github/workflows/python-mutation.yml@v1
#       with:
#         source-directory: 'src'
#         mutation-threshold: 80
#         fail-under-threshold: false  # Don't block on low scores
#
# Features:
#   - Mutation testing with mutmut
#   - Configurable mutation score threshold
#   - HTML report generation
#   - Optional PR comment posting (if triggered by PR)
#   - Optimized for scheduled quality audits
#
# Performance Considerations:
#   - Runtime: 30-60 minutes for medium projects
#   - Cost: High compute usage (GitHub Actions minutes)
#   - Best practice: Run weekly, not per-commit
# ============================================================================

name: Mutation Testing (Reusable)

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to use'
        type: string
        required: false
        default: '3.12'

      source-directory:
        description: 'Source code directory to mutate'
        type: string
        required: false
        default: 'src'

      test-directory:
        description: 'Test directory'
        type: string
        required: false
        default: 'tests'

      mutation-threshold:
        description: 'Minimum mutation score percentage (0-100)'
        type: number
        required: false
        default: 80

      fail-under-threshold:
        description: 'Fail workflow if mutation score is below threshold'
        type: boolean
        required: false
        default: false

      post-pr-comment:
        description: 'Post mutation results as PR comment'
        type: boolean
        required: false
        default: true

      timeout-minutes:
        description: 'Timeout for mutation testing (can be long-running)'
        type: number
        required: false
        default: 60

      artifact-retention-days:
        description: 'Days to retain mutation reports'
        type: number
        required: false
        default: 14
      no-build:
        description: 'Pass --no-build to uv sync/run commands (disable for projects with a build backend like hatchling)'
        required: false
        type: boolean
        default: true

    outputs:
      mutation-score:
        description: 'The achieved mutation score percentage'
        value: ${{ jobs.mutation-testing.outputs.score }}
      passed:
        description: 'Whether the mutation threshold was met'
        value: ${{ jobs.mutation-testing.outputs.passed }}

permissions: {}

jobs:
  mutation-testing:
    name: Mutation Testing
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    env:
      NO_BUILD_FLAG: ${{ inputs.no-build && '--no-build' || '' }}
    permissions:
      contents: read
      pull-requests: write
    outputs:
      score: ${{ steps.analyze.outputs.score }}
      passed: ${{ steps.analyze.outputs.passed }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5  # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true

      # Detect the repo state before attempting uv sync. The reusable workflow is uv-only
      # by org policy (poetry repos are being converted to uv in separate work), but it is
      # still called by some repos that don't have a pyproject.toml (template / docs-only
      # forks) and by uv-managed repos that haven't yet committed a uv.lock. Hardcoding
      # `uv sync --frozen` failed for both categories. Auto-detection skips cleanly when
      # pyproject is absent and drops --frozen when no lockfile exists yet. Poetry repos
      # are explicitly rejected with an actionable error.
      - name: Detect repo state
        id: detect
        run: |
          if [ ! -f pyproject.toml ]; then
            echo "state=skip" >> $GITHUB_OUTPUT
            echo "::notice::No pyproject.toml found at repo root; mutation testing will be skipped. Remove the python-mutation.yml caller from this repo if it does not need mutation testing."
          elif [ -f poetry.lock ] || grep -qE '^\[tool\.poetry(\.|])' pyproject.toml; then
            echo "state=poetry-not-supported" >> $GITHUB_OUTPUT
            echo "::error::This repo uses Poetry. The python-mutation.yml reusable workflow is uv-only by org policy. Convert this repo to uv before re-enabling mutation testing."
            exit 1
          elif [ -f uv.lock ]; then
            echo "state=uv-locked" >> $GITHUB_OUTPUT
            echo "Detected: uv with lockfile"
          else
            echo "state=uv-no-lock" >> $GITHUB_OUTPUT
            echo "Detected: uv without lockfile (PEP 621 pyproject.toml only); will sync without --frozen"
          fi
        shell: bash

      # Mutmut is expected to be declared in the consumer project's dev dependencies
      # (e.g. 'mutmut>=3.3.1' in pyproject.toml's [dev] extra). Installing via
      # 'uv sync --all-extras --frozen' uses the exact version locked in the consumer's
      # uv.lock, which is fully reproducible AND respects each consumer's pinning. The
      # previous standalone 'uv pip install mutmut==2.5.1 --no-build' line was both
      # unsatisfiable (no wheels for 2.5.1) and a forced downgrade for consumers with
      # newer mutmut releases; it is intentionally removed. If a consumer omits mutmut
      # from their dev deps the workflow will fail loudly at 'mutmut run' with a clear
      # ModuleNotFoundError. The workflow's CLI assumes mutmut 3.x; consumers should
      # pin accordingly.
      #
      # S8541 suppression rationale: The $NO_BUILD_FLAG env (set from inputs.no-build,
      # default 'true' -> '--no-build') is dynamic by design so consumers with PEP 517
      # build backends like hatchling can pass 'no-build: false' to permit editable
      # installs. SonarCloud's static analyzer cannot resolve the env var. The lockfile-
      # based 'uv sync --frozen' (uv-locked path) constrains installable versions to
      # the consumer's audited uv.lock, bounding residual setup-script risk.
      - name: Install dependencies (uv with lockfile)
        if: steps.detect.outputs.state == 'uv-locked'
        run: uv sync --all-extras --frozen $NO_BUILD_FLAG  # NOSONAR(S8541): --no-build is opt-out via `no-build` workflow input
        shell: bash

      - name: Install dependencies (uv without lockfile)
        if: steps.detect.outputs.state == 'uv-no-lock'
        run: uv sync --all-extras $NO_BUILD_FLAG  # NOSONAR(S8541,S8544): --no-build opt-out via `no-build` input; no uv.lock by design on this path (uv sync creates one)
        shell: bash

      - name: Skip notice (no pyproject.toml)
        if: steps.detect.outputs.state == 'skip'
        run: |
          echo "## Mutation Testing Skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No pyproject.toml at repo root, nothing to mutate." >> $GITHUB_STEP_SUMMARY

      - name: Run mutation testing
        id: mutmut
        if: steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock'
        env:
          SOURCE_DIRECTORY: ${{ inputs.source-directory }}
          TEST_DIRECTORY: ${{ inputs.test-directory }}
        run: |
          echo "Starting mutation testing on $SOURCE_DIRECTORY..."

          # The install step above (uv-locked or uv-no-lock) guaranteed uv.lock exists,
          # so literal `--frozen` here is safe on both detect-state branches.
          # NOSONAR(S8541): --no-build is opt-out via `no-build` workflow input
          uv run --frozen $NO_BUILD_FLAG mutmut run \
            --paths-to-mutate="$SOURCE_DIRECTORY" \
            --tests-dir="$TEST_DIRECTORY" \
            --no-progress \
            || true

          # Generate reports
          # NOSONAR(S8541): --no-build is opt-out via `no-build` workflow input
          uv run --frozen $NO_BUILD_FLAG mutmut results > mutmut-results.txt || true
          # NOSONAR(S8541): --no-build is opt-out via `no-build` workflow input
          uv run --frozen $NO_BUILD_FLAG mutmut html || true

      - name: Analyze mutation results
        id: analyze
        if: steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock'
        run: |
          echo "Analyzing mutation test results..."

          # Parse mutmut results
          python3 << 'EOF'
          import json
          import os
          import sys

          # Try to parse mutmut results
          try:
              import subprocess
              result = subprocess.run(
                  ['uv', 'run', 'mutmut', 'results', '--json'],
                  capture_output=True, text=True
              )

              if result.returncode == 0 and result.stdout.strip():
                  data = json.loads(result.stdout)
                  killed = data.get('killed', 0)
                  survived = data.get('survived', 0)
                  timeout = data.get('timeout', 0)
                  suspicious = data.get('suspicious', 0)
                  skipped = data.get('skipped', 0)
                  total = killed + survived + timeout + suspicious

                  if total > 0:
                      score = round((killed / total) * 100, 2)
                  else:
                      score = 100.0
              else:
                  # Fallback: try to parse text output
                  with open('mutmut-results.txt', 'r') as f:
                      content = f.read()

                  # Simple parsing
                  killed = content.count('killed')
                  survived = content.count('survived')
                  total = killed + survived

                  if total > 0:
                      score = round((killed / total) * 100, 2)
                  else:
                      score = 100.0
                      killed = 0
                      survived = 0

          except Exception as e:
              print(f"Error parsing results: {e}")
              score = 0.0
              killed = 0
              survived = 0
              total = 0

          threshold = float(os.environ.get('THRESHOLD', '80'))
          passed = score >= threshold

          # Output for GitHub Actions
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"score={score}\n")
              f.write(f"passed={'true' if passed else 'false'}\n")
              f.write(f"killed={killed}\n")
              f.write(f"survived={survived}\n")

          # Output for step summary
          print(f"Mutation Score: {score}%")
          print(f"Threshold: {threshold}%")
          print(f"Passed: {passed}")
          print(f"Killed: {killed}, Survived: {survived}")

          if not passed and os.environ.get('FAIL_UNDER', 'false') == 'true':
              sys.exit(1)
          EOF
        env:
          THRESHOLD: ${{ inputs.mutation-threshold }}
          FAIL_UNDER: ${{ inputs.fail-under-threshold }}

      - name: Upload mutation reports
        if: always() && (steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: mutation-reports
          path: |
            mutmut-results.txt
            html/
            .mutmut-cache
          retention-days: ${{ inputs.artifact-retention-days }}

      - name: Post PR comment
        if: ${{ inputs.post-pr-comment && github.event_name == 'pull_request' && (steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock') }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const score = '${{ steps.analyze.outputs.score }}';
            const passed = '${{ steps.analyze.outputs.passed }}' === 'true';
            const threshold = '${{ inputs.mutation-threshold }}';

            const emoji = passed ? '✅' : '⚠️';
            const status = passed ? 'Passed' : 'Below Threshold';

            const body = `## ${emoji} Mutation Testing Results

            | Metric | Value |
            |--------|-------|
            | **Mutation Score** | ${score}% |
            | **Threshold** | ${threshold}% |
            | **Status** | ${status} |

            ${!passed ? `
            > **Note:** The mutation score is below the threshold. This indicates that some mutants survived, meaning tests may not be catching all potential bugs.

            **Recommendations:**
            - Review the mutation report artifact for survived mutants
            - Add tests for uncovered code paths
            - Consider strengthening existing assertions
            ` : ''}

            <details>
            <summary>What is Mutation Testing?</summary>

            Mutation testing introduces small changes (mutations) to your code and checks if your tests detect them. A high mutation score indicates your tests are effective at catching bugs.

            - **Killed mutants:** Tests detected the change
            - **Survived mutants:** Tests did not detect the change (potential gap)
            </details>
            `;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Mutation Testing Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

      - name: Mutation Testing Summary
        if: always() && (steps.detect.outputs.state == 'uv-locked' || steps.detect.outputs.state == 'uv-no-lock')
        env:
          THRESHOLD: ${{ inputs.mutation-threshold }}
        run: |
          echo "## Mutation Testing Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Warn if running on PR
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "⚠️  **Performance Warning**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Mutation testing is running on a Pull Request. This is expensive and not recommended." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Recommendation:** Run mutation testing on schedule (weekly/monthly) instead." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "---" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Mutation Score** | ${{ steps.analyze.outputs.score }}% |" >> $GITHUB_STEP_SUMMARY
          echo "| **Threshold** | ${THRESHOLD}% |" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.analyze.outputs.passed }}" == "true" ]; then
            echo "| **Status** | Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| **Status** | Below Threshold |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### About Mutation Testing" >> $GITHUB_STEP_SUMMARY
          echo "Mutation testing validates test effectiveness by introducing code changes and verifying tests catch them." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Best Practice:** Run on schedule (weekly/monthly), not per-PR, to avoid long CI times." >> $GITHUB_STEP_SUMMARY
