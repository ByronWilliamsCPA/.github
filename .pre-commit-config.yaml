# Pre-commit hooks: file checks and secret scanning.
# See pre-commit-authoring skill for hook authoring guidance.

default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: c4a0b883114b00d8d76b479c820ce7950211c99b  # v4.5.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: check-added-large-files
        stages: [pre-commit]
      - id: check-merge-conflict
        stages: [pre-commit]
      - id: detect-private-key
        stages: [pre-commit]

  # ============================================================================
  # Commit Message Validation - Commitizen (PC-008)
  # ============================================================================
  - repo: https://github.com/commitizen-tools/commitizen
    rev: 9707a58ba8c850259ece0fafc8108ba2f350e005  # v4.16.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

  # ============================================================================
  # YAML Linting - yamllint (PC-009)
  # ============================================================================
  - repo: https://github.com/adrienverge/yamllint
    rev: cba56bcde1fdd01c1deb3f945e69764c291a6530  # v1.38.0
    hooks:
      - id: yamllint
        stages: [pre-commit]

  # ============================================================================
  # Markdown Linting - markdownlint-cli (PC-010)
  # ============================================================================
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: e72a3ca1632f0b11a07d171449fe447a7ff6795e  # v0.48.0
    hooks:
      - id: markdownlint
        stages: [pre-commit]

  # ============================================================================
  # Secret Detection - detect-secrets (PC-013)
  # ============================================================================
  - repo: https://github.com/Yelp/detect-secrets
    rev: 01886c8a910c64595c47f186ca1ffc0b77fa5458  # v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        stages: [pre-commit]

  # ============================================================================
  # Secret Detection - TruffleHog
  # ============================================================================
  # Scan staged files only. The git-history mode also traverses fetched remote
  # branches in the local object store, producing false positives from unmerged
  # branches. Staged-file scanning is the correct scope for a pre-commit hook;
  # full git history scanning belongs in CI.
  # --results=verified,unknown: report only credentials that are confirmed live
  # or indeterminate; skip detector-level false positives.
  - repo: https://github.com/trufflesecurity/trufflehog
    rev: 05cccb53bc9e13bc6d17997db5a6bcc3df44bf2f  # v3.92.3 # pragma: allowlist secret
    hooks:
      - id: trufflehog
        name: TruffleHog Secret Scanner
        description: Detect secrets in your data before committing
        # Overrides upstream git-history scan with staged-file filesystem scan.
        # --results=verified,unknown includes indeterminate credentials (upstream
        # default is --results=verified only). Git history scanning belongs in CI.
        entry: bash -c 'command -v trufflehog >/dev/null 2>&1 && (git diff --cached -z --diff-filter=d --name-only 2>/dev/null | xargs -0 -r trufflehog filesystem --fail --no-update --results=verified,unknown --exclude-paths .trufflehog-exclude) || echo "TruffleHog not installed - skipping secret scan"'
        pass_filenames: false
        stages: [pre-commit]

  # ============================================================================
  # Em-Dash Guard (PC-011)
  # ============================================================================
  - repo: local
    hooks:
      - id: no-em-dash
        name: No em-dash
        description: Block em-dash characters (U+2014) in all staged files.
        entry: scripts/check-no-em-dash.sh
        language: script
        pass_filenames: false
        types: [text]
        stages: [pre-commit]
