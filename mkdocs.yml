site_name: ByronWilliamsCPA .github
site_url: https://byronwilliamscpa.github.io/.github/
site_description: >-
  Centralized community health files and reusable GitHub Actions workflows
  for the ByronWilliamsCPA organization.
site_author: Byron Williams
repo_url: https://github.com/ByronWilliamsCPA/.github
repo_name: ByronWilliamsCPA/.github
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 Byron Williams

# EDGE: docs/ content (committed in earlier phases) intentionally links out
# to repo-root files that GitHub renders natively (README.md, USAGE_EXAMPLES.md,
# .github/workflows/*.yml, examples/, .claude/CLAUDE.md) but that sit outside
# docs_dir and are therefore not part of the built site. Strict mode's default
# link/anchor validation treats every such target as "not found" and aborts.
# Downgrading these two checks to info keeps `mkdocs build --strict` viable
# without touching content files (out of mkdocs-auditor's remit; content-level
# link fixes are content gaps for mkdocs-specialist, not config drift).
# VERIFY: periodically re-run without this override to confirm no *new*
# genuinely-broken in-docs links (e.g. a wrong relative path to another page
# under docs/) are hiding behind it; two were found and reported during the
# initial Phase E build (see mkdocs-auditor's create-mode report).
validation:
  links:
    not_found: info
    anchors: info
    absolute_links: info
    unrecognized_links: info

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tasklist
  - pymdownx.tilde

