# Python Project - SLSA Provenance
# Generates SLSA Level 3 provenance attestations for releases
#
# This workflow:
#   - Generates SLSA Level 3 provenance
#   - Attaches provenance to GitHub releases
#   - Provides supply chain security attestations
#
# Triggered by:
#   - Release creation
#
# Prerequisites:
#   - Build job must output base64-encoded hashes
#   - Artifacts must be uploaded before calling this workflow

name: SLSA Provenance

on:
  release:
    types: [published]

permissions:
  actions: read
  id-token: write
  contents: write

jobs:
  # Build job that produces artifacts and hashes
  build:
    name: Build Package
    runs-on: ubuntu-latest
    # #ASSUME: the build job only reads the repo and uploads artifacts; it needs
    # no write scopes. Declaring contents: read here keeps it from inheriting
    # id-token: write / contents: write from the top-level block.
    # #VERIFY: re-check if a future build step needs to push tags or attest.
    permissions:
      contents: read
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Install UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Generate artifact hashes
        id: hash
        working-directory: dist
        run: |
          echo "hashes=$(sha256sum * | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/

  # Generate SLSA provenance
  #
  # The SLSA generator is called directly here, not via the org reusable
  # python-slsa.yml. That reusable workflow exposes only `on: workflow_dispatch`
  # and has no `workflow_call` trigger, so it cannot be loaded via `uses:` from
  # this template. Calling the generator directly is the path that works (nesting
  # depth is not the issue; GitHub permits up to four levels of reusable calls).
  provenance:
    name: Generate Provenance
    needs: build
    # #CRITICAL: id-token: write lets this job mint the OIDC token that signs the
    # SLSA provenance; contents: write uploads the attestation to the release. As
    # the caller of an external reusable workflow, this block is the permission
    # set handed to the generator (caller/callee inheritance).
    # #VERIFY: keep these scoped to this job only; confirm no other job requests
    # id-token: write and that the generator ref stays pinned to the v2.1.0 SHA.
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a  # v2.1.0
    with:
      base64-subjects: ${{ needs.build.outputs.hashes }}
      upload-assets: true
      upload-tag-name: ${{ github.ref_name }}
      provenance-name: multiple.intoto.jsonl
