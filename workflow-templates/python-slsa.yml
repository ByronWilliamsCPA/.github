# Python Project - SLSA Provenance
# Generates SLSA Level 3 provenance attestations for releases
#
# This workflow:
#   - Generates SLSA Level 3 provenance
#   - Attaches provenance to GitHub releases
#   - Provides supply chain security attestations
#
# Triggered by:
#   - Release creation
#
# Prerequisites:
#   - Build job must output base64-encoded hashes
#   - Artifacts must be uploaded before calling this workflow

name: SLSA Provenance

on:
  release:
    types: [published]

permissions:
  actions: read
  id-token: write
  contents: write

jobs:
  # Build job that produces artifacts and hashes
  build:
    name: Build Package
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Install UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Generate artifact hashes
        id: hash
        working-directory: dist
        run: |
          echo "hashes=$(sha256sum * | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/

  # Generate SLSA provenance
  provenance:
    name: Generate Provenance
    needs: build
    uses: ByronWilliamsCPA/.github/.github/workflows/python-slsa.yml@v1
    with:
      base64-subjects: ${{ needs.build.outputs.hashes }}
      upload-assets: true
    permissions:
      actions: read
      id-token: write
      contents: write
