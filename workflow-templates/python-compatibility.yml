# Python Project - Compatibility Matrix
# Tests across multiple Python versions and operating systems
#
# This workflow:
#   - Runs tests across Python 3.10-3.13
#   - Optionally tests on Windows and macOS
#   - Generates coverage reports per matrix combination
#
# Triggered by:
#   - Push to main branch
#   - Pull requests to main branch

name: Python Compatibility

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  # CRITICAL: merge_group fires against the queue's speculative merge commit.
  # Compatibility matrix must run on the queue ref so Python-version
  # regressions introduced by the speculative merge are caught before landing
  # on main. See CI-040.
  # #VERIFY same procedure as python-ci.yml's CRITICAL block; tracked in #154.
  merge_group:

permissions:
  contents: read

jobs:
  compatibility:
    name: Compatibility Matrix
    uses: ByronWilliamsCPA/.github/.github/workflows/python-compatibility.yml@55bdc0a9b56e009debdfbb47b03456bb177365b9 # v7.0.24
    with:
      python-versions: '["3.10", "3.11", "3.12", "3.13"]'
      operating-systems: '["ubuntu-latest"]'
      include-windows: false
      include-macos: false
      source-directory: 'src'
      test-command: 'pytest -v'
      coverage-report: true
      fail-fast: false
