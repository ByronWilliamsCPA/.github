# Python Project - SBOM Generation
# Software Bill of Materials generation and vulnerability scanning
#
# This workflow:
#   - Generates CycloneDX SBOM
#   - Scans for vulnerabilities with Grype (gating) and OSV-Scanner (gating, fast keyless SBOM-ingest gate)
#   - Checks license compliance
#   - Uploads SARIF to GitHub Security tab (2 categories: grype-runtime-deps, osv-sbom-runtime-deps)
#
# Triggered by:
#   - Push to main branch
#   - Release creation
#   - Weekly schedule
#
# Optional toggles (defaults shown):
#   - run-osv: true         # OSV-Scanner SBOM-ingest gate; set false to disable
#   - grype-config-path: '.grype.yaml'  # path to Grype config (CVE ignores etc.)

name: SBOM

on:
  push:
    branches:
      - main
  release:
    types: [published]
  schedule:
    # Run weekly on Monday at 00:00 UTC
    - cron: '0 0 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  sbom:
    name: SBOM Generation & Scan
    uses: ByronWilliamsCPA/.github/.github/workflows/python-sbom.yml@aaf22b70696819de5122dcde708406aaff968484 # v7.0.20
    with:
      python-version: '3.12'
      fail-on-vulnerabilities: true
      severity-threshold: 'CRITICAL,HIGH'
      artifact-retention-days: 90
      # Only flag GPL for application dependencies, not OS packages
      # The SBOM workflow scans the Python venv, so this only affects pip packages
      forbidden-licenses: '["GPL-2.0-only", "GPL-2.0-or-later", "GPL-3.0-only", "GPL-3.0-or-later", "AGPL-3.0-only", "AGPL-3.0-or-later"]'
      fail-on-forbidden-licenses: false  # Warn only, don't fail
