# Python Project - Signed Release Pipeline
# Cryptographically sign releases and generate SLSA provenance
#
# This workflow:
#   - Builds distribution packages
#   - Signs artifacts with Sigstore/Cosign
#   - Generates SLSA provenance attestations
#   - Creates GitHub release with signed artifacts
#
# Triggered on:
#   - Git tags matching v* (e.g., v1.0.0, v2.1.3)
#
# Security:
#   - Keyless signing via Sigstore
#   - SLSA Level 3 provenance
#   - Signature verification instructions included

name: Release & Sign

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write      # For creating releases
  id-token: write      # For Sigstore signing
  attestations: write  # For SLSA provenance

jobs:
  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      hashes: ${{  steps.hash.outputs.hashes  }}

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0  # Full history for version detection

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'

      - name: Install UV
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true

      - name: Build distribution packages
        run: |
          uv build
          echo "📦 Built packages:"
          ls -lh dist/

      - name: Generate SBOM (Software Bill of Materials)
        run: |
          echo "📋 Generating SBOM in CycloneDX format..."
          uv pip install cyclonedx-bom==7.3.0

          # Generate runtime SBOM (production dependencies)
          uv pip compile pyproject.toml --output-file requirements-runtime.txt --no-dev
          cyclonedx-py requirements requirements-runtime.txt --of json --output-file dist/sbom-runtime.json

          # Generate complete SBOM (all dependencies)
          uv export --format requirements-txt --output-file requirements-all.txt --no-hashes
          cyclonedx-py requirements requirements-all.txt --of json --output-file dist/sbom-complete.json

          # Clean up temporary files
          rm -f requirements-runtime.txt requirements-all.txt

          echo "✅ SBOM files generated:"
          ls -lh dist/sbom-*.json

      - name: Generate hashes
        id: hash
        working-directory: dist
        run: |
          echo "hashes=$(sha256sum * | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 5

  provenance:
    name: Generate SLSA Provenance
    needs: [build]
    permissions:
      actions: read
      id-token: write
      contents: write
      attestations: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a # v2.1.0
    with:
      base64-subjects: "${{  needs.build.outputs.hashes  }}"
      upload-assets: true

  sign-and-release:
    name: Sign & Create Release
    needs: [build, provenance]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Download provenance
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{  needs.provenance.outputs.provenance-name  }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign artifacts with Cosign
        env:
          COSIGN_YES: "true"
        run: |
          echo "🔐 Signing artifacts with Sigstore/Cosign..."
          cd dist
          for file in *; do
            echo "  Signing: $file"
            cosign sign-blob --yes "$file" \
              --output-signature "${file}.sig" \
              --output-certificate "${file}.pem"
          done
          echo "✅ All artifacts signed"

      - name: Create release notes
        id: notes
        run: |
          cat > release-notes.md <<'EOF'
          ## Release ${{  github.ref_name  }}

          ### 📦 Installation

          ```bash
          pip install {{cookiecutter.pypi_package_name}}==${{  github.ref_name  }}
          ```

          ### 🔐 Verification

          All release artifacts are cryptographically signed with [Sigstore](https://www.sigstore.dev/).

          **Verify signatures:**

          ```bash
          # Install cosign
          brew install cosign  # macOS
          # or download from https://github.com/sigstore/cosign/releases

          # Verify wheel
          cosign verify-blob \
            --certificate {{cookiecutter.pypi_package_name}}-*.whl.pem \
            --signature {{cookiecutter.pypi_package_name}}-*.whl.sig \
            --certificate-identity-regexp="https://github.com/{{cookiecutter.github_org_or_user}}/python-project" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            {{cookiecutter.pypi_package_name}}-*.whl
          ```

          ### 🔗 SLSA Provenance

          This release includes [SLSA Level 3](https://slsa.dev/) provenance attestations, providing:
          - Build environment details
          - Source repository information
          - Complete build reproducibility metadata

          Provenance file: `${{  needs.provenance.outputs.provenance-name  }}`

          ### 📋 Software Bill of Materials (SBOM)

          This release includes CycloneDX SBOMs for transparency and supply chain security:
          - `sbom-runtime.json` - Production dependencies only
          - `sbom-complete.json` - All dependencies (including dev/test)

          **Scan for vulnerabilities:**
          ```bash
          # Using Grype
          grype sbom:sbom-runtime.json
          ```

          ### 📋 Changes

          See [CHANGELOG.md](https://github.com/{{cookiecutter.github_org_or_user}}/python-project/blob/main/CHANGELOG.md) for full details.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          files: |
            dist/*
            ${{  needs.provenance.outputs.provenance-name  }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{  contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha')  }}
          generate_release_notes: true

      - name: Release Summary
        run: |
          echo "## 🎉 Release ${{  github.ref_name  }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cd dist
          for file in *.whl *.tar.gz; do
            echo "- 📦 \`$file\`" >> $GITHUB_STEP_SUMMARY
            echo "  - Signature: \`${file}.sig\`" >> $GITHUB_STEP_SUMMARY
            echo "  - Certificate: \`${file}.pem\`" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### SBOM (Software Bill of Materials)" >> $GITHUB_STEP_SUMMARY
          for sbom in sbom-*.json; do
            echo "- 📋 \`$sbom\`" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Security" >> $GITHUB_STEP_SUMMARY
          echo "- 🔐 Signed with Sigstore/Cosign" >> $GITHUB_STEP_SUMMARY
          echo "- 🔗 SLSA Level 3 Provenance" >> $GITHUB_STEP_SUMMARY
          echo "- 📋 CycloneDX SBOM included" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Keyless signing (certificate transparency)" >> $GITHUB_STEP_SUMMARY
