# Python Project - FIPS Compatibility
# Validates FIPS 140-2/140-3 compliance and PQC readiness for cryptographic
# operations
#
# This workflow:
#   - Checks for non-FIPS cryptographic algorithms
#   - Flags quantum-vulnerable primitives (PQC readiness; pqc-mode ratchet)
#   - Scans dependencies for FIPS compatibility issues
#   - Provides fix hints for common issues
#   - Posts PR comments with results
#
# No repo-local checker script is needed: releases v8.0.0+ of the reusable
# workflow fall back to the org-central checker in ByronWilliamsCPA/.github.
#
# Triggered by:
#   - Push to main/master branches
#   - Pull requests to main/master branches
#   - Weekly scheduled runs
#   - Manual workflow dispatch

name: FIPS Compatibility

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**/*.py'
      - 'pyproject.toml'
      - 'requirements*.txt'
      - '.github/workflows/python-fips-compatibility.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'src/**/*.py'
      - 'pyproject.toml'
      - 'requirements*.txt'
  schedule:
    # Run weekly on Monday at 10 AM UTC
    - cron: '0 10 * * 1'
  workflow_dispatch:
    inputs:
      strict_mode:
        description: 'Treat warnings as errors'
        required: false
        default: false
        type: boolean
      enable_runtime_test:
        description: 'Enable runtime FIPS test'
        required: false
        default: false
        type: boolean
  # CRITICAL: merge_group fires against the queue's speculative merge commit.
  # FIPS compatibility check must run on the queue ref so crypto regressions
  # introduced by the speculative merge are caught before landing on main.
  # No paths: filter here; the queue ref reflects a full merge. See CI-040.
  # #VERIFY same procedure as python-ci.yml's CRITICAL block; tracked in #154.
  merge_group:

permissions:
  contents: read
  pull-requests: write

jobs:
  fips-check:
    name: FIPS Compliance Check
    uses: ByronWilliamsCPA/.github/.github/workflows/python-fips-compatibility.yml@7aaf24d13d9ff61d0d231797bfa6fd3cad478e2b # v7.1.12
    with:
      strict-mode: ${{ github.event.inputs.strict_mode || false }}
      include-tests: true
      fix-hints: true
      artifact-retention-days: 30
      python-version: '3.12'
      script-path: 'scripts/check_fips_compatibility.py'
      enable-runtime-test: ${{ github.event.inputs.enable_runtime_test || github.event_name == 'schedule' }}
      # The inputs below ship with the first release cut from v8.0.0; uncomment
      # once Renovate has advanced the pin above to that release or later.
      # PQC readiness ratchet: off | warn (default) | error. See
      # docs/workflows/python-fips-compatibility.md for the migration sequence.
      # pqc-mode: warn
      # use-central-checker: true
      # central-checker-ref: 'main'
      # fail-on-missing-script: false
    permissions:
      contents: read
      pull-requests: write
