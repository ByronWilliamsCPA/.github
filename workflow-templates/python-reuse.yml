# Python Project - REUSE Compliance
# Validates FSFE REUSE 3.0 specification compliance
#
# This workflow:
#   - Checks REUSE compliance for all files
#   - Verifies license headers and files
#   - Optionally generates SPDX SBOM
#
# Triggered by:
#   - Push to main branch
#   - Pull requests to main branch

name: REUSE Compliance

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  # CRITICAL: merge_group fires against the queue's speculative merge commit.
  # REUSE compliance check must run on the queue ref so missing SPDX headers
  # introduced by the speculative merge are caught before landing on main.
  # See CI-040.
  # #VERIFY same procedure as python-ci.yml's CRITICAL block; tracked in #154.
  merge_group:

permissions:
  contents: read

jobs:
  reuse:
    name: REUSE Compliance Check
    uses: ByronWilliamsCPA/.github/.github/workflows/python-reuse.yml@82b60068fda71ad6d52bf3635a3c352d095f170b # v7.0.6
    with:
      generate-spdx: true
      fail-on-missing: true
