# Python Project - CI Pipeline
# Main CI workflow with UV dependency management and comprehensive testing
#
# CI FOCUS: Code Quality & Testing
# This workflow focuses on code quality, formatting, and comprehensive testing.
# Security scanning has been consolidated in security-analysis.yml workflow.
#
# QUALITY CHECKS (This Workflow):
#   - MyPy: Strict type checking
#   - Ruff: Enhanced linting and formatting
#   - Type Hints: Validates | union syntax has future annotations
#   - Pytest: Comprehensive test suite with 80%+ coverage
#
# SECURITY SCANS (See security-analysis.yml):
#   - Bandit: Python static security analysis
#   - Safety: Python dependency CVE scanning
#   - CodeQL: Advanced security analysis
#
# This separation improves CI performance by ~10-12 minutes per PR

name: CI

on:
  workflow_dispatch:  # Manual trigger for testing
  pull_request:
    branches:
      - main
      - develop
      - 'feature/**'
  push:
    branches:
      - main
      - develop
  # CRITICAL: merge_group fires against the queue's speculative merge commit.
  # Required so this gate produces a check on the queue ref. Without it, repos
  # that enable merge_queue cannot land PRs that list this workflow as a
  # required status check. See standards-manifest CI-040. #VERIFY by enabling
  # merge_queue on a sacrificial repo and confirming the check appears on the
  # merge_group ref via gh api repos/<org>/<repo>/commits/<sha>/check-runs.
  merge_group:

permissions:
  contents: read        # For checkout
  pull-requests: write  # For PR comments
  checks: write         # For check runs

concurrency:
  group: ci-${{  github.ref  }}
  cancel-in-progress: true

env:
  CI_ENVIRONMENT: true
  UV_CACHE_DIR: ~/.cache/uv
  MYPY_CACHE_DIR: ~/.cache/mypy

jobs:
  # Setup and dependency caching
  setup-optimized:
    name: Setup with UV Caching
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      uv-hash: ${{  steps.cache-key.outputs.uv-hash  }}
      pyproject-hash: ${{  steps.cache-key.outputs.pyproject-hash  }}
    steps:
      - name: Harden the runner (Audit outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Generate cache keys
        id: cache-key
        run: |
          echo "uv-hash=${{  hashFiles('**/uv.lock')  }}" >> $GITHUB_OUTPUT
          echo "pyproject-hash=${{  hashFiles('**/pyproject.toml')  }}" >> $GITHUB_OUTPUT

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'

      - name: Install UV
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      # Optimized caching strategy
      - name: Cache UV dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: |
            .venv
            ~/.cache/uv
          key: py-deps-${{  runner.os  }}-${{  steps.cache-key.outputs.uv-hash  }}
          restore-keys: |
            py-deps-${{  runner.os  }}-

      - name: Install dependencies
        run: |
          uv sync --no-interaction --all-extras

      - name: Dependency validation
        run: |
          echo "🔍 Validating core dependencies..."
          uv run python -c "
          import sys
          required_deps = ['pydantic', 'structlog']
          print('✅ Core Dependencies:')
          for dep in required_deps:
              try:
                  mod = __import__(dep)
                  version = getattr(mod, '__version__', 'unknown')
                  print(f'  ✅ {dep} ({version}): OK')
              except ImportError as e:
                  print(f'  ❌ {dep}: FAILED - {e}')
                  sys.exit(1)
          print('✅ All core dependencies validated')
          "

      - name: Clean up disk space
        run: |
          echo "🧹 Cleaning up disk space..."
          uv cache clean 2>/dev/null || true
          sudo apt-get clean 2>/dev/null || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc 2>/dev/null || true

  # Comprehensive testing
  test:
    name: Test Suite (Python ${{  matrix.python-version  }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: setup-optimized
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
      - name: Harden the runner (Audit outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Set up Python ${{  matrix.python-version  }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{  matrix.python-version  }}

      - name: Install UV
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Restore dependency cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: |
            .venv
            ~/.cache/uv
          key: py-deps-${{  runner.os  }}-${{  needs.setup-optimized.outputs.uv-hash  }}
          restore-keys: |
            py-deps-${{  runner.os  }}-

      - name: Install dependencies
        run: |
          uv sync --no-interaction --all-extras

      # Run comprehensive test suite
      - name: Run test suite
        run: |
          echo "🧪 Running test suite..."
          uv run pytest -v \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-report=html:htmlcov \
            --cov-fail-under=80 \
            --junitxml=junit.xml \
            -o junit_family=xunit2 \
            --tb=short \
            --maxfail=10 \
            tests/
        env:
          CI_ENVIRONMENT: true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: test-results-${{  matrix.python-version  }}
          path: |
            junit.xml
            coverage.xml
            htmlcov/

  # Quality checks
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: setup-optimized
    steps:
      - name: Harden the runner (Audit outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'

      - name: Install UV
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Restore dependency cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: |
            .venv
            ~/.cache/uv
          key: py-deps-${{  runner.os  }}-${{  needs.setup-optimized.outputs.uv-hash  }}
          restore-keys: |
            py-deps-${{  runner.os  }}-

      - name: Install dependencies
        run: |
          uv sync --no-interaction --all-extras

      - name: Type checking with MyPy
        run: |
          echo "🔍 Running strict type checking..."
          uv run mypy src --config-file=pyproject.toml --cache-dir=${{  env.MYPY_CACHE_DIR  }}

      - name: Code formatting validation
        run: |
          echo "🧹 Validating code formatting..."
          uv run ruff format --check

      - name: Linting with enhanced rules
        run: |
          echo "🔧 Running enhanced linting..."
          uv run ruff check . --config=pyproject.toml

      - name: Type hint syntax validation
        run: |
          echo "🔍 Checking for | union syntax with future annotations..."
          uv run python scripts/check_type_hints.py --src-dir=src

  # Success validation
  ci-success:
    name: CI Success Gate
    runs-on: ubuntu-latest
    needs: [setup-optimized, test, quality-checks]
    if: always()
    steps:
      - name: Validate CI Results
        run: |
          if [[ "${{  needs.setup-optimized.result  }}" == "success" && \
                "${{  needs.test.result  }}" == "success" && \
                "${{  needs.quality-checks.result  }}" == "success" ]]; then
            echo "✅ CI Pipeline - All Checks Passed"
            echo "🎯 Code quality validated"
            echo "🔒 Security scans and quality checks completed"
            echo "✅ Ready for deployment"
          else
            echo "❌ CI Pipeline Failed"
            echo "setup-optimized: ${{  needs.setup-optimized.result  }}"
            echo "test: ${{  needs.test.result  }}"
            echo "quality-checks: ${{  needs.quality-checks.result  }}"
            exit 1
          fi

  # Required status check for branch protection
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [setup-optimized, test, quality-checks]
    if: always()
    steps:
      - name: CI Gate
        run: |
          if [[ "${{  needs.setup-optimized.result  }}" == "success" && \
                "${{  needs.test.result  }}" == "success" && \
                "${{  needs.quality-checks.result  }}" == "success" ]]; then
            echo "✅ CI Gate - Production Ready"
            echo "✅ Code quality standards met"
            echo "⚡ Performance validated"
          else
            echo "❌ CI Gate - Quality Standards Not Met"
            echo "🚫 Cannot proceed to production deployment"
            exit 1
          fi
