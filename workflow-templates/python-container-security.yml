# Python Project - Container Security
# Comprehensive container security scanning
#
# This workflow:
#   - Scans container images with Trivy
#   - Lints Dockerfiles with Hadolint
#   - Generates container SBOM (optional)
#   - Uploads SARIF to GitHub Security tab
#
# Triggered by:
#   - Push to main branch
#   - Pull requests to main branch
#   - Changes to Dockerfile or container-related files

name: Container Security

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile*'
      - 'docker-compose*.yml'
      - '.dockerignore'
  pull_request:
    branches:
      - main
    paths:
      - 'Dockerfile*'
      - 'docker-compose*.yml'
      - '.dockerignore'
  # CRITICAL: merge_group fires against the queue's speculative merge commit.
  # Container security scan must run on the queue ref so Dockerfile or image
  # regressions introduced by the speculative merge are caught before landing
  # on main. No paths: filter here; the queue ref reflects a full merge so
  # path-based skipping cannot be relied on. See CI-040.
  # #VERIFY same procedure as python-ci.yml's CRITICAL block; tracked in #154.
  merge_group:

permissions:
  contents: read
  security-events: write

jobs:
  container-security:
    name: Container Security Scan
    uses: ByronWilliamsCPA/.github/.github/workflows/python-container-security.yml@58fbe6e08975bf4b276a960cd62608a443d2f8d6 # v7.0.21
    with:
      dockerfile-path: './Dockerfile'
      build-image: true
      image-tag: 'security-scan:latest'
      severity-threshold: 'CRITICAL,HIGH'
      fail-on-vulnerabilities: true
      run-hadolint: true
      hadolint-failure-threshold: 'error'
      generate-sbom: true
      upload-sarif: true
    permissions:
      contents: read
      security-events: write
