# Python Project - OpenSSF Scorecard
# Evaluates repository security health using OpenSSF Scorecard
#
# This workflow:
#   - Runs OpenSSF Scorecard analysis
#   - Uploads SARIF to GitHub Security tab
# Note: publish-results is always treated as false by the reusable workflow.
# See python-scorecard.yml Known Limitations for details.
#
# Triggered by:
#   - Push to main branch
#   - Weekly schedule (Sunday at 00:00 UTC)

name: OpenSSF Scorecard

on:
  push:
    branches:
      - main
  schedule:
    # Run weekly on Sunday at 00:00 UTC
    - cron: '0 0 * * 0'

permissions:
  security-events: write
  contents: read
  actions: read

jobs:
  scorecard:
    name: Scorecard Analysis
    uses: ByronWilliamsCPA/.github/.github/workflows/python-scorecard.yml@1f863d77a8782a0b901df34986b1751c66ffa356 # v7.0.17
    with:
      upload-sarif: true
    permissions:
      security-events: write
      contents: read
      actions: read
