# Python Project - PyPI Publishing Workflow
# Publishes to PyPI using Trusted Publishing (OIDC)
#
# Setup Instructions:
# 1. Go to https://pypi.org/manage/account/publishing/
# 2. Add a new publisher:
#    - PyPI Project Name: {{ cookiecutter.pypi_package_name }}
#    - Owner: {{ cookiecutter.github_org_or_user }}
#    - Repository: python-project
#    - Workflow: publish-pypi.yml
# 3. Create a release tag (v*.*.*)
#
# For TestPyPI setup:
# 1. Go to https://test.pypi.org/manage/account/publishing/
# 2. Follow same steps as above

name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      use_testpypi:
        description: 'Publish to TestPyPI instead of PyPI'
        required: false
        default: true
        type: boolean

permissions: read-all

jobs:
  build:
    name: Build Distribution Packages
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Harden the runner (Audit outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Install Poetry
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1.4.1
        with:
          version: 2.1.2
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Build distribution packages
        run: |
          uv build
          echo "📦 Built packages:"
          ls -lh dist/

      - name: Verify package metadata
        run: |
          pip install twine==6.2.0
          twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: python-package-distributions
          path: dist/
          retention-days: 5
          if-no-files-found: error

  publish-to-pypi:
    name: Publish to PyPI
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.use_testpypi)
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      id-token: write  # Required for Trusted Publishing (OIDC)

    steps:
      - name: Harden the runner (Audit outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Verify artifacts
        run: |
          echo "📦 Packages to publish:"
          ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          print-hash: true
          verbose: true

      - name: Publication summary
        run: |
          echo "## 🎉 Published to PyPI!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Project**: https://pypi.org/project/{{ cookiecutter.pypi_package_name }}/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Install**: \`pip install {{ cookiecutter.pypi_package_name }}\`" >> $GITHUB_STEP_SUMMARY

  publish-to-testpypi:
    name: Publish to TestPyPI
    if: github.event_name == 'workflow_dispatch' && inputs.use_testpypi
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      id-token: write  # Required for Trusted Publishing (OIDC)

    steps:
      - name: Harden the runner (Audit outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Verify artifacts
        run: |
          echo "📦 Test packages to publish:"
          ls -lh dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          print-hash: true
          verbose: true

      - name: Publication summary
        run: |
          echo "## 🧪 Published to TestPyPI!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          URL="https://test.pypi.org/project/{{ cookiecutter.pypi_package_name }}/"
          echo "**Project**: ${URL}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          INSTALL_CMD="pip install --index-url https://test.pypi.org/simple/"
          INSTALL_CMD="${INSTALL_CMD} {{ cookiecutter.pypi_package_name }}"
          echo "**Test Install**: \`${INSTALL_CMD}\`" >> $GITHUB_STEP_SUMMARY
