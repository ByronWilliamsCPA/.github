# Codecov configuration for ByronWilliamsCPA/.github
# This repo has no Python package; coverage data is uploaded by downstream callers
# of python-codecov.yml.

coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 2%
    patch:
      default:
        target: 90%
        threshold: 2%

comment:
  layout: reach,diff,flags,files
  behavior: default
  require_changes: false
